  body {

  .app {
    width: 100%;

  .progress-bar { display: flex; gap: 6px; margin-bottom: 1.75rem; }
  .pdot { height: 5px; flex: 1; border-radius: 10px; background: var(--border-light); transition: background .3s; }
  .pdot.done { background: var(--green-border); }
  .pdot.active { background: var(--coral-border); }
  .screen { display: none; }

  .slabel { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .09em; margin-bottom: .5rem; }
  .stitle { font-size: 21px; font-weight: 500; color: var(--text-primary); margin-bottom: 1.25rem; line-height: 1.3; }
  .card {
    background: var(--bg-secondary);

  .hl  { background: var(--coral-bg);  color: var(--coral-text);  padding: 1px 5px; border-radius: 4px; font-weight: 500; }

  .spk {

  .ibox {
    background: var(--bg-secondary);
    border-left: 3px solid var(--coral-border);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
    padding: .75rem 1rem;
    margin-bottom: 1rem;

  .ibox-purple { border-left-color: var(--purple-border); }
  .ibox strong { color: var(--text-primary); font-weight: 500; }
  .navrow { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .btnp {
    background: var(--coral-border); color: var(--coral-bg);

  .btnp:hover { opacity: .88; }
  .btnp:disabled { opacity: .4; cursor: default; }
  .btng {
    background: none; border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md); padding: 10px 20px;
    font-size: 15px; color: var(--text-secondary);
    cursor: pointer; font-family: var(--font);
  }
  .btng:hover { background: var(--bg-secondary); }
  .blank { display: inline-block; min-width: 80px; border-bottom: 2px solid var(--coral-border); text-align: center; padding: 0 4px; font-weight: 500; color: var(--coral-text); }
  .optsrow { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 1rem; }
  .opt {
    border: 1.5px solid var(--border-mid); background: var(--bg-primary);
    border-radius: var(--radius-md); padding: 9px 18px;
    font-size: 15px; cursor: pointer; color: var(--text-primary);
    transition: all .15s; font-family: var(--font);
  }
  .opt:hover:not(.locked) { border-color: var(--coral-border); background: var(--coral-bg); color: var(--coral-text); }
  .opt.sel { border-color: var(--coral-border); background: var(--coral-bg); color: var(--coral-text); }
  .opt.ok  { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); }
  .opt.bad { border-color: #E24B4A; background: var(--red-bg); color: var(--red-text); }
  .opt.locked { cursor: default; }
  .fb { font-size: 14px; padding: 8px 12px; border-radius: var(--radius-md); margin-bottom: .75rem; line-height: 1.5; }
  .fb.ok  { background: var(--green-bg); color: var(--green-text); }
  .fb.bad { background: var(--red-bg);   color: var(--red-text); }
  .match-wrap { display: grid; grid-template-columns: 1fr 28px 1fr; gap: 10px; align-items: start; }
  .mcol { display: flex; flex-direction: column; gap: 8px; }
  .mi {
    border: 1.5px solid var(--border-mid); border-radius: var(--radius-md);
    padding: 9px 14px; font-size: 14px; background: var(--bg-primary);
    cursor: pointer; transition: all .15s; color: var(--text-primary);
    line-height: 1.4; min-height: 52px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .mi:hover:not(.locked) { border-color: var(--coral-border); background: var(--coral-bg); color: var(--coral-text); }
  .mi.sel-l  { border-color: var(--coral-border); background: var(--coral-bg); color: var(--coral-text); }
  .mi.ok     { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); cursor: default; }
  .mi.bad    { border-color: #E24B4A; background: var(--red-bg); color: var(--red-text); }
  .mi.locked { cursor: default; }
  .arr { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; }
  .arrline { height: 52px; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); font-size: 15px; }
  .tbl { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: .75rem; }
  .tbl th { text-align: left; font-weight: 500; font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .06em; padding: 6px 10px; border-bottom: 0.5px solid var(--border-light); }
  .tbl td { padding: 9px 10px; border-bottom: 0.5px solid var(--border-light); color: var(--text-primary); }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl .dim { color: var(--text-secondary); }
  .prep-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
  .prep-card { background: var(--bg-tertiary); border-radius: var(--radius-md); padding: 8px; text-align: center; }
  .prep-word { font-weight: 500; font-size: 15px; color: var(--text-primary); }
  .prep-mean { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .use-label { font-size: 13px; font-weight: 500; color: var(--coral-text); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
  .score-wrap { display: flex; gap: 16px; justify-content: center; margin-bottom: 1.5rem; }
  .score-circle {
    width: 90px; height: 90px; border-radius: 50%;
    border: 3px solid var(--green-border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-num { font-size: 28px; font-weight: 500; color: var(--green-text); line-height: 1; }
  .score-lbl { font-size: 11px; color: var(--text-tertiary); }
  footer { margin-top: 2rem; font-size: 12px; color: var(--text-tertiary); text-align: center; }
  @media (max-width: 480px) {
    .prep-grid { grid-template-columns: repeat(2,1fr); }
    .app { padding: 1.25rem; }
  }

  
  .home-link {

    border: 0.5px solid var(--border-light);

    transition: opacity .15s; display: block;
    width: 100%; text-align: center;
  }

  .home-link {
    font-size:13px;color:var(--text-tertiary);text-decoration:none;
    display:inline-flex;align-items:center;gap:4px;
    padding:4px 10px;border-radius:var(--radius-md);
    border:0.5px solid var(--border-light);
    transition:background .15s;cursor:pointer;
    background:none;font-family:var(--font);
  }
  .home-link:hover{background:var(--bg-secondary);color:var(--text-secondary);}
  .btn-complete{
    background:var(--green-border);color:#fff;
    border:none;border-radius:var(--radius-md);
    padding:12px 28px;font-size:15px;font-weight:500;
    cursor:pointer;font-family:var(--font);
    transition:opacity .15s;display:block;

  }
  .btn-complete:hover{opacity:.88;}

<script

</head>
<body>
<div class="lesson-header">
  <div class="lesson-title-row">
    <span class="lesson-badge">Lekcija 7a</span>
    <span class="lesson-name">Lokativ — Imenice &middot; Locative Nouns</span>
  </div>
  <a class="home-link" href="serbian-course-home.html">&#x2190; Kurs</a>
</div>
<div class="app">
  <div class="progress-bar" id="pbar"></div>
  <div id="screens"></div>
</div>
<footer>Serbian Language Course &middot; Lekcija 7a &middot; Locative Nouns</footer>
<script>
const SCREENS=[
  {id:'intro', label:'Lekcija 7a · Lesson 7a'},
  {id:'location', label:'Mesto · Location'},
  {id:'about', label:'O čemu · About'},
  {id:'time', label:'Vreme · Time'},
  {id:'endings', label:'Nastavci · Endings'},
  {id:'ex1', label:'Vežba 1 · Exercise 1'},
  {id:'ex2', label:'Vežba 2 · Exercise 2'},
  {id:'done', label:'Završeno · Done'},
];
let cur=0;
let ex1s={answers:{},checked:{}};
let ex2s={answers:{},checked:{}};

function speak(t){
  if(window.responsiveVoice){
    responsiveVoice.cancel();
    responsiveVoice.speak(t,"Serbian Male",{rate:0.9});
  } else {
    // fallback to browser TTS if ResponsiveVoice fails to load
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(t);
    u.lang='sr-RS';u.rate=0.85;
    window.speechSynthesis.speak(u);
  }
}
function spkBtn(t,l){
  const lang = l || 'sr-RS';
  const safe = t.replace(/'/g,"\\'");
  return '<button class="spk" onclick="speak(\'' + safe + '\',\'' + lang + '\')">'
    + '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">'
    + '<path d="M10 3v14M6 6v8M14 5v10M2 8v4M18 7v6"/>'
    + '</svg>Slušaj · Listen</button>';
}

const EX1=[
  {s:'Živim u ___.', e:'I live in Belgrade.',
   opts:['Beogradu', 'Beograda', 'Beograd'], correct:0, audio:'Živim u Beogradu.',
   expl:'U + locative = location inside. Beograd (masc.) → <strong>Beogradu</strong>. Ask: gde živiš?'},
  {s:'Knjiga je na ___.', e:'The book is on the table.',
   opts:['stolu', 'stola', 'stolom'], correct:0, audio:'Knjiga je na stolu.',
   expl:'Na + locative = on a surface. Sto (masc.) → <strong>stolu</strong>. Ask: gde je knjiga?'},
  {s:'Pričamo o ___.', e:'We are talking about the film.',
   opts:['filmu', 'filma', 'filmom'], correct:0, audio:'Pričamo o filmu.',
   expl:'O + locative = about something. Film (masc.) → <strong>filmu</strong>. Ask: o čemu pričamo?'},
  {s:'Deca se igraju u ___.', e:'The children are playing in the park.',
   opts:['parku', 'parka', 'parkу'], correct:0, audio:'Deca se igraju u parku.',
   expl:'U + locative: park (masc.) → <strong>parku</strong>. Location inside a place.'},
  {s:'Mislim o ___.', e:'I am thinking about life.',
   opts:['životu', 'života', 'životom'], correct:0, audio:'Mislim o životu.',
   expl:'O + locative: život (masc.) → <strong>životu</strong>. Ask: o čemu misliš?'}
];

const EX2=[
  {s:'Marko je u školi.', e:'Marko is at school.',
   opts:['mesto', 'o čemu', 'vreme'], correct:0,
   expl:'<strong>U + lokativ</strong> marks physical location: where someone is. Škola → školi.'},
  {s:'Govori o poslu.', e:'He talks about work.',
   opts:['mesto', 'o čemu', 'vreme'], correct:1,
   expl:'<strong>O + lokativ</strong> expresses topic: about what/whom. Posao → poslu.'},
  {s:'Rodila se u januaru.', e:'She was born in January.',
   opts:['mesto', 'o čemu', 'vreme'], correct:2,
   expl:'<strong>U + lokativ</strong> with months/years expresses time: u januaru, u 2024. godini.'},
  {s:'Slike vise na zidu.', e:'The pictures hang on the wall.',
   opts:['mesto', 'o čemu', 'vreme'], correct:0,
   expl:'<strong>Na + lokativ</strong> marks location on a surface. Zid → zidu.'},
  {s:'Čitam o srpskoj istoriji.', e:'I am reading about Serbian history.',
   opts:['mesto', 'o čemu', 'vreme'], correct:1,
   expl:'<strong>O + lokativ</strong>: topic. Istorija (fem.) → istoriji. Ask: o čemu čitaš?'}
];

function buildProgress(){
  document.getElementById('pbar').innerHTML=SCREENS.map((s,i)=>
    '<div class="pdot '+(i<cur?'done':i===cur?'active':'')+'" title="'+(s.label||'')+'"></div>').join('');
}
function buildScreens(){
  const c=document.getElementById('screens');c.innerHTML='';
  const mk=(id,html)=>{
    const d=document.createElement('div');
    d.className='screen '+(id===SCREENS[cur].id?'active':'');
    d.id='sc-'+id;d.innerHTML=html;c.appendChild(d);
  };
  buildAllScreens(mk);
}
function buildEx1HTML(){
  let h='<div class="slabel">'+SCREENS.find(s=>s.id==='ex1').label+'</div>';
  h+='<div class="ibox">Izaberi tačan instrumental. Pick the correct instrumental form.</div>';
  EX1.forEach((q,qi)=>{
    const chk=ex1s.checked[qi]!==undefined;
    const sel=ex1s.answers[qi];
    const filled=sel!==undefined?q.opts[sel]:'___';
    h+='<div class="card" style="margin-bottom:1rem;">'
      +'<div style="font-size:17px;color:var(--text-primary);margin-bottom:4px;line-height:1.6;">'
      +q.s.replace('___','<span class="blank">'+filled+'</span>')+'</div>'
      +'<div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">'+q.e+'</div>'
      +'<div class="optsrow">';
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+='<button class="'+cls+'" onclick="ex1pick('+qi+','+oi+')">'+opt+'</button>';
    });
    h+='</div>';
    if(chk)h+='<div class="fb '+(ex1s.checked[qi]?'ok':'bad')+'">'+(ex1s.checked[qi]?'Tačno! ✓':'Netačno.')+' — '+q.expl+'</div>';
    h+=spkBtn(q.audio||q.s.replace('___',q.opts[q.correct]).replace(/<[^>]+>/g,''))+'</div>';
  });
  const allA=EX1.every((_,i)=>ex1s.answers[i]!==undefined);
  const allC=EX1.every((_,i)=>ex1s.checked[i]!==undefined);
  h+='<div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button>';
  if(!allC)h+='<button class="btnp" '+(allA?'':'disabled')+' onclick="checkEx1()">Proveri</button>';
  else h+='<button class="btnp" onclick="goNext()">Vežba 2 →</button>';
  h+='</div>';return h;
}
function buildEx2HTML(){
  let h='<div class="slabel">'+SCREENS.find(s=>s.id==='ex2').label+'</div>';
  h+='<div class="ibox">Prepoznaj upotrebu instrumentala. Identify the use of the instrumental.</div>';
  EX2.forEach((q,qi)=>{
    const chk=ex2s.checked[qi]!==undefined;
    const sel=ex2s.answers[qi];
    h+='<div class="card" style="margin-bottom:1rem;">'
      +'<div class="cs">'+q.s+'</div>'
      +'<div class="ce">'+q.e+'</div>'
      +'<div class="optsrow" style="margin-top:10px;">';
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+='<button class="'+cls+'" onclick="ex2pick('+qi+','+oi+')">'+opt+'</button>';
    });
    h+='</div>';
    if(chk)h+='<div class="fb '+(ex2s.checked[qi]?'ok':'bad')+'">'+(ex2s.checked[qi]?'Tačno! ✓':'Netačno.')+' — '+q.expl+'</div>';
    h+='</div>';
  });
  const allA=EX2.every((_,i)=>ex2s.answers[i]!==undefined);
  const allC=EX2.every((_,i)=>ex2s.checked[i]!==undefined);
  h+='<div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button>';
  if(!allC)h+='<button class="btnp" '+(allA?'':'disabled')+' onclick="checkEx2()">Proveri</button>';
  else h+='<button class="btnp" onclick="goNext()">Završetak →</button>';
  h+='</div>';return h;
}

function buildAllScreens(mk){
  mk('intro',
    '<div class="slabel">'+SCREENS[0].label+'</div>'
    +'<div class="stitle">Lokativ — Imenice &middot; Locative Nouns</div>'
    +'<div class="ibox" style="border-left:3px solid var(--coral-border);">'
    +'<strong>Na koja pitanja odgovara lokativ?</strong><br><br>'
    +'Lokativ odgovara na pitanja <strong>gde?</strong> (where?) i <strong>o kome? / o čemu?</strong> (about whom? / about what?). '
    +'Uvek se koristi <strong>uz predlog</strong> — lokativ never stands alone without a preposition.<br><br>'
    +'<strong>What does the locative express?</strong><br>'
    +'Locative marks <strong>location</strong> (where something is), <strong>topic</strong> (what something is about), '
    +'and <strong>time</strong> (in which month/year). The three key prepositions are <em>u</em>, <em>na</em>, and <em>o</em>.'
    +'</div>'
    +'<div class="card"><div class="cs">Živim u <span class="hl">Beogradu</span>.</div>'
    +'<div class="ce">I live in Belgrade.</div>'
    +'<div class="cn">gde? → u Beogradu — mesto</div>'
    +spkBtn('Živim u Beogradu.')+'</div>'
    +'<div class="card"><div class="cs">Pričam o <span class="hl">poslu</span>.</div>'
    +'<div class="ce">I talk about work.</div>'
    +'<div class="cn">o čemu? → o poslu — tema</div>'
    +spkBtn('Pričam o poslu.')+'</div>'
    +'<div class="card"><div class="cs">Rođen sam u <span class="hl">martu</span>.</div>'
    +'<div class="ce">I was born in March.</div>'
    +'<div class="cn">kada? → u martu — vreme</div>'
    +spkBtn('Rođen sam u martu.')+'</div>'
    +'<div class="navrow"><span></span><button class="btnp" onclick="goNext()">Mesto →</button></div>'
  );

  mk('location',
    '<div class="slabel">'+SCREENS[1].label+'</div>'
    +'<div class="stitle">Mesto &middot; Location</div>'
    +'<div class="ibox"><strong>U + lokativ</strong> = inside a place (in a city, building, room).<br>'
    +'<strong>Na + lokativ</strong> = on a surface or at an open/functional place (na stolu, na poslu, na plaži).<br><br>'
    +'Both answer: <strong>gde?</strong> — where?<br><br>'
    +'<strong>U or na?</strong> Enclosed spaces take <em>u</em>; surfaces and activity locations take <em>na</em>. '
    +'Some nouns are fixed: na poslu (at work), na moru (at the sea), na fakultetu (at university).</div>'
    +'<div class="card"><div class="cs">Marko je u <span class="hl">školi</span>.</div>'
    +'<div class="ce">Marko is in school. — gde? u školi</div>'
    +'<div class="cn">škola (fem.) → <strong>školi</strong></div>'
    +spkBtn('Marko je u školi.')+'</div>'
    +'<div class="card"><div class="cs">Čitam na <span class="hl">kauču</span>.</div>'
    +'<div class="ce">I read on the sofa. — gde? na kauču</div>'
    +'<div class="cn">kauč (masc.) → <strong>kauču</strong></div>'
    +spkBtn('Čitam na kauču.')+'</div>'
    +'<div class="card"><div class="cs">Živimo u <span class="hl">gradu</span>.</div>'
    +'<div class="ce">We live in the city. — gde? u gradu</div>'
    +'<div class="cn">grad (masc.) → <strong>gradu</strong></div>'
    +spkBtn('Živimo u gradu.')+'</div>'
    +'<div class="card"><div class="cs">Ana je na <span class="hl">poslu</span>.</div>'
    +'<div class="ce">Ana is at work. — gde? na poslu</div>'
    +'<div class="cn">posao (masc.) → <strong>poslu</strong></div>'
    +spkBtn('Ana je na poslu.')+'</div>'
    +'<div class="navrow">'
    +'<button class="btng" onclick="goPrev()">&#x2190; Nazad</button>'
    +'<button class="btnp" onclick="goNext()">O čemu →</button></div>'
  );

  mk('about',
    '<div class="slabel">'+SCREENS[2].label+'</div>'
    +'<div class="stitle">O kome? O čemu? &middot; About</div>'
    +'<div class="ibox"><strong>O + lokativ</strong> expresses the <strong>topic</strong> of speech, thought, or writing. '
    +'It answers: <strong>o čemu?</strong> (about what?) or <strong>o kome?</strong> (about whom?).<br><br>'
    +'Common verbs with this pattern: pričati o, govoriti o, misliti o, pisati o, znati o, brinuti o.</div>'
    +'<div class="card"><div class="cs">Priča o <span class="hl">prijatelju</span>.</div>'
    +'<div class="ce">He talks about his friend. — o kome? o prijatelju</div>'
    +'<div class="cn">prijatelj (masc.) → <strong>prijatelju</strong></div>'
    +spkBtn('Priča o prijatelju.')+'</div>'
    +'<div class="card"><div class="cs">Mislim o <span class="hl">budućnosti</span>.</div>'
    +'<div class="ce">I think about the future. — o čemu? o budućnosti</div>'
    +'<div class="cn">budućnost (fem., cons.) → <strong>budućnosti</strong></div>'
    +spkBtn('Mislim o budućnosti.')+'</div>'
    +'<div class="card"><div class="cs">Pišem o <span class="hl">životu</span>.</div>'
    +'<div class="ce">I write about life. — o čemu? o životu</div>'
    +'<div class="cn">život (masc.) → <strong>životu</strong></div>'
    +spkBtn('Pišem o životu.')+'</div>'
    +'<div class="navrow">'
    +'<button class="btng" onclick="goPrev()">&#x2190; Nazad</button>'
    +'<button class="btnp" onclick="goNext()">Vreme →</button></div>'
  );

  mk('time',
    '<div class="slabel">'+SCREENS[3].label+'</div>'
    +'<div class="stitle">Vreme &middot; Time Expressions</div>'
    +'<div class="ibox"><strong>U + lokativ</strong> expresses time for <strong>months and years</strong>. '
    +'This answers: <strong>kada?</strong> (when?).<br><br>'
    +'<em>u januaru, u februaru … u decembru</em><br>'
    +'<em>u 2024. godini</em> (in 2024)<br><br>'
    +'<strong>Note:</strong> Days of the week use a different pattern (accusative): u ponedeljak, u petak.</div>'
    +'<div class="card"><div class="cs">Rođena je u <span class="hl">aprilu</span>.</div>'
    +'<div class="ce">She was born in April. — kada? u aprilu</div>'
    +'<div class="cn">april (masc.) → <strong>aprilu</strong></div>'
    +spkBtn('Rođena je u aprilu.')+'</div>'
    +'<div class="card"><div class="cs">Upisali smo se u <span class="hl">septembru</span>.</div>'
    +'<div class="ce">We enrolled in September. — kada? u septembru</div>'
    +'<div class="cn">septembar (masc.) → <strong>septembru</strong></div>'
    +spkBtn('Upisali smo se u septembru.')+'</div>'
    +'<div class="card"><div class="cs">Diplomirala je u <span class="hl">2023. godini</span>.</div>'
    +'<div class="ce">She graduated in 2023. — kada? u 2023. godini</div>'
    +'<div class="cn">godina (fem.) → <strong>godini</strong></div>'
    +spkBtn('Diplomirala je u 2023. godini.')+'</div>'
    +'<div class="navrow">'
    +'<button class="btng" onclick="goPrev()">&#x2190; Nazad</button>'
    +'<button class="btnp" onclick="goNext()">Nastavci →</button></div>'
  );

  mk('endings',
    '<div class="slabel">'+SCREENS[4].label+'</div>'
    +'<div class="stitle">Nastavci lokativa &middot; Locative Endings</div>'
    +'<div class="ibox">The locative is one of the <strong>simplest</strong> cases for endings. '
    +'Masculine and neuter nouns add <strong>-u</strong>. '
    +'Feminine nouns ending in <strong>-a</strong> change to <strong>-i</strong>. '
    +'Feminine nouns ending in a consonant also take <strong>-i</strong>.</div>'
    +'<table class="tbl">'
    +'<thead><tr><th>Rod &middot; Gender</th><th>Nominativ</th><th>Lokativ</th><th>Nastavak</th></tr></thead>'
    +'<tbody>'
    +'<tr><td><span class="hl3">Muški &middot; Masc.</span></td><td>grad, sto, život</td><td>gradu, stolu, životu</td><td><strong>-u</strong></td></tr>'
    +'<tr><td><span class="hl2">Srednji &middot; Neut.</span></td><td>selo, more, jezero</td><td>selu, moru, jezeru</td><td><strong>-u</strong></td></tr>'
    +'<tr><td><span class="hl">&#381;enski -a &middot; Fem.</span></td><td>škola, zemlja, soba</td><td>školi, zemlji, sobi</td><td><strong>-i</strong></td></tr>'
    +'<tr><td><span class="hl">&#381;enski cons. &middot; Fem.</span></td><td>budućnost, noć, stvar</td><td>budućnosti, noći, stvari</td><td><strong>-i</strong></td></tr>'
    +'</tbody></table>'
    +'<div class="ibox" style="margin-top:.75rem;background:rgba(255,190,0,.07);border-left:3px solid #f5a623;">'
    +'<strong>&#x26A0; Spelling rule:</strong> k, g, h before -i change: '
    +'k→c (reka→reci), g→z (noga→nozi), h→s (muha→musi). '
    +'But in everyday speech these alternations are common and worth memorizing in context.'
    +'</div>'
    +'<div class="card">'
    +'<div style="font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:10px;">Hear it in context</div>'
    +'<div class="cs">u <span class="hl3">gradu</span> &nbsp;&middot;&nbsp; na <span class="hl2">moru</span> &nbsp;&middot;&nbsp; u <span class="hl">školi</span></div>'
    +'<div class="ce">in the city &nbsp;&middot;&nbsp; at the sea &nbsp;&middot;&nbsp; in school</div>'
    +spkBtn('u gradu, na moru, u školi')+'</div>'
    +'<div class="navrow">'
    +'<button class="btng" onclick="goPrev()">&#x2190; Nazad</button>'
    +'<button class="btnp" onclick="goNext()">Vežba 1 →</button></div>'
  );

  const s1=EX1.filter((_,i)=>ex1s.checked[i]===true).length;
  const s2=EX2.filter((_,i)=>ex2s.checked[i]===true).length;
  mk('ex1',buildEx1HTML());
  mk('ex2',buildEx2HTML());
  mk('done',
    '<div class="slabel">'+SCREENS[SCREENS.length-1].label+'</div>'
    +'<div class="stitle">Lekcija 7a završena &middot; Lekcija 7a complete!</div>'
    +'<div class="score-wrap">'
    +'<div class="score-circle"><div class="score-num">'+s1+'/'+EX1.length+'</div><div class="score-lbl">Vežba 1</div></div>'
    +'<div class="score-circle"><div class="score-num">'+s2+'/'+EX2.length+'</div><div class="score-lbl">Vežba 2</div></div>'
    +'</div>'
    +'<div class="card"><div class="cs" style="font-size:15px;margin-bottom:8px;">Šta si naučio/la &middot; What you learned</div>'
    +'<ul style="padding-left:1.1rem;font-size:14px;color:var(--text-secondary);line-height:2.2;">'
    +'<li>Locative answers <strong>gde?</strong> (where?) and <strong>o kome/čemu?</strong> (about whom/what?)</li><li>Three uses: <strong>location</strong> (u/na + lok.), <strong>topic</strong> (o + lok.), <strong>time</strong> (u + lok. for months/years)</li><li>Locative <strong>never stands alone</strong> — always with a preposition</li><li>Masculine/Neuter → <strong>-u</strong>: grad→gradu, selo→selu</li><li>Feminine → <strong>-i</strong>: škola→školi, budućnost→budućnosti</li><li>k/g/h before -i alternate: reka→reci, noga→nozi</li>'
    +'</ul></div>'
    +'<div style="display:flex;flex-direction:column;gap:.6rem;margin-top:1.25rem;"><button class="btn-complete" onclick="markAndGoNext()">&#x279C; Slede&#263;a lekcija &mdash; Lekcija 7b — Lokativ: Zamenice</button><button class="btng" style="width:100%;text-align:center;" onclick="markAndGoHome()">&#x21A9; Vrati se na po&#269;etnu &middot; Back to home</button><button class="btng" style="width:100%;text-align:center;" onclick="restart()">&#x21BA; Ponovi lekciju &middot; Restart</button></div>'
  );
}

function goNext(){if(cur<SCREENS.length-1){cur++;render();window.scrollTo({top:0,behavior:'smooth'});}}
function goPrev(){if(cur>0){cur--;render();window.scrollTo({top:0,behavior:'smooth'});}}
function restart(){cur=0;ex1s={answers:{},checked:{}};ex2s={answers:{},checked:{}};render();}
function render(){
  buildScreens();buildProgress();
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.toggle('active',s.id==='sc-'+SCREENS[cur].id);
  });
}
function ex1pick(qi,oi){if(ex1s.checked[qi]!==undefined)return;ex1s.answers[qi]=oi;const d=document.getElementById('sc-ex1');if(d)d.innerHTML=buildEx1HTML();}
function ex2pick(qi,oi){if(ex2s.checked[qi]!==undefined)return;ex2s.answers[qi]=oi;const d=document.getElementById('sc-ex2');if(d)d.innerHTML=buildEx2HTML();}
function checkEx1(){EX1.forEach((_,i)=>{if(ex1s.answers[i]!==undefined)ex1s.checked[i]=(ex1s.answers[i]===EX1[i].correct);});const d=document.getElementById('sc-ex1');if(d)d.innerHTML=buildEx1HTML();}
function checkEx2(){EX2.forEach((_,i)=>{if(ex2s.answers[i]!==undefined)ex2s.checked[i]=(ex2s.answers[i]===EX2[i].correct);});const d=document.getElementById('sc-ex2');if(d)d.innerHTML=buildEx2HTML();}
render();

function markAndGoHome(){
  try{const p=JSON.parse(localStorage.getItem('serbian_course_progress')||'{}');p['L7a']=true;localStorage.setItem('serbian_course_progress',JSON.stringify(p));}catch(e){}
  window.location.href='serbian-course-home.html';
}
function markAndGoNext(){
  try{const p=JSON.parse(localStorage.getItem('serbian_course_progress')||'{}');p['L7a']=true;localStorage.setItem('serbian_course_progress',JSON.stringify(p));}catch(e){}
  window.location.href='serbian-lesson7b-lokativ-zamenice.html';
}
</script>
