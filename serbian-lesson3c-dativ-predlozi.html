<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serbian · Lekcija 3c · Dativ — Predlozi i vežba</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff; --bg-secondary: #f5f4f0; --bg-tertiary: #eeedea;
    --text-primary: #1a1a1a; --text-secondary: #6b6b6b; --text-tertiary: #9b9b9b;
    --border-light: rgba(0,0,0,0.1); --border-mid: rgba(0,0,0,0.18);
    --radius-md: 8px; --radius-lg: 12px;
    --teal-bg: #E1F5EE; --teal-text: #0F6E56; --teal-border: #1D9E75;
    --green-bg: #E1F5EE; --green-text: #0F6E56; --green-border: #1D9E75;
    --red-bg: #FCEBEB; --red-text: #A32D2D;
    --purple-bg: #EEEDFE; --purple-text: #534AB7; --purple-border: #7F77DD;
    --amber-bg: #FAEEDA; --amber-text: #633806; --amber-border: #BA7517;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary:#1e1e1e;--bg-secondary:#2a2a2a;--bg-tertiary:#333;
      --text-primary:#f0f0f0;--text-secondary:#a0a0a0;--text-tertiary:#666;
      --border-light:rgba(255,255,255,0.1);--border-mid:rgba(255,255,255,0.18);
      --teal-bg:#04342C;--teal-text:#9FE1CB;--teal-border:#1D9E75;
      --green-bg:#04342C;--green-text:#9FE1CB;--green-border:#1D9E75;
      --red-bg:#501313;--red-text:#F09595;
      --purple-bg:#26215C;--purple-text:#AFA9EC;
      --amber-bg:#412402;--amber-text:#FAC775;--amber-border:#BA7517;
    }
  }
  body{font-family:var(--font);background:var(--bg-tertiary);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;}
  .lesson-header{width:100%;max-width:680px;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;}
  .lesson-badge{background:var(--teal-bg);color:var(--teal-text);font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;}
  .lesson-name{font-size:14px;color:var(--text-secondary);}
  .lesson-series{font-size:12px;color:var(--text-tertiary);}
  .app{width:100%;max-width:680px;background:var(--bg-primary);border-radius:var(--radius-lg);border:0.5px solid var(--border-light);padding:2rem;}
  .progress-bar{display:flex;gap:6px;margin-bottom:1.75rem;}
  .pdot{height:5px;flex:1;border-radius:10px;background:var(--border-light);transition:background .3s;}
  .pdot.done{background:var(--teal-border);}
  .pdot.active{background:var(--teal-border);opacity:.45;}
  .screen{display:none;}.screen.active{display:block;}
  .slabel{font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.09em;margin-bottom:.5rem;}
  .stitle{font-size:21px;font-weight:500;color:var(--text-primary);margin-bottom:1.25rem;line-height:1.3;}
  .card{background:var(--bg-secondary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:.75rem;}
  .cs{font-size:17px;font-weight:500;color:var(--text-primary);margin-bottom:4px;}
  .ce{font-size:14px;color:var(--text-secondary);}
  .hl {background:var(--teal-bg);  color:var(--teal-text);  padding:1px 6px;border-radius:4px;font-weight:500;}
  .hl2{background:var(--purple-bg);color:var(--purple-text);padding:1px 6px;border-radius:4px;font-weight:500;}
  .hl3{background:var(--amber-bg); color:var(--amber-text); padding:1px 6px;border-radius:4px;font-weight:500;}
  .spk{display:inline-flex;align-items:center;gap:6px;background:none;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);padding:5px 12px;font-size:13px;color:var(--text-secondary);cursor:pointer;margin-top:8px;transition:background .15s;font-family:var(--font);}
  .spk:hover{background:var(--bg-tertiary);}
  .spk svg{width:14px;height:14px;flex-shrink:0;}
  .ibox{background:var(--bg-secondary);border-left:3px solid var(--teal-border);border-radius:0 var(--radius-md) var(--radius-md) 0;padding:.75rem 1rem;margin-bottom:1rem;font-size:14px;line-height:1.7;color:var(--text-secondary);}
  .ibox strong{color:var(--text-primary);font-weight:500;}
  .ibox-amber{border-left-color:var(--amber-border);}
  .ibox-purple{border-left-color:var(--purple-border);}
  .navrow{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;}
  .btnp{background:var(--teal-border);color:var(--teal-bg);border:none;border-radius:var(--radius-md);padding:10px 24px;font-size:15px;font-weight:500;cursor:pointer;transition:opacity .15s;font-family:var(--font);}
  .btnp:hover{opacity:.88;}
  .btnp:disabled{opacity:.4;cursor:default;}
  .btng{background:none;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);padding:10px 20px;font-size:15px;color:var(--text-secondary);cursor:pointer;font-family:var(--font);}
  .btng:hover{background:var(--bg-secondary);}
  .blank{display:inline-block;min-width:80px;border-bottom:2px solid var(--teal-border);text-align:center;padding:0 4px;font-weight:500;color:var(--teal-text);}
  .optsrow{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;}
  .opt{border:1.5px solid var(--border-mid);background:var(--bg-primary);border-radius:var(--radius-md);padding:9px 18px;font-size:15px;cursor:pointer;color:var(--text-primary);transition:all .15s;font-family:var(--font);}
  .opt:hover:not(.locked){border-color:var(--teal-border);background:var(--teal-bg);color:var(--teal-text);}
  .opt.sel{border-color:var(--teal-border);background:var(--teal-bg);color:var(--teal-text);}
  .opt.ok{border-color:var(--green-border);background:var(--green-bg);color:var(--green-text);}
  .opt.bad{border-color:#E24B4A;background:var(--red-bg);color:var(--red-text);}
  .opt.locked{cursor:default;}
  .fb{font-size:14px;padding:8px 12px;border-radius:var(--radius-md);margin-top:6px;line-height:1.5;}
  .fb.ok{background:var(--green-bg);color:var(--green-text);}
  .fb.bad{background:var(--red-bg);color:var(--red-text);}
  .prep-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:.75rem;}
  .prep-card{background:var(--bg-secondary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:.8rem 1rem;}
  .prep-word{font-size:18px;font-weight:500;color:var(--teal-text);margin-bottom:2px;}
  .prep-mean{font-size:13px;color:var(--text-secondary);}
  .prep-ex{font-size:13px;color:var(--text-tertiary);margin-top:4px;font-style:italic;}
  .case-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;vertical-align:middle;margin-left:4px;}
  .cb-teal{background:var(--teal-bg);color:var(--teal-text);}
  .cb-purple{background:var(--purple-bg);color:var(--purple-text);}
  .cb-amber{background:var(--amber-bg);color:var(--amber-text);}
  .tbl{width:100%;border-collapse:collapse;font-size:14px;margin-bottom:.75rem;}
  .tbl th{text-align:left;font-weight:500;font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.07em;padding:6px 10px;border-bottom:0.5px solid var(--border-light);}
  .tbl td{padding:9px 10px;border-bottom:0.5px solid var(--border-light);color:var(--text-primary);vertical-align:top;}
  .tbl tr:last-child td{border-bottom:none;}
  .tbl .dim{color:var(--text-secondary);}
  .score-wrap{display:flex;gap:16px;justify-content:center;margin-bottom:1.5rem;}
  .score-circle{width:90px;height:90px;border-radius:50%;border:3px solid var(--teal-border);display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .score-num{font-size:28px;font-weight:500;color:var(--teal-text);line-height:1;}
  .score-lbl{font-size:11px;color:var(--text-tertiary);}
  .review-row{padding:10px 0;border-bottom:0.5px solid var(--border-light);font-size:14px;display:flex;align-items:baseline;gap:10px;}
  .review-row:last-child{border-bottom:none;}
  .review-case{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-tertiary);min-width:55px;flex-shrink:0;}
  footer{margin-top:2rem;font-size:12px;color:var(--text-tertiary);text-align:center;}
  @media(max-width:480px){.app{padding:1.25rem;}.prep-grid{grid-template-columns:1fr 1fr;}}

  .home-link {
    font-size: 13px;
    color: var(--text-tertiary);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-light);
    transition: background .15s;
    cursor: pointer;
    background: none;
    font-family: var(--font);
  }
  .home-link:hover { background: var(--bg-secondary); color: var(--text-secondary); }
  .btn-complete {
    background: var(--green-border);
    color: var(--green-bg);
    border: none;
    border-radius: var(--radius-md);
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font);
    margin-top: .5rem;
    transition: opacity .15s;
    display: block;
    width: 100%;
    text-align: center;
  }
  .btn-complete:hover { opacity: .88; }

  </style>
 <!-- ResponsiveVoice TTS — better quality than browser built-in, supports Serbian -->

src="https://code.responsivevoice.org/responsivevoice.js?key=J0RsyXE5"></script>
</head>
<body>
<div class="lesson-header">
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="lesson-badge">Lekcija 3c · Lesson 3c</span>
    <span class="lesson-name">Dativ — predlozi i mešovita vežba</span>
  </div>
  <span class="lesson-series">3 od 3 lekcija o dativu</span>
</div>
<div class="app">
  <div class="progress-bar" id="pbar"></div>
  <div id="screens"></div>
</div>
<footer>Serbian Language Course · Lesson 3c · Dativ – Prepositions &amp; Review</footer>

<script>
const SCREENS=[
  {id:'preps'},
  {id:'freq-verbs'},
  {id:'ex1'},
  {id:'ex2'},
  {id:'done'},
];
let cur=0;
let ex1s={answers:{},checked:{}};
let ex2s={answers:{},checked:{}};

function speak(t){
  if(window.responsiveVoice){
    responsiveVoice.cancel();
    responsiveVoice.speak(t,"Serbian Male",{rate:0.9});
  } else {
    // fallback to browser TTS if ResponsiveVoice fails to load
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(t);
    u.lang='sr-RS';u.rate=0.85;
    window.speechSynthesis.speak(u);
  }
}
function spkBtn(t,l){
  return `<button class="spk" onclick="speak('${t.replace(/'/g,"\\'")}','${l||'sr-RS'}')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M10 3v14M6 6v8M14 5v10M2 8v4M18 7v6"/></svg>Slušaj</button>`;
}

// EX1: preposition + dative — choose the correct noun form
const EX1=[
  {
    prep:'k', meaning:'toward / to',
    s:'Idem k ___.',
    e:'I am going to (toward) the doctor.',
    prompt:'doktor (masc.)',
    opts:['doktoru','doktora','doktor'],
    correct:0,
    expl:'"K" always takes dative. Masculine noun doktor + -u = doktoru.',
    full:'Idem k doktoru.'
  },
  {
    prep:'prema', meaning:'toward / according to',
    s:'Pričamo prema ___.',
    e:'We talk according to the plan.',
    prompt:'plan (masc.)',
    opts:['planu','plana','plan'],
    correct:0,
    expl:'"Prema" takes dative. plan + -u = planu.',
    full:'Pričamo prema planu.'
  },
  {
    prep:'zahvaljujući', meaning:'thanks to',
    s:'Uspeli smo zahvaljujući ___.',
    e:'We succeeded thanks to the team.',
    prompt:'tim (masc.)',
    opts:['timu','tima','tim'],
    correct:0,
    expl:'"Zahvaljujući" takes dative. tim + -u = timu.',
    full:'Uspeli smo zahvaljujući timu.'
  },
  {
    prep:'nasuprot', meaning:'opposite to / contrary to',
    s:'Sjedi nasuprot ___.',
    e:'She sits opposite the school.',
    prompt:'škola (fem.)',
    opts:['školi','školu','škole'],
    correct:0,
    expl:'"Nasuprot" takes dative. škola drops -a and adds -i = školi.',
    full:'Sjedi nasuprot školi.'
  },
];

// EX2: mixed — identify what case is needed (noun vs pronoun), then choose form
const EX2=[
  {
    tag:'Noun or pronoun?',
    s:'Kažem ___ istinu.',
    e:'I tell her the truth.',
    hint:'Replace with a pronoun for "she".',
    opts:['joj','nju','ona','je'],
    correct:0,
    expl:'"Kažem" is a telling verb — receiver is dative. "She" in dative → short form "joj". "Nju"/"je" are accusative, "ona" is nominative.',
    full:'Kažem joj istinu.'
  },
  {
    tag:'Verb trigger',
    s:'Pisao sam ___ pismo celo veče.',
    e:'I wrote her a letter all evening.',
    hint:'Indirect object of "pisati" (to write).',
    opts:['joj','nju','je','njoj'],
    correct:0,
    expl:'"Pisati" takes dative for the receiver. Short form "joj" is correct in regular (non-emphatic) position.',
    full:'Pisao sam joj pismo celo veče.'
  },
  {
    tag:'Preposition',
    s:'Trčim k ___.',
    e:'I am running toward him.',
    hint:'After "k" — use long form.',
    opts:['njemu','mu','on','ga'],
    correct:0,
    expl:'After preposition "k" always use the long form. Masculine long dative = "njemu".',
    full:'Trčim k njemu.'
  },
  {
    tag:'Noun form in sentence',
    s:'Dajem ___ nagradu.',
    e:'I give the winner a prize.',
    hint:'pobednik (winner, masc.) in dative.',
    opts:['pobedniku','pobednika','pobednik','pobednikom'],
    correct:0,
    expl:'"Dajem" is a giving verb. The receiver "pobednik" (masc.) takes dative: pobednik + -u = pobedniku.',
    full:'Dajem pobedniku nagradu.'
  },
];

function buildProgress(){
  document.getElementById('pbar').innerHTML=SCREENS.map((s,i)=>
    `<div class="pdot ${i<cur?'done':i===cur?'active':''}"></div>`).join('');
}

function buildScreens(){
  const c=document.getElementById('screens');c.innerHTML='';
  const mk=(id,html)=>{
    const d=document.createElement('div');
    d.className=`screen ${id===SCREENS[cur].id?'active':''}`;
    d.id=`sc-${id}`;d.innerHTML=html;c.appendChild(d);
  };

  mk('preps',`
    <div class="slabel">Lekcija 3c · Lesson 3c</div>
    <div class="stitle">Predlozi uz dativ · Prepositions that take dative</div>
    <div class="ibox">
      Unlike genitive (which has many prepositions), dative has only a small set. Memorise these four and you have full coverage of dative prepositions in everyday Serbian.
    </div>
    <div class="prep-grid">
      <div class="prep-card">
        <div class="prep-word">k / ka</div>
        <div class="prep-mean">toward, to</div>
        <div class="prep-ex">Idem k mami.</div>
        ${spkBtn('Idem k mami.')}
      </div>
      <div class="prep-card">
        <div class="prep-word">prema</div>
        <div class="prep-mean">toward, according to</div>
        <div class="prep-ex">Prema planu.</div>
        ${spkBtn('Prema planu.')}
      </div>
      <div class="prep-card">
        <div class="prep-word">nasuprot</div>
        <div class="prep-mean">opposite, across from</div>
        <div class="prep-ex">Nasuprot školi.</div>
        ${spkBtn('Nasuprot školi.')}
      </div>
      <div class="prep-card">
        <div class="prep-word">zahvaljujući</div>
        <div class="prep-mean">thanks to</div>
        <div class="prep-ex">Zahvaljujući tebi.</div>
        ${spkBtn('Zahvaljujući tebi.')}
      </div>
    </div>
    <div class="ibox ibox-amber">
      <strong>Important:</strong> After all four of these prepositions, use the <em>long</em> dative pronoun form (njemu, njoj, njima…), never the short form. This was covered in Lesson 3b.
    </div>
    <div class="card">
      <div class="cs">Idem k <span class="hl">njemu</span>, ne k <span class="hl">njoj</span>.</div>
      <div class="ce">I am going to him, not to her.</div>
      ${spkBtn('Idem k njemu, ne k njoj.')}
    </div>
    <div class="navrow"><span></span><button class="btnp" onclick="goNext()">Glagoli · Verbs →</button></div>
  `);

  mk('freq-verbs',`
    <div class="slabel">Glagoli uz dativ · Verbs with dative</div>
    <div class="stitle">Najvažniji glagoli · Most important dative verbs</div>
    <div class="ibox ibox-purple">
      These verbs take a dative object because the action is <em>directed toward</em> a person. Learning them as fixed phrases is the fastest path to fluency with the dative.
    </div>
    <table class="tbl">
      <thead><tr><th>Glagol · Verb</th><th>Trigger question</th><th>Primer · Example</th></tr></thead>
      <tbody>
        <tr>
          <td><strong>dati</strong> — to give</td>
          <td class="dim">kome dajem?</td>
          <td>Dajem <span class="hl">mami</span> poklon. ${spkBtn('Dajem mami poklon.')}</td>
        </tr>
        <tr>
          <td><strong>pisati</strong> — to write</td>
          <td class="dim">kome pišem?</td>
          <td>Pišem <span class="hl">Marku</span>. ${spkBtn('Pišem Marku.')}</td>
        </tr>
        <tr>
          <td><strong>pričati / reći</strong> — to tell / say</td>
          <td class="dim">kome pričam?</td>
          <td>Pričam <span class="hl">detetu</span>. ${spkBtn('Pričam detetu.')}</td>
        </tr>
        <tr>
          <td><strong>pomagati</strong> — to help</td>
          <td class="dim">kome pomažem?</td>
          <td>Pomažem <span class="hl">bratu</span>. ${spkBtn('Pomažem bratu.')}</td>
        </tr>
        <tr>
          <td><strong>verovati</strong> — to trust / believe</td>
          <td class="dim">kome verujem?</td>
          <td>Verujem <span class="hl">drugu</span>. ${spkBtn('Verujem drugu.')}</td>
        </tr>
        <tr>
          <td><strong>smetati</strong> — to bother</td>
          <td class="dim">kome smeta?</td>
          <td>Smeta <span class="hl">mami</span>. ${spkBtn('Smeta mami.')}</td>
        </tr>
        <tr>
          <td><strong>trebati</strong> — to need (impers.)</td>
          <td class="dim">kome treba?</td>
          <td>Treba <span class="hl">meni</span>. ${spkBtn('Treba meni.')}</td>
        </tr>
      </tbody>
    </table>
    <div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button><button class="btnp" onclick="goNext()">Vežba 1 →</button></div>
  `);

  mk('ex1', buildEx1HTML());
  mk('ex2', buildEx2HTML());

  const s1=EX1.filter((_,i)=>ex1s.checked[i]===true).length;
  const s2=EX2.filter((_,i)=>ex2s.checked[i]===true).length;
  mk('done',`
    <div class="slabel">Završeno · Lekcija 3c</div>
    <div class="stitle">Čestitamo! · Congratulations!</div>
    <div class="score-wrap">
      <div class="score-circle"><div class="score-num">${s1}/${EX1.length}</div><div class="score-lbl">Vežba 1</div></div>
      <div class="score-circle"><div class="score-num">${s2}/${EX2.length}</div><div class="score-lbl">Vežba 2</div></div>
    </div>
    <div class="card">
      <div class="cs" style="font-size:15px;margin-bottom:8px;">Šta si naučio/la u svim 3 lekcijama o dativu</div>
      <div style="padding-top:4px;">
        <div class="review-row"><span class="review-case">3a</span><span>Noun endings: masculine/neuter → <strong>-u</strong>, feminine → <strong>-i</strong>; stem changes in neuter (dete → detetu)</span></div>
        <div class="review-row"><span class="review-case">3b</span><span>Short pronouns (mu, joj, nam…) for regular use; long forms (njemu, njoj…) for emphasis &amp; after prepositions</span></div>
        <div class="review-row"><span class="review-case">3c</span><span>Prepositions k, prema, nasuprot, zahvaljujući; transfer verbs (dati, pisati, pričati, pomagati, verovati)</span></div>
      </div>
    </div>
      <div style="display:flex;flex-direction:column;gap:.6rem;margin-top:1.25rem;">
      <button class="btn-complete" onclick="markAndGoNext()">&#x279C; Sledeće · Up next:</strong> Lekcija 4 — Akuzativ. The direct object case: what you see, touch, eat, love.</button>
      <button class="btng" style="width:100%;text-align:center;" onclick="markAndGoHome()">&#x21A9; Vrati se na početnu &middot; Back to home</button>
      <button class="btng" style="width:100%;text-align:center;" onclick="restart()">&#x21BA; Ponovi lekciju &middot; Restart</button>
    </div>

  `);
}

function buildEx1HTML(){
  let h=`<div class="slabel">Vežba 1 · Exercise 1</div>
    <div class="stitle">Predlog + dativ · Preposition + dative noun</div>
    <div class="ibox">Each sentence contains one of the four dative prepositions. Choose the correct dative form of the noun shown.</div>`;
  EX1.forEach((q,qi)=>{
    const chk=ex1s.checked[qi]!==undefined;
    const sel=ex1s.answers[qi];
    const filled=sel!==undefined?q.opts[sel]:'___';
    h+=`<div class="card" style="margin-bottom:1rem;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <span style="font-size:13px;background:var(--teal-bg);color:var(--teal-text);padding:2px 10px;border-radius:20px;font-weight:500;">${q.prep}</span>
        <span style="font-size:13px;color:var(--text-tertiary);">${q.meaning}</span>
      </div>
      <div style="font-size:17px;color:var(--text-primary);margin-bottom:4px;line-height:1.6;">
        ${q.s.replace('___',`<span class="blank">${filled}</span>`)}
      </div>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:2px;">${q.e}</div>
      <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:8px;">→ put <strong>${q.prompt}</strong> in the dative</div>
      <div class="optsrow">`;
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+=`<button class="${cls}" onclick="ex1pick(${qi},${oi})">${opt}</button>`;
    });
    h+=`</div>`;
    if(chk){
      h+=`<div class="fb ${ex1s.checked[qi]?'ok':'bad'}">${ex1s.checked[qi]?'Tačno!':'Netačno.'} — ${q.expl}</div>`;
      if(ex1s.checked[qi])h+=spkBtn(q.full);
    }
    h+=`</div>`;
  });
  const allA=EX1.every((_,i)=>ex1s.answers[i]!==undefined);
  const allC=EX1.every((_,i)=>ex1s.checked[i]!==undefined);
  h+=`<div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button>`;
  if(!allC)h+=`<button class="btnp" ${allA?'':'disabled'} onclick="checkEx1()">Proveri · Check</button>`;
  else h+=`<button class="btnp" onclick="goNext()">Mešovita vežba →</button>`;
  h+=`</div>`;return h;
}

function buildEx2HTML(){
  let h=`<div class="slabel">Vežba 2 · Mixed review</div>
    <div class="stitle">Mešovita vežba · Mixed dative exercise</div>
    <div class="ibox">Nouns, pronouns, after verbs, after prepositions — the tag above each question tells you what to think about.</div>`;
  EX2.forEach((q,qi)=>{
    const chk=ex2s.checked[qi]!==undefined;
    const sel=ex2s.answers[qi];
    const filled=sel!==undefined?q.opts[sel]:'___';
    h+=`<div class="card" style="margin-bottom:1rem;">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--teal-text);margin-bottom:6px;">${q.tag}</div>
      <div style="font-size:17px;color:var(--text-primary);margin-bottom:4px;line-height:1.6;">
        ${q.s.replace('___',`<span class="blank">${filled}</span>`)}
      </div>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:2px;">${q.e}</div>
      <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:8px;">${q.hint}</div>
      <div class="optsrow">`;
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+=`<button class="${cls}" onclick="ex2pick(${qi},${oi})">${opt}</button>`;
    });
    h+=`</div>`;
    if(chk){
      h+=`<div class="fb ${ex2s.checked[qi]?'ok':'bad'}">${ex2s.checked[qi]?'Tačno!':'Netačno.'} — ${q.expl}</div>`;
      if(ex2s.checked[qi])h+=spkBtn(q.full);
    }
    h+=`</div>`;
  });
  const allA=EX2.every((_,i)=>ex2s.answers[i]!==undefined);
  const allC=EX2.every((_,i)=>ex2s.checked[i]!==undefined);
  h+=`<div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button>`;
  if(!allC)h+=`<button class="btnp" ${allA?'':'disabled'} onclick="checkEx2()">Proveri · Check</button>`;
  else h+=`<button class="btnp" onclick="goNext()">Završetak →</button>`;
  h+=`</div>`;return h;
}

function ex1pick(qi,oi){if(ex1s.checked[qi]!==undefined)return;ex1s.answers[qi]=oi;refreshEx1();}
function refreshEx1(){
  const old=document.getElementById('sc-ex1');if(!old)return;
  const d=document.createElement('div');
  d.className=`screen ${SCREENS[cur].id==='ex1'?'active':''}`;
  d.id='sc-ex1';d.innerHTML=buildEx1HTML();old.replaceWith(d);
}
function checkEx1(){
  EX1.forEach((_,i)=>{if(ex1s.answers[i]!==undefined)ex1s.checked[i]=ex1s.answers[i]===EX1[i].correct;});
  refreshEx1();
}
function ex2pick(qi,oi){if(ex2s.checked[qi]!==undefined)return;ex2s.answers[qi]=oi;refreshEx2();}
function refreshEx2(){
  const old=document.getElementById('sc-ex2');if(!old)return;
  const d=document.createElement('div');
  d.className=`screen ${SCREENS[cur].id==='ex2'?'active':''}`;
  d.id='sc-ex2';d.innerHTML=buildEx2HTML();old.replaceWith(d);
}
function checkEx2(){
  EX2.forEach((_,i)=>{if(ex2s.answers[i]!==undefined)ex2s.checked[i]=ex2s.answers[i]===EX2[i].correct;});
  refreshEx2();
}
function goNext(){if(cur<SCREENS.length-1){cur++;render();window.scrollTo({top:0,behavior:'smooth'});}}
function goPrev(){if(cur>0){cur--;render();window.scrollTo({top:0,behavior:'smooth'});}}
function restart(){cur=0;ex1s={answers:{},checked:{}};ex2s={answers:{},checked:{}};render();}
function render(){
  buildScreens();buildProgress();
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.toggle('active',s.id===`sc-${SCREENS[cur].id}`);
  });
}
render();

  window.location.href='serbian-course-home.html';
}

}
