<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serbian · Lekcija 7c · Locative Prepositions</title>
  <style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f4f0;
    --bg-tertiary: #eeedea;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #9b9b9b;
    --border-light: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.18);
    --radius-md: 8px;
    --radius-lg: 12px;
    --coral-bg: #FAECE7;
    --coral-text: #993C1D;
    --coral-border: #D85A30;
    --coral-dark: #712B13;
    --purple-bg: #EEEDFE;
    --purple-text: #534AB7;
    --purple-border: #7F77DD;
    --green-bg: #E1F5EE;
    --green-text: #0F6E56;
    --green-border: #1D9E75;
    --blue-bg: #EEEDFE;
    --blue-text: #534AB7;
    --red-bg: #FCEBEB;
    --red-text: #A32D2D;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #2a2a2a;
      --bg-tertiary: #333;
      --text-primary: #f0f0f0;
      --text-secondary: #a0a0a0;
      --text-tertiary: #666;
      --border-light: rgba(255,255,255,0.1);
      --border-mid: rgba(255,255,255,0.18);
      --coral-bg: #4A1B0C;
      --coral-text: #F0997B;
      --coral-border: #D85A30;
      --coral-dark: #F5C4B3;
      --purple-bg: #26215C;
      --purple-text: #AFA9EC;
      --purple-border: #7F77DD;
      --green-bg: #04342C;
      --green-text: #9FE1CB;
      --green-border: #1D9E75;
      --red-bg: #501313;
      --red-text: #F09595;
    }
  }
  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  .lesson-header {
    width: 100%;
    max-width: 680px;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .lesson-title-row { display: flex; align-items: center; gap: 12px; }
  .lesson-badge {
    background: var(--coral-bg);
    color: var(--coral-text);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .lesson-name { font-size: 14px; color: var(--text-secondary); }
  .app {
    width: 100%;
    max-width: 680px;
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border-light);
    padding: 2rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .progress-bar { display: flex; gap: 6px; margin-bottom: 1.75rem; }
  .pdot { height: 5px; flex: 1; border-radius: 10px; background: var(--border-light); transition: background .3s; }
  .pdot.done { background: var(--green-border); }
  .pdot.active { background: var(--coral-border); }
  .screen { display: none; }
  .screen.active { display: block; }
  .slabel { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .09em; margin-bottom: .5rem; }
  .stitle { font-size: 21px; font-weight: 500; color: var(--text-primary); margin-bottom: 1.25rem; line-height: 1.3; }
  .card {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: .75rem;
  }
  .cs { font-size: 17px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
  .ce { font-size: 14px; color: var(--text-secondary); }
  .cn { font-size: 13px; color: var(--coral-text); margin-top: 6px; }
  .hl  { background: var(--coral-bg);  color: var(--coral-text);  padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .hl2 { background: var(--green-bg);  color: var(--green-text);  padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .hl3 { background: var(--purple-bg); color: var(--purple-text); padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .spk {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md); padding: 5px 12px;
    font-size: 13px; color: var(--text-secondary);
    cursor: pointer; margin-top: 8px; transition: background .15s;
    font-family: var(--font);
  }
  .spk:hover { background: var(--bg-tertiary); }
  .spk svg { width: 14px; height: 14px; flex-shrink: 0; }
  .ibox {
    background: var(--bg-secondary);
    border-left: 3px solid var(--coral-border);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
    padding: .75rem 1rem;
    margin-bottom: 1rem;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
  }
  .ibox-purple { border-left-color: var(--purple-border); }
  .ibox strong { color: var(--text-primary); font-weight: 500; }
  .navrow { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .btnp {
    background: var(--coral-border); color: var(--coral-bg);
    border: none; border-radius: var(--radius-md);
    padding: 10px 24px; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: opacity .15s; font-family: var(--font);
  }
  .btnp:hover { opacity: .88; }
  .btnp:disabled { opacity: .4; cursor: default; }
  .btng {
    background: none; border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md); padding: 10px 20px;
    font-size: 15px; color: var(--text-secondary);
    cursor: pointer; font-family: var(--font);
  }
  .btng:hover { background: var(--bg-secondary); }
  .blank { display: inline-block; min-width: 80px; border-bottom: 2px solid var(--coral-border); text-align: center; padding: 0 4px; font-weight: 500; color: var(--coral-text); }
  .optsrow { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 1rem; }
  .opt {
    border: 1.5px solid var(--border-mid); background: var(--bg-primary);
    border-radius: var(--radius-md); padding: 9px 18px;
    font-size: 15px; cursor: pointer; color: var(--text-primary);
    transition: all .15s; font-family: var(--font);
  }
  .opt:hover:not(.locked) { border-color: var(--coral-border); background: var(--coral-bg); color: var(--coral-text); }
  .opt.sel { border-color: var(--coral-border); background: var(--coral-bg); color: var(--coral-text); }
  .opt.ok  { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); }
  .opt.bad { border-color: #E24B4A; background: var(--red-bg); color: var(--red-text); }
  .opt.locked { cursor: default; }
  .fb { font-size: 14px; padding: 8px 12px; border-radius: var(--radius-md); margin-bottom: .75rem; line-height: 1.5; }
  .fb.ok  { background: var(--green-bg); color: var(--green-text); }
  .fb.bad { background: var(--red-bg);   color: var(--red-text); }
  .match-wrap { display: grid; grid-template-columns: 1fr 28px 1fr; gap: 10px; align-items: start; }
  .mcol { display: flex; flex-direction: column; gap: 8px; }
  .mi {
    border: 1.5px solid var(--border-mid); border-radius: var(--radius-md);
    padding: 9px 14px; font-size: 14px; background: var(--bg-primary);
    cursor: pointer; transition: all .15s; color: var(--text-primary);
    line-height: 1.4; min-height: 52px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .mi:hover:not(.locked) { border-color: var(--coral-border); background: var(--coral-bg); color: var(--coral-text); }
  .mi.sel-l  { border-color: var(--coral-border); background: var(--coral-bg); color: var(--coral-text); }
  .mi.ok     { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); cursor: default; }
  .mi.bad    { border-color: #E24B4A; background: var(--red-bg); color: var(--red-text); }
  .mi.locked { cursor: default; }
  .arr { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; }
  .arrline { height: 52px; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); font-size: 15px; }
  .tbl { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: .75rem; }
  .tbl th { text-align: left; font-weight: 500; font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .06em; padding: 6px 10px; border-bottom: 0.5px solid var(--border-light); }
  .tbl td { padding: 9px 10px; border-bottom: 0.5px solid var(--border-light); color: var(--text-primary); }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl .dim { color: var(--text-secondary); }
  .prep-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
  .prep-card { background: var(--bg-tertiary); border-radius: var(--radius-md); padding: 8px; text-align: center; }
  .prep-word { font-weight: 500; font-size: 15px; color: var(--text-primary); }
  .prep-mean { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .use-label { font-size: 13px; font-weight: 500; color: var(--coral-text); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
  .score-wrap { display: flex; gap: 16px; justify-content: center; margin-bottom: 1.5rem; }
  .score-circle {
    width: 90px; height: 90px; border-radius: 50%;
    border: 3px solid var(--green-border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-num { font-size: 28px; font-weight: 500; color: var(--green-text); line-height: 1; }
  .score-lbl { font-size: 11px; color: var(--text-tertiary); }
  footer { margin-top: 2rem; font-size: 12px; color: var(--text-tertiary); text-align: center; }
  @media (max-width: 480px) {
    .prep-grid { grid-template-columns: repeat(2,1fr); }
    .app { padding: 1.25rem; }
  }

  
  .home-link {
    font-size: 13px; color: var(--text-tertiary); text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border-light);
    transition: background .15s; cursor: pointer;
    background: none; font-family: var(--font);
  }
  .home-link:hover { background: var(--bg-secondary); color: var(--text-secondary); }
  .btn-complete {
    background: var(--green-border); color: #fff;
    border: none; border-radius: var(--radius-md);
    padding: 12px 28px; font-size: 15px; font-weight: 500;
    cursor: pointer; font-family: var(--font);
    transition: opacity .15s; display: block;
    width: 100%; text-align: center;
  }
  .btn-complete:hover { opacity: .88; }

  
  .home-link {
    font-size:13px;color:var(--text-tertiary);text-decoration:none;
    display:inline-flex;align-items:center;gap:4px;
    padding:4px 10px;border-radius:var(--radius-md);
    border:0.5px solid var(--border-light);
    transition:background .15s;cursor:pointer;
    background:none;font-family:var(--font);
  }
  .home-link:hover{background:var(--bg-secondary);color:var(--text-secondary);}
  .btn-complete{
    background:var(--green-border);color:#fff;
    border:none;border-radius:var(--radius-md);
    padding:12px 28px;font-size:15px;font-weight:500;
    cursor:pointer;font-family:var(--font);
    transition:opacity .15s;display:block;
    width:100%;text-align:center;
  }
  .btn-complete:hover{opacity:.88;}
  </style>
</head>
<body>
<div class="lesson-header">
  <div class="lesson-title-row">
    <span class="lesson-badge">Lekcija 7c</span>
    <span class="lesson-name">Lokativ — Predlozi &middot; Locative Prepositions</span>
  </div>
  <a class="home-link" href="serbian-course-home.html">&#x2190; Kurs</a>
</div>
<div class="app">
  <div class="progress-bar" id="pbar"></div>
  <div id="screens"></div>
</div>
<footer>Serbian Language Course &middot; Lekcija 7c &middot; Locative Prepositions</footer>
<script>
const SCREENS=[
  {id:'intro', label:'Lekcija 7c · Lesson 7c'},
  {id:'u-na', label:'U i Na · U and Na'},
  {id:'o-po', label:'O i Po · O and Po'},
  {id:'pri', label:'Pri · Pri'},
  {id:'ex1', label:'Vežba 1 · Exercise 1'},
  {id:'ex2', label:'Vežba 2 · Exercise 2'},
  {id:'done', label:'Završeno · Done'},
];
let cur=0;
let ex1s={answers:{},checked:{}};
let ex2s={answers:{},checked:{}};

function speak(t,l){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang=l||'sr-RS';u.rate=0.85;
  window.speechSynthesis.speak(u);
}
function spkBtn(t,l){
  const lang = l || 'sr-RS';
  const safe = t.replace(/'/g,"\\'");
  return '<button class="spk" onclick="speak(\'' + safe + '\',\'' + lang + '\')">'
    + '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">'
    + '<path d="M10 3v14M6 6v8M14 5v10M2 8v4M18 7v6"/>'
    + '</svg>Slušaj · Listen</button>';
}

const EX1=[
  {s:'Šetamo po ___.', e:'We walk around the park.',
   opts:['parku', 'park', 'parka'], correct:0, audio:'Šetamo po parku.',
   expl:'Po + locative = movement across/around a place. Park → <strong>parku</strong>.'},
  {s:'Uvek nosi novac pri ___.', e:'He always carries money on him (lit. at himself).',
   opts:['sebi', 'sebe', 'sobom'], correct:0, audio:'Uvek nosi novac pri sebi.',
   expl:"Pri + locative: pri sebi = on oneself, in one's possession. Sebe → <strong>sebi</strong>."},
  {s:'Deca trče po ___.', e:'Children run around the house.',
   opts:['kući', 'kuću', 'kuće'], correct:0, audio:'Deca trče po kući.',
   expl:'Po + locative: kuća (fem.) → <strong>kući</span>. Movement distributed across a space.'},
  {s:'Telefon je na ___.', e:'The phone is on the table.',
   opts:['stolu', 'sto', 'stola'], correct:0, audio:'Telefon je na stolu.',
   expl:'Na + locative = static location on a surface. Sto → <strong>stolu</strong>.'},
  {s:'Stavi telefon na ___.', e:'Put the phone on the table.',
   opts:['sto', 'stolu', 'stola'], correct:0, audio:'Stavi telefon na sto.',
   expl:'Na + <strong>accusative</strong> = motion/direction. Sto stays as <strong>sto</strong> (accusative = nominative for inanimate masc.). Compare: na stolu (static) vs. na sto (motion).'}
];

const EX2=[
  {s:'Sedi u sobi.', e:'She sits in the room.',
   opts:['u + lokativ (statično)', 'u + akuzativ (kretanje)', 'na + lokativ'], correct:0,
   expl:'<strong>U + lokativ</strong>: static location inside an enclosed space. Soba → sobi.'},
  {s:'Idi u sobu.', e:'Go into the room.',
   opts:['u + lokativ (statično)', 'u + akuzativ (kretanje)', 'na + lokativ'], correct:1,
   expl:'<strong>U + akuzativ</strong>: motion into a space. Soba → sobu. Compare: u sobi (location) vs. u sobu (direction).'},
  {s:'Knjige su po polici.', e:'Books are scattered across the shelf.',
   opts:['po + lokativ', 'na + lokativ', 'u + lokativ'], correct:0,
   expl:'<strong>Po + lokativ</strong>: distribution across a surface or area. Polica → polici.'},
  {s:'Uvek ima telefon pri sebi.', e:'She always has her phone on her.',
   opts:['pri + lokativ', 'u + lokativ', 'na + lokativ'], correct:0,
   expl:"<strong>Pri + lokativ</strong>: possession/proximity. Pri sebi = on one's person."},
  {s:'Pričamo o poslu.', e:'We talk about work.',
   opts:['o + lokativ (tema)', 'na + lokativ (mesto)', 'po + lokativ (kretanje)'], correct:0,
   expl:'<strong>O + lokativ</strong>: topic. Posao → poslu. Ask: o čemu pričamo?'}
];

function buildProgress(){
  document.getElementById('pbar').innerHTML=SCREENS.map((s,i)=>
    '<div class="pdot '+(i<cur?'done':i===cur?'active':'')+'" title="'+(s.label||'')+'"></div>').join('');
}
function buildScreens(){
  const c=document.getElementById('screens');c.innerHTML='';
  const mk=(id,html)=>{
    const d=document.createElement('div');
    d.className='screen '+(id===SCREENS[cur].id?'active':'');
    d.id='sc-'+id;d.innerHTML=html;c.appendChild(d);
  };
  buildAllScreens(mk);
}
function buildEx1HTML(){
  let h='<div class="slabel">'+SCREENS.find(s=>s.id==='ex1').label+'</div>';
  h+='<div class="ibox">Izaberi tačan instrumental. Pick the correct instrumental form.</div>';
  EX1.forEach((q,qi)=>{
    const chk=ex1s.checked[qi]!==undefined;
    const sel=ex1s.answers[qi];
    const filled=sel!==undefined?q.opts[sel]:'___';
    h+='<div class="card" style="margin-bottom:1rem;">'
      +'<div style="font-size:17px;color:var(--text-primary);margin-bottom:4px;line-height:1.6;">'
      +q.s.replace('___','<span class="blank">'+filled+'</span>')+'</div>'
      +'<div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">'+q.e+'</div>'
      +'<div class="optsrow">';
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+='<button class="'+cls+'" onclick="ex1pick('+qi+','+oi+')">'+opt+'</button>';
    });
    h+='</div>';
    if(chk)h+='<div class="fb '+(ex1s.checked[qi]?'ok':'bad')+'">'+(ex1s.checked[qi]?'Tačno! ✓':'Netačno.')+' — '+q.expl+'</div>';
    h+=spkBtn(q.audio||q.s.replace('___',q.opts[q.correct]).replace(/<[^>]+>/g,''))+'</div>';
  });
  const allA=EX1.every((_,i)=>ex1s.answers[i]!==undefined);
  const allC=EX1.every((_,i)=>ex1s.checked[i]!==undefined);
  h+='<div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button>';
  if(!allC)h+='<button class="btnp" '+(allA?'':'disabled')+' onclick="checkEx1()">Proveri</button>';
  else h+='<button class="btnp" onclick="goNext()">Vežba 2 →</button>';
  h+='</div>';return h;
}
function buildEx2HTML(){
  let h='<div class="slabel">'+SCREENS.find(s=>s.id==='ex2').label+'</div>';
  h+='<div class="ibox">Prepoznaj upotrebu instrumentala. Identify the use of the instrumental.</div>';
  EX2.forEach((q,qi)=>{
    const chk=ex2s.checked[qi]!==undefined;
    const sel=ex2s.answers[qi];
    h+='<div class="card" style="margin-bottom:1rem;">'
      +'<div class="cs">'+q.s+'</div>'
      +'<div class="ce">'+q.e+'</div>'
      +'<div class="optsrow" style="margin-top:10px;">';
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+='<button class="'+cls+'" onclick="ex2pick('+qi+','+oi+')">'+opt+'</button>';
    });
    h+='</div>';
    if(chk)h+='<div class="fb '+(ex2s.checked[qi]?'ok':'bad')+'">'+(ex2s.checked[qi]?'Tačno! ✓':'Netačno.')+' — '+q.expl+'</div>';
    h+='</div>';
  });
  const allA=EX2.every((_,i)=>ex2s.answers[i]!==undefined);
  const allC=EX2.every((_,i)=>ex2s.checked[i]!==undefined);
  h+='<div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button>';
  if(!allC)h+='<button class="btnp" '+(allA?'':'disabled')+' onclick="checkEx2()">Proveri</button>';
  else h+='<button class="btnp" onclick="goNext()">Završetak →</button>';
  h+='</div>';return h;
}

function buildAllScreens(mk){
  mk('intro',
    '<div class="slabel">'+SCREENS[0].label+'</div>'
    +'<div class="stitle">Lokativ — Predlozi &middot; Locative Prepositions</div>'
    +'<div class="ibox" style="border-left:3px solid var(--coral-border);">'
    +'<strong>Pet predloga lokativa</strong><br><br>'
    +'Serbian locative is <strong>always used with a preposition</strong>. The five locative prepositions are:<br><br>'
    +'<strong>u</strong> — in (static location inside)<br>'
    +'<strong>na</strong> — on/at (surface or activity place)<br>'
    +'<strong>o</strong> — about (topic)<br>'
    +'<strong>po</strong> — around/across (distributed movement or coverage)<br>'
    +'<strong>pri</strong> — at/in the presence of, on one’s person<br><br>'
    +'The critical pair: <em>u</em> and <em>na</em> also take the <strong>accusative</strong> for motion — '
    +'locative = <strong>where something is</strong>, accusative = <strong>where something goes</strong>.'
    +'</div>'
    +'<div class="prep-grid">'
    +'<div class="prep-card"><div class="prep-word">u</div><div class="prep-mean">in (static)</div><div class="prep-ex">u gradu</div></div>'
    +'<div class="prep-card"><div class="prep-word">na</div><div class="prep-mean">on/at (static)</div><div class="prep-ex">na stolu</div></div>'
    +'<div class="prep-card"><div class="prep-word">o</div><div class="prep-mean">about</div><div class="prep-ex">o poslu</div></div>'
    +'<div class="prep-card"><div class="prep-word">po</div><div class="prep-mean">around/across</div><div class="prep-ex">po kući</div></div>'
    +'<div class="prep-card"><div class="prep-word">pri</div><div class="prep-mean">at/on one’s person</div><div class="prep-ex">pri sebi</div></div>'
    +'</div>'
    +'<div class="navrow"><span></span><button class="btnp" onclick="goNext()">U i Na →</button></div>'
  );

  mk('u-na',
    '<div class="slabel">'+SCREENS[1].label+'</div>'
    +'<div class="stitle">U i Na &middot; Location vs. Motion</div>'
    +'<div class="ibox">This is the <strong>most important distinction</strong> in Serbian prepositions. '
    +'<em>U</em> and <em>na</em> each govern <strong>two cases</strong> depending on whether there is motion:<br><br>'
    +'Static (where?) → <strong>locative</strong><br>'
    +'Motion (where to?) → <strong>accusative</strong></div>'
    +'<table class="tbl">'
    +'<thead><tr><th>Pitanje</th><th>Predlog + Padež</th><th>Primer</th></tr></thead>'
    +'<tbody>'
    +'<tr><td><strong>Gde si?</strong> (static)</td><td>u + lokativ</td><td>Ja sam u <strong>školi</strong>.</td></tr>'
    +'<tr><td><strong>Kuda ideš?</strong> (motion)</td><td>u + akuzativ</td><td>Idem u <strong>školu</strong>.</td></tr>'
    +'<tr><td><strong>Gde je?</strong> (static)</td><td>na + lokativ</td><td>Knjiga je na <strong>stolu</strong>.</td></tr>'
    +'<tr><td><strong>Kuda staviš?</strong> (motion)</td><td>na + akuzativ</td><td>Stavi na <strong>sto</strong>.</td></tr>'
    +'</tbody></table>'
    +'<div class="card">'
    +'<div class="cs">Marko je u <span class="hl">školi</span>. &nbsp;↔;&nbsp; Marko ide u <span class="hl3">školu</span>.</div>'
    +'<div class="ce">Marko is in school. &nbsp;↔;&nbsp; Marko goes to school.</div>'
    +spkBtn('Marko je u školi. Marko ide u školu.')+'</div>'
    +'<div class="navrow">'
    +'<button class="btng" onclick="goPrev()">&#x2190; Nazad</button>'
    +'<button class="btnp" onclick="goNext()">O i Po →</button></div>'
  );

  mk('o-po',
    '<div class="slabel">'+SCREENS[2].label+'</div>'
    +'<div class="stitle">O i Po &middot; About and Across</div>'
    +'<div class="ibox ibox-green"><strong>O + lokativ</strong> = topic of speech, thought, writing, knowledge. '
    +'Pair it with verbs: pričati o, misliti o, pisati o, čitati o, znati o, brinuti o.<br><br>'
    +'<strong>Po + lokativ</strong> = movement <em>around</em> or <em>across</em> a space, or distribution over a surface/group. '
    +'It suggests the action is spread out: šetati po gradu (wander around the city), '
    +'knjige po stolu (books scattered on the table).</div>'
    +'<div class="card"><div class="cs">Šetamo po <span class="hl">gradu</span>.</div>'
    +'<div class="ce">We wander around the city.</div>'
    +'<div class="cn">po + lokativ: grad → <strong>gradu</strong></div>'
    +spkBtn('Šetamo po gradu.')+'</div>'
    +'<div class="card"><div class="cs">Knjige su po <span class="hl">stolu</span>.</div>'
    +'<div class="ce">Books are scattered across the table.</div>'
    +'<div class="cn">po + lokativ: sto → <strong>stolu</strong></div>'
    +spkBtn('Knjige su po stolu.')+'</div>'
    +'<div class="card"><div class="cs">Brine o <span class="hl">deci</span>.</div>'
    +'<div class="ce">She takes care of the children.</div>'
    +'<div class="cn">o + lokativ: deca → <strong>deci</strong></div>'
    +spkBtn('Brine o deci.')+'</div>'
    +'<div class="navrow">'
    +'<button class="btng" onclick="goPrev()">&#x2190; Nazad</button>'
    +'<button class="btnp" onclick="goNext()">Pri →</button></div>'
  );

  mk('pri',
    '<div class="slabel">'+SCREENS[3].label+'</div>'
    +'<div class="stitle">Pri &middot; In the Presence of / On One’s Person</div>'
    +'<div class="ibox"><strong>Pri + lokativ</strong> has two common meanings:<br><br>'
    +'1. <strong>On one’s person / in one’s possession</strong>: pri sebi (on oneself), pri ruci (at hand, handy)<br>'
    +'2. <strong>In the presence of / attached to</strong>: pri bolnici (attached to the hospital), '
    +'pri kraju (near the end)<br><br>'
    +'It is less frequent than u/na/o but useful in specific expressions.</div>'
    +'<div class="card"><div class="cs">Uvek imam lek pri <span class="hl">sebi</span>.</div>'
    +'<div class="ce">I always have medicine on me.</div>'
    +'<div class="cn">pri sebi = on one’s person (reflexive lokativ)</div>'
    +spkBtn('Uvek imam lek pri sebi.')+'</div>'
    +'<div class="card"><div class="cs">Apoteka je pri <span class="hl">bolnici</span>.</div>'
    +'<div class="ce">The pharmacy is attached to the hospital.</div>'
    +'<div class="cn">pri + lokativ: bolnica (fem.) → <strong>bolnici</strong></div>'
    +spkBtn('Apoteka je pri bolnici.')+'</div>'
    +'<div class="card"><div class="cs">Stigli smo pri <span class="hl">kraju</span>.</div>'
    +'<div class="ce">We arrived near the end.</div>'
    +'<div class="cn">pri + lokativ: kraj (masc.) → <strong>kraju</strong></div>'
    +spkBtn('Stigli smo pri kraju.')+'</div>'
    +'<div class="navrow">'
    +'<button class="btng" onclick="goPrev()">&#x2190; Nazad</button>'
    +'<button class="btnp" onclick="goNext()">Vežba 1 →</button></div>'
  );

  const s1=EX1.filter((_,i)=>ex1s.checked[i]===true).length;
  const s2=EX2.filter((_,i)=>ex2s.checked[i]===true).length;
  mk('ex1',buildEx1HTML());
  mk('ex2',buildEx2HTML());
  mk('done',
    '<div class="slabel">'+SCREENS[SCREENS.length-1].label+'</div>'
    +'<div class="stitle">Lekcija 7c završena &middot; Lekcija 7c complete!</div>'
    +'<div class="score-wrap">'
    +'<div class="score-circle"><div class="score-num">'+s1+'/'+EX1.length+'</div><div class="score-lbl">Vežba 1</div></div>'
    +'<div class="score-circle"><div class="score-num">'+s2+'/'+EX2.length+'</div><div class="score-lbl">Vežba 2</div></div>'
    +'</div>'
    +'<div class="card"><div class="cs" style="font-size:15px;margin-bottom:8px;">Šta si naučio/la &middot; What you learned</div>'
    +'<ul style="padding-left:1.1rem;font-size:14px;color:var(--text-secondary);line-height:2.2;">'
    +'<li>Five locative prepositions: <strong>u, na, o, po, pri</strong></li><li><strong>U/na + lokativ</strong> = static location; <strong>u/na + akuzativ</strong> = motion/direction</li><li><strong>O + lokativ</strong> = topic (pričati o, misliti o, pisati o)</li><li><strong>Po + lokativ</strong> = movement around/across, distribution</li><li><strong>Pri + lokativ</strong> = on one’s person, attached to (pri sebi, pri bolnici)</li>'
    +'</ul></div>'
    +'<div style="display:flex;flex-direction:column;gap:.6rem;margin-top:1.25rem;"><button class="btn-complete" onclick="markAndGoHome()">&#x21A9; Vrati se na po&#269;etnu &middot; Back to home</button><button class="btng" style="width:100%;text-align:center;" onclick="restart()">&#x21BA; Ponovi lekciju &middot; Restart</button></div>'
    +'<div class="ibox" style="border-left:3px solid var(--green-border);background:var(--green-bg);color:var(--green-text);margin-top:1.25rem;"><strong>&#x1F389; Kurs završen &middot; Course complete!</strong><br><br>You have completed all 7 lessons of this Serbian grammar course — nominative through locative. You now know how all six Serbian cases work, how nouns, pronouns, and adjectives change, and how prepositions govern those changes.<br><br><strong>Svaka čast &middot; Well done!</strong></div>'
  );
}

function goNext(){if(cur<SCREENS.length-1){cur++;render();window.scrollTo({top:0,behavior:'smooth'});}}
function goPrev(){if(cur>0){cur--;render();window.scrollTo({top:0,behavior:'smooth'});}}
function restart(){cur=0;ex1s={answers:{},checked:{}};ex2s={answers:{},checked:{}};render();}
function render(){
  buildScreens();buildProgress();
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.toggle('active',s.id==='sc-'+SCREENS[cur].id);
  });
}
function ex1pick(qi,oi){if(ex1s.checked[qi]!==undefined)return;ex1s.answers[qi]=oi;const d=document.getElementById('sc-ex1');if(d)d.innerHTML=buildEx1HTML();}
function ex2pick(qi,oi){if(ex2s.checked[qi]!==undefined)return;ex2s.answers[qi]=oi;const d=document.getElementById('sc-ex2');if(d)d.innerHTML=buildEx2HTML();}
function checkEx1(){EX1.forEach((_,i)=>{if(ex1s.answers[i]!==undefined)ex1s.checked[i]=(ex1s.answers[i]===EX1[i].correct);});const d=document.getElementById('sc-ex1');if(d)d.innerHTML=buildEx1HTML();}
function checkEx2(){EX2.forEach((_,i)=>{if(ex2s.answers[i]!==undefined)ex2s.checked[i]=(ex2s.answers[i]===EX2[i].correct);});const d=document.getElementById('sc-ex2');if(d)d.innerHTML=buildEx2HTML();}
render();

function markAndGoHome(){
  try{const p=JSON.parse(localStorage.getItem('serbian_course_progress')||'{}');p['L7c']=true;localStorage.setItem('serbian_course_progress',JSON.stringify(p));}catch(e){}
  window.location.href='serbian-course-home.html';
}
</script>
</body>
