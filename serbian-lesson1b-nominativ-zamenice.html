<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serbian · Lekcija 1b · Nominativ — Zamenice</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f4f0;
    --bg-tertiary: #eeedea;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #9b9b9b;
    --border-light: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.18);
    --radius-md: 8px;
    --radius-lg: 12px;
    --purple-bg: #EEEDFE;
    --purple-text: #534AB7;
    --purple-border: #7F77DD;
    --green-bg: #E1F5EE;
    --green-text: #0F6E56;
    --green-border: #1D9E75;
    --red-bg: #FCEBEB;
    --red-text: #A32D2D;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #2a2a2a;
      --bg-tertiary: #333;
      --text-primary: #f0f0f0;
      --text-secondary: #a0a0a0;
      --text-tertiary: #666;
      --border-light: rgba(255,255,255,0.1);
      --border-mid: rgba(255,255,255,0.18);
      --purple-bg: #26215C;
      --purple-text: #AFA9EC;
      --purple-border: #7F77DD;
      --green-bg: #04342C;
      --green-text: #9FE1CB;
      --green-border: #1D9E75;
      --red-bg: #501313;
      --red-text: #F09595;
    }
  }
  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  .lesson-header {
    width: 100%;
    max-width: 680px;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .lesson-title-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .lesson-badge {
    background: var(--purple-bg);
    color: var(--purple-text);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .lesson-name {
    font-size: 14px;
    color: var(--text-secondary);
  }
  .app {
    width: 100%;
    max-width: 680px;
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border-light);
    padding: 2rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .progress-bar { display: flex; gap: 6px; margin-bottom: 1.75rem; }
  .pdot { height: 5px; flex: 1; border-radius: 10px; background: var(--border-light); transition: background .3s; }
  .pdot.done { background: var(--green-border); }
  .pdot.active { background: var(--purple-border); }
  .screen { display: none; }
  .screen.active { display: block; }
  .slabel { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .09em; margin-bottom: .5rem; }
  .stitle { font-size: 21px; font-weight: 500; color: var(--text-primary); margin-bottom: 1.25rem; line-height: 1.3; }
  .card {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: .75rem;
  }
  .cs { font-size: 17px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
  .ce { font-size: 14px; color: var(--text-secondary); }
  .cn { font-size: 13px; color: var(--purple-text); margin-top: 6px; }
  .hl { background: var(--purple-bg); color: var(--purple-text); padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .hl2 { background: var(--green-bg); color: var(--green-text); padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .spk {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md); padding: 5px 12px;
    font-size: 13px; color: var(--text-secondary);
    cursor: pointer; margin-top: 8px; transition: background .15s;
    font-family: var(--font);
  }
  .spk:hover { background: var(--bg-tertiary); }
  .spk svg { width: 14px; height: 14px; flex-shrink: 0; }
  .ibox {
    background: var(--bg-secondary);
    border-left: 3px solid var(--purple-border);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
    padding: .75rem 1rem;
    margin-bottom: 1rem;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
  }
  .ibox strong { color: var(--text-primary); font-weight: 500; }
  .navrow { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .btnp {
    background: #534AB7; color: #EEEDFE;
    border: none; border-radius: var(--radius-md);
    padding: 10px 24px; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: opacity .15s; font-family: var(--font);
  }
  .btnp:hover { opacity: .88; }
  .btnp:disabled { opacity: .4; cursor: default; }
  .btng {
    background: none; border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md); padding: 10px 20px;
    font-size: 15px; color: var(--text-secondary);
    cursor: pointer; font-family: var(--font);
  }
  .btng:hover { background: var(--bg-secondary); }
  .pair-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: .75rem; }
  .pair-card {
    background: var(--bg-secondary); border: 0.5px solid var(--border-light);
    border-radius: var(--radius-lg); padding: .9rem 1rem;
  }
  .pair-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px; }
  .pair-text { font-size: 16px; font-weight: 500; color: var(--text-primary); }
  .pair-sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .blank { display: inline-block; min-width: 80px; border-bottom: 2px solid var(--purple-border); text-align: center; padding: 0 4px; font-weight: 500; color: var(--purple-text); }
  .optsrow { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 1rem; }
  .opt {
    border: 1.5px solid var(--border-mid); background: var(--bg-primary);
    border-radius: var(--radius-md); padding: 9px 18px;
    font-size: 15px; cursor: pointer; color: var(--text-primary);
    transition: all .15s; font-family: var(--font);
  }
  .opt:hover:not(.locked) { border-color: var(--purple-border); background: var(--purple-bg); color: var(--purple-text); }
  .opt.sel { border-color: var(--purple-border); background: var(--purple-bg); color: var(--purple-text); }
  .opt.ok { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); }
  .opt.bad { border-color: #E24B4A; background: var(--red-bg); color: var(--red-text); }
  .opt.locked { cursor: default; }
  .fb { font-size: 14px; padding: 8px 12px; border-radius: var(--radius-md); margin-bottom: .75rem; line-height: 1.5; }
  .fb.ok { background: var(--green-bg); color: var(--green-text); }
  .fb.bad { background: var(--red-bg); color: var(--red-text); }
  .match-wrap { display: grid; grid-template-columns: 1fr 28px 1fr; gap: 10px; align-items: start; }
  .mcol { display: flex; flex-direction: column; gap: 8px; }
  .mi {
    border: 1.5px solid var(--border-mid); border-radius: var(--radius-md);
    padding: 9px 14px; font-size: 14px; background: var(--bg-primary);
    cursor: pointer; transition: all .15s; color: var(--text-primary); line-height: 1.4;
    min-height: 52px; display: flex; flex-direction: column; justify-content: center;
  }
  .mi:hover:not(.locked) { border-color: var(--purple-border); background: var(--purple-bg); color: var(--purple-text); }
  .mi.sel-l { border-color: var(--purple-border); background: var(--purple-bg); color: var(--purple-text); }
  .mi.ok { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); cursor: default; }
  .mi.bad { border-color: #E24B4A; background: var(--red-bg); color: var(--red-text); }
  .mi.locked { cursor: default; }
  .arr { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; padding-top: 2px; }
  .arrline { height: 52px; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); font-size: 15px; }
  .score-wrap { display: flex; gap: 16px; justify-content: center; margin-bottom: 1.5rem; }
  .score-circle {
    width: 90px; height: 90px; border-radius: 50%;
    border: 3px solid var(--green-border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-num { font-size: 28px; font-weight: 500; color: var(--green-text); line-height: 1; }
  .score-lbl { font-size: 11px; color: var(--text-tertiary); }
  .sub-label { font-size: 14px; color: var(--text-secondary); font-weight: 500; margin-bottom: 1rem; margin-top: .75rem; }
  footer {
    margin-top: 2rem;
    font-size: 12px;
    color: var(--text-tertiary);
    text-align: center;
  }
  @media (max-width: 480px) {
    .pair-grid { grid-template-columns: 1fr; }
    .app { padding: 1.25rem; }
  }

  .home-link {
    font-size: 13px; color: var(--text-tertiary); text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border-light);
    transition: background .15s; cursor: pointer;
    background: none; font-family: var(--font);
  }
  .home-link:hover { background: var(--bg-secondary); color: var(--text-secondary); }
  .btn-complete {
    background: var(--green-border); color: #fff;
    border: none; border-radius: var(--radius-md);
    padding: 12px 28px; font-size: 15px; font-weight: 500;
    cursor: pointer; font-family: var(--font);
    transition: opacity .15s; display: block;
    width: 100%; text-align: center;
  }
  .btn-complete:hover { opacity: .88; }

  </style>

<script

</head>
<body>

<div class="lesson-header">
  <div class="lesson-title-row">
    <span class="lesson-badge">Lekcija 1b</span>
    <span class="lesson-name">Nominativ — Zamenice · Pronouns</span>
  </div>
  <span style="font-size:12px;color:var(--text-tertiary)">2 od 2 lekcije o nominativu</span>
</div>

<div class="app">
  <div class="progress-bar" id="pbar"></div>
  <div id="screens"></div>
</div>

<footer>Serbian Language Course · Lesson 1b · Nominativ – Pronouns</footer>

<script>
const SCREENS=[
  {id:'intro',   label:'Lekcija 1b · Lesson 1b'},
  {id:'table',   label:'Tabela · Table'},
  {id:'examples',label:'Primeri · Examples'},
  {id:'ex1',     label:'Vežba 1 · Exercise 1'},
  {id:'ex2',     label:'Vežba 2 · Exercise 2'},
  {id:'done',    label:'Završeno · Done'},
];
let cur=0;
let ex1s={answers:{},checked:{}};
let ex2s={answers:{},checked:{}};

function speak(t){
  if(window.responsiveVoice){
    responsiveVoice.cancel();
    responsiveVoice.speak(t,"Serbian Male",{rate:0.9});
  } else {
    // fallback to browser TTS if ResponsiveVoice fails to load
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(t);
    u.lang='sr-RS';u.rate=0.85;
    window.speechSynthesis.speak(u);
  }
}
function spkBtn(t){
  return `<button class="spk" onclick="speak('${t.replace(/'/g,"\\'")}','sr-RS')">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <path d="M10 3v14M6 6v8M14 5v10M2 8v4M18 7v6"/>
    </svg>Slušaj · Listen</button>`;
}

// EX1: Choose the correct nominative pronoun for the sentence
const EX1=[
  {s:'_____ čita knjigu.',e:'_____ is reading a book. (she)',
    opts:['Ona','On','Oni','One'],correct:0,
    expl:'<strong>Ona</strong> (she) — singular feminine. "On" is masculine, "Oni/One" are plural.'},
  {s:'_____ su prijatelji.',e:'_____ are friends. (they, masc./mixed)',
    opts:['Oni','One','On','Ona'],correct:0,
    expl:'<strong>Oni</strong> (they, masculine/mixed group) — masculine plural. "One" is feminine plural.'},
  {s:'_____ je student.',e:'_____ is a student. (he)',
    opts:['On','Ona','Oni','Ono'],correct:0,
    expl:'<strong>On</strong> (he) — singular masculine. "Ona" is feminine, "Oni" is plural.'},
  {s:'_____ pevaju.',e:'_____ are singing. (they, fem.)',
    opts:['One','Oni','Ona','On'],correct:0,
    expl:'<strong>One</strong> (they, feminine group) — feminine plural. "Oni" is masculine/mixed plural.'},
  {s:'_____ smo u školi.',e:'_____ are in school. (we)',
    opts:['Mi','Vi','Oni','Ja'],correct:0,
    expl:'<strong>Mi</strong> (we) — first person plural. "Vi" is you plural, "Oni" is they.'},
];

// EX2: Replace the noun with the correct nominative pronoun
const EX2=[
  {noun:'Marko voli kafu.',e:'Marko loves coffee.',
    q:'Replace "Marko" with the correct nominative pronoun.',
    opts:['On voli kafu.','Ona voli kafu.','Oni vole kafu.'],correct:0,
    expl:'Marko is masculine singular → <strong>On</strong> (he). "Ona" is feminine, "Oni" is plural.'},
  {noun:'Ana čita novine.',e:'Ana reads the newspaper.',
    q:'Replace "Ana" with the correct nominative pronoun.',
    opts:['Ona čita novine.','On čita novine.','One čitaju novine.'],correct:0,
    expl:'Ana is feminine singular → <strong>Ona</strong> (she). "On" is masculine, "One" is feminine plural.'},
  {noun:'Dete spava.',e:'The child is sleeping.',
    q:'Replace "dete" with the correct nominative pronoun.',
    opts:['Ono spava.','On spava.','Ona spava.'],correct:0,
    expl:'Dete is neuter singular → <strong>Ono</strong> (it). Serbian uses "ono" for neuter nouns.'},
  {noun:'Marko i Ana putuju.',e:'Marko and Ana are travelling.',
    q:'Replace "Marko i Ana" with the correct nominative pronoun.',
    opts:['Oni putuju.','One putuju.','Mi putujemo.'],correct:0,
    expl:'Mixed group (male + female) → <strong>Oni</strong> (they, masc./mixed). "One" is feminine-only group.'},
];

function buildProgress(){
  document.getElementById('pbar').innerHTML=SCREENS.map((s,i)=>
    `<div class="pdot ${i<cur?'done':i===cur?'active':''}"></div>`).join('');
}

function buildScreens(){
  const c=document.getElementById('screens');c.innerHTML='';
  const mk=(id,html)=>{
    const d=document.createElement('div');
    d.className=`screen ${id===SCREENS[cur].id?'active':''}`;
    d.id=`sc-${id}`;d.innerHTML=html;c.appendChild(d);
  };

  mk('intro',`
    <div class="slabel">${SCREENS[0].label}</div>
    <div class="stitle">Nominativ — Zamenice · Nominative Pronouns</div>
    <div class="ibox">
      In Lesson 1a we learned that nouns take the nominative as the subject. Instead of repeating the noun, Serbian uses <strong>nominative pronouns</strong>. Each pronoun must match the <em>gender and number</em> of the noun it replaces.<br><br>
      U lekciji 1a naučili smo da imenice u nominativu funkcionišu kao subjekat. Umesto ponavljanja imenice, srpski koristi <strong>nominativne zamenice</strong>. Svaka zamenica mora se slagati sa <em>rodom i brojem</em> imenice koju zamenjuje.
    </div>
    <div class="card">
      <div class="cs"><span class="hl">Marko</span> voli kafu. → <span class="hl2">On</span> voli kafu.</div>
      <div class="ce">Marko loves coffee. → He loves coffee.</div>
      <div class="cn">Marko (masc.) → On (he)</div>
      ${spkBtn('On voli kafu.')}
    </div>
    <div class="card">
      <div class="cs"><span class="hl">Ana</span> čita. → <span class="hl2">Ona</span> čita.</div>
      <div class="ce">Ana is reading. → She is reading.</div>
      <div class="cn">Ana (fem.) → Ona (she)</div>
      ${spkBtn('Ona čita.')}
    </div>
    <div class="card">
      <div class="cs"><span class="hl">Dete</span> spava. → <span class="hl2">Ono</span> spava.</div>
      <div class="ce">The child is sleeping. → It is sleeping.</div>
      <div class="cn">Dete (neuter) → Ono (it)</div>
      ${spkBtn('Ono spava.')}
    </div>
    <div class="navrow"><span></span><button class="btnp" onclick="goNext()">Tabela · Table →</button></div>
  `);

  mk('table',`
    <div class="slabel">${SCREENS[1].label}</div>
    <div class="stitle">Sve nominativne zamenice · All nominative pronouns</div>
    <div class="ibox">Learn all nominative personal pronouns. Pay attention to gender in the third person singular and plural.</div>
    <table style="width:100%;border-collapse:collapse;font-size:14px;margin-bottom:.75rem;">
      <thead>
        <tr style="border-bottom:0.5px solid var(--border-light);">
          <th style="text-align:left;font-weight:500;font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.07em;padding:6px 10px;">Person</th>
          <th style="text-align:left;font-weight:500;font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.07em;padding:6px 10px;">Pronoun</th>
          <th style="text-align:left;font-weight:500;font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.07em;padding:6px 10px;">English</th>
          <th style="text-align:left;font-weight:500;font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.07em;padding:6px 10px;">Example</th>
        </tr>
      </thead>
      <tbody>
        <tr style="border-bottom:0.5px solid var(--border-light);"><td style="padding:9px 10px;">1st sg.</td><td style="padding:9px 10px;font-weight:500;color:var(--purple-text);font-size:15px;">ja</td><td style="padding:9px 10px;color:var(--text-secondary);">I</td><td style="padding:9px 10px;">Ja sam student.</td></tr>
        <tr style="border-bottom:0.5px solid var(--border-light);"><td style="padding:9px 10px;">2nd sg.</td><td style="padding:9px 10px;font-weight:500;color:var(--purple-text);font-size:15px;">ti</td><td style="padding:9px 10px;color:var(--text-secondary);">you</td><td style="padding:9px 10px;">Ti si moj prijatelj.</td></tr>
        <tr style="border-bottom:0.5px solid var(--border-light);"><td style="padding:9px 10px;">3rd sg. masc.</td><td style="padding:9px 10px;font-weight:500;color:var(--purple-text);font-size:15px;">on</td><td style="padding:9px 10px;color:var(--text-secondary);">he / it (masc.)</td><td style="padding:9px 10px;">On čita.</td></tr>
        <tr style="border-bottom:0.5px solid var(--border-light);"><td style="padding:9px 10px;">3rd sg. fem.</td><td style="padding:9px 10px;font-weight:500;color:var(--purple-text);font-size:15px;">ona</td><td style="padding:9px 10px;color:var(--text-secondary);">she / it (fem.)</td><td style="padding:9px 10px;">Ona peva.</td></tr>
        <tr style="border-bottom:0.5px solid var(--border-light);"><td style="padding:9px 10px;">3rd sg. neut.</td><td style="padding:9px 10px;font-weight:500;color:var(--purple-text);font-size:15px;">ono</td><td style="padding:9px 10px;color:var(--text-secondary);">it (neuter)</td><td style="padding:9px 10px;">Ono spava.</td></tr>
        <tr style="border-bottom:0.5px solid var(--border-light);"><td style="padding:9px 10px;">1st pl.</td><td style="padding:9px 10px;font-weight:500;color:var(--purple-text);font-size:15px;">mi</td><td style="padding:9px 10px;color:var(--text-secondary);">we</td><td style="padding:9px 10px;">Mi smo ovde.</td></tr>
        <tr style="border-bottom:0.5px solid var(--border-light);"><td style="padding:9px 10px;">2nd pl.</td><td style="padding:9px 10px;font-weight:500;color:var(--purple-text);font-size:15px;">vi</td><td style="padding:9px 10px;color:var(--text-secondary);">you pl. / formal</td><td style="padding:9px 10px;">Vi ste tu.</td></tr>
        <tr style="border-bottom:0.5px solid var(--border-light);"><td style="padding:9px 10px;">3rd pl. masc.</td><td style="padding:9px 10px;font-weight:500;color:var(--purple-text);font-size:15px;">oni</td><td style="padding:9px 10px;color:var(--text-secondary);">they (masc./mixed)</td><td style="padding:9px 10px;">Oni putuju.</td></tr>
        <tr><td style="padding:9px 10px;">3rd pl. fem.</td><td style="padding:9px 10px;font-weight:500;color:var(--purple-text);font-size:15px;">one</td><td style="padding:9px 10px;color:var(--text-secondary);">they (fem. only)</td><td style="padding:9px 10px;">One pevaju.</td></tr>
      </tbody>
    </table>
    <div class="ibox" style="margin-top:.25rem;">
      <strong>⚠ Note:</strong> <em>Vi</em> is also used as a formal singular (like French "vous"). <em>Oni</em> is used for mixed-gender groups.
    </div>
    <div class="navrow">
      <button class="btng" onclick="goPrev()">← Nazad</button>
      <button class="btnp" onclick="goNext()">Primeri · Examples →</button>
    </div>
  `);

  mk('examples',`
    <div class="slabel">${SCREENS[2].label}</div>
    <div class="stitle">Imenica → Zamenica · Noun → Pronoun</div>
    <div class="ibox">
      Watch how each noun is replaced by the pronoun that matches its gender. The sentence structure stays the same — only the subject word changes.
    </div>
    <div class="pair-grid">
      <div class="pair-card">
        <div class="pair-label">Noun</div>
        <div class="pair-text"><span class="hl">Marko</span> voli kafu.</div>
        <div class="pair-sub">Marko loves coffee.</div>
      </div>
      <div class="pair-card">
        <div class="pair-label">Pronoun</div>
        <div class="pair-text"><span class="hl2">On</span> voli kafu.</div>
        <div class="pair-sub">He loves coffee.</div>
        ${spkBtn('On voli kafu.')}
      </div>
    </div>
    <div class="pair-grid">
      <div class="pair-card">
        <div class="pair-label">Noun</div>
        <div class="pair-text"><span class="hl">Ana</span> čita novine.</div>
        <div class="pair-sub">Ana reads the newspaper.</div>
      </div>
      <div class="pair-card">
        <div class="pair-label">Pronoun</div>
        <div class="pair-text"><span class="hl2">Ona</span> čita novine.</div>
        <div class="pair-sub">She reads the newspaper.</div>
        ${spkBtn('Ona čita novine.')}
      </div>
    </div>
    <div class="pair-grid">
      <div class="pair-card">
        <div class="pair-label">Noun</div>
        <div class="pair-text"><span class="hl">Dete</span> spava.</div>
        <div class="pair-sub">The child is sleeping.</div>
      </div>
      <div class="pair-card">
        <div class="pair-label">Pronoun</div>
        <div class="pair-text"><span class="hl2">Ono</span> spava.</div>
        <div class="pair-sub">It is sleeping.</div>
        ${spkBtn('Ono spava.')}
      </div>
    </div>
    <div class="navrow">
      <button class="btng" onclick="goPrev()">← Nazad</button>
      <button class="btnp" onclick="goNext()">Vežba 1 →</button>
    </div>
  `);

  mk('ex1', buildEx1HTML());
  mk('ex2', buildEx2HTML());

  const s1=EX1.filter((_,i)=>ex1s.checked[i]===true).length;
  const s2=EX2.filter((_,i)=>ex2s.checked[i]===true).length;
  mk('done',`
    <div class="slabel">${SCREENS[5].label}</div>
    <div class="stitle">Lekcija 1b završena · Lesson 1b complete!</div>
    <div class="score-wrap">
      <div class="score-circle"><div class="score-num">${s1}/${EX1.length}</div><div class="score-lbl">Vežba 1</div></div>
      <div class="score-circle"><div class="score-num">${s2}/${EX2.length}</div><div class="score-lbl">Vežba 2</div></div>
    </div>
    <div class="card">
      <div class="cs" style="font-size:15px;margin-bottom:8px;">Šta si naučio/la · What you learned</div>
      <ul style="padding-left:1.1rem;font-size:14px;color:var(--text-secondary);line-height:2.1;">
        <li>Nominative pronouns replace noun subjects in the same case</li>
        <li>Pronouns must match the <strong>gender and number</strong> of the noun</li>
        <li>3rd person singular: <strong>on</strong> (he/masc.), <strong>ona</strong> (she/fem.), <strong>ono</strong> (it/neuter)</li>
        <li>3rd person plural: <strong>oni</strong> (masc./mixed), <strong>one</strong> (fem. only)</li>
        <li><strong>Vi</strong> is also used as a polite singular form</li>
      </ul>
    </div>
    <div style="display:flex;flex-direction:column;gap:.6rem;margin-top:1.25rem;">
      <button class="btn-complete" onclick="markAndGoNext()">&#x279C; Sledeća lekcija &mdash; Lekcija 2a — Genitiv: Imenice</button>
      <button class="btng" style="width:100%;text-align:center;" onclick="markAndGoHome()">&#x21A9; Vrati se na početnu &middot; Back to home</button>
      <button class="btng" style="width:100%;text-align:center;" onclick="restart()">&#x21BA; Ponovi lekciju &middot; Restart</button>
    </div>
  `);
}

function buildEx1HTML(){
  let h=`<div class="slabel">${SCREENS[3].label}</div>
    <div class="stitle">Izaberi tačnu zamenicu · Choose the correct pronoun</div>
    <div class="ibox">Choose the correct <strong>nominative pronoun</strong>. Pay attention to gender and number — the hint in brackets tells you what gender/number is expected.</div>`;
  EX1.forEach((q,qi)=>{
    const chk=ex1s.checked[qi]!==undefined;
    const sel=ex1s.answers[qi];
    const filled=sel!==undefined?q.opts[sel]:'?';
    h+=`<div class="card" style="margin-bottom:1rem;">
      <div style="font-size:17px;color:var(--text-primary);margin-bottom:4px;line-height:1.6;">
        ${q.s.replace('_____',`<span class="blank">${filled}</span>`)}
      </div>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">${q.e}</div>
      <div class="optsrow">`;
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+=`<button class="${cls}" onclick="ex1pick(${qi},${oi})">${opt}</button>`;
    });
    h+=`</div>`;
    if(chk){
      h+=`<div class="fb ${ex1s.checked[qi]?'ok':'bad'}">${ex1s.checked[qi]?'Tačno! Correct':'Netačno. Not quite'} — ${q.expl}</div>`;
      h+=spkBtn(q.s.replace('_____',q.opts[q.correct]));
    }
    h+=`</div>`;
  });
  const allA=EX1.every((_,i)=>ex1s.answers[i]!==undefined);
  const allC=EX1.every((_,i)=>ex1s.checked[i]!==undefined);
  h+=`<div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button>`;
  if(!allC)h+=`<button class="btnp" ${allA?'':'disabled'} onclick="checkEx1()">Proveri · Check</button>`;
  else h+=`<button class="btnp" onclick="goNext()">Vežba 2 →</button>`;
  h+=`</div>`;return h;
}

function buildEx2HTML(){
  let h=`<div class="slabel">${SCREENS[4].label}</div>
    <div class="stitle">Zameni imenicu zamenicom · Replace the noun</div>
    <div class="ibox">The subject noun is shown. Choose the rewritten sentence that replaces it with the correct <strong>nominative pronoun</strong>.</div>`;
  EX2.forEach((q,qi)=>{
    const chk=ex2s.checked[qi]!==undefined;
    const sel=ex2s.answers[qi];
    h+=`<div class="card" style="margin-bottom:1rem;">
      <div style="font-size:16px;color:var(--text-primary);margin-bottom:2px;">${q.noun}</div>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:6px;">${q.e}</div>
      <div style="font-size:13px;color:var(--text-tertiary);margin-bottom:8px;">${q.q}</div>
      <div class="optsrow">`;
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+=`<button class="${cls}" onclick="ex2pick(${qi},${oi})" style="font-size:14px;">${opt}</button>`;
    });
    h+=`</div>`;
    if(chk){
      h+=`<div class="fb ${ex2s.checked[qi]?'ok':'bad'}">${ex2s.checked[qi]?'Tačno! Correct':'Netačno. Not quite'} — ${q.expl}</div>`;
      h+=spkBtn(q.opts[q.correct]);
    }
    h+=`</div>`;
  });
  const allA=EX2.every((_,i)=>ex2s.answers[i]!==undefined);
  const allC=EX2.every((_,i)=>ex2s.checked[i]!==undefined);
  h+=`<div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button>`;
  if(!allC)h+=`<button class="btnp" ${allA?'':'disabled'} onclick="checkEx2()">Proveri · Check</button>`;
  else h+=`<button class="btnp" onclick="goNext()">Završetak · Finish →</button>`;
  h+=`</div>`;return h;
}

function ex1pick(qi,oi){if(ex1s.checked[qi]!==undefined)return;ex1s.answers[qi]=oi;refreshEx1();}
function refreshEx1(){
  const old=document.getElementById('sc-ex1');if(!old)return;
  const d=document.createElement('div');
  d.className=`screen ${SCREENS[cur].id==='ex1'?'active':''}`;
  d.id='sc-ex1';d.innerHTML=buildEx1HTML();old.replaceWith(d);
}
function checkEx1(){EX1.forEach((_,i)=>{if(ex1s.answers[i]!==undefined)ex1s.checked[i]=ex1s.answers[i]===EX1[i].correct;});refreshEx1();}
function ex2pick(qi,oi){if(ex2s.checked[qi]!==undefined)return;ex2s.answers[qi]=oi;refreshEx2();}
function refreshEx2(){
  const old=document.getElementById('sc-ex2');if(!old)return;
  const d=document.createElement('div');
  d.className=`screen ${SCREENS[cur].id==='ex2'?'active':''}`;
  d.id='sc-ex2';d.innerHTML=buildEx2HTML();old.replaceWith(d);
}
function checkEx2(){EX2.forEach((_,i)=>{if(ex2s.answers[i]!==undefined)ex2s.checked[i]=ex2s.answers[i]===EX2[i].correct;});refreshEx2();}
function goNext(){if(cur<SCREENS.length-1){cur++;render();window.scrollTo({top:0,behavior:'smooth'});}}
function goPrev(){if(cur>0){cur--;render();window.scrollTo({top:0,behavior:'smooth'});}}
function restart(){cur=0;ex1s={answers:{},checked:{}};ex2s={answers:{},checked:{}};render();}
function render(){buildScreens();buildProgress();
  document.querySelectorAll('.screen').forEach(s=>{s.classList.toggle('active',s.id===`sc-${SCREENS[cur].id}`); });
}
render();

function markAndGoHome(){
  try{
    const p=JSON.parse(localStorage.getItem('serbian_course_progress')||'{}');
    p['L1b']=true;
    localStorage.setItem('serbian_course_progress',JSON.stringify(p));
  }catch(e){}
  window.location.href='serbian-course-home.html';
}

    const p=JSON.parse(localStorage.getItem('serbian_course_progress')||'{}');

    localStorage.setItem('serbian_course_progress',JSON.stringify(p));
  }catch(e){}
  window.location.href='serbian-lesson2a-genitiv-imenice.html';
