  <style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f4f0;
    --bg-tertiary: #eeedea;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #9b9b9b;
    --border-light: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.18);
    --radius-md: 8px;
    --radius-lg: 12px;
    --coral-bg: #FAECE7;
    --coral-text: #993C1D;
    --coral-border: #D85A30;
    --coral-dark: #712B13;
    --purple-bg: #EEEDFE;
    --purple-text: #534AB7;
    --purple-border: #7F77DD;
    --green-bg: #E1F5EE;
    --green-text: #0F6E56;
    --green-border: #1D9E75;
    --blue-bg: #EEEDFE;
    --blue-text: #534AB7;
    --red-bg: #FCEBEB;

  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #2a2a2a;
      --bg-tertiary: #333;
      --text-primary: #f0f0f0;
      --text-secondary: #a0a0a0;
      --text-tertiary: #666;
      --border-light: rgba(255,255,255,0.1);
      --border-mid: rgba(255,255,255,0.18);
      --coral-bg: #4A1B0C;
      --coral-text: #F0997B;
      --coral-border: #D85A30;
      --coral-dark: #F5C4B3;
      --purple-bg: #26215C;
      --purple-text: #AFA9EC;
      --purple-border: #7F77DD;
      --green-bg: #04342C;
      --green-text: #9FE1CB;
      --green-border: #1D9E75;
      --red-bg: #501313;
      --red-text: #F09595;
    }
  }
  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  .lesson-header {
    width: 100%;
    max-width: 680px;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .lesson-title-row { display: flex; align-items: center; gap: 12px; }
  .lesson-badge {
    background: var(--coral-bg);
    color: var(--coral-text);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .lesson-name { font-size: 14px; color: var(--text-secondary); }
  .app {
    width: 100%;
    max-width: 680px;
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border-light);
    padding: 2rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .progress-bar { display: flex; gap: 6px; margin-bottom: 1.75rem; }
  .pdot { height: 5px; flex: 1; border-radius: 10px; background: var(--border-light); transition: background .3s; }
  .pdot.done { background: var(--green-border); }
  .pdot.active { background: var(--coral-border); }
  .screen { display: none; }
  .screen.active { display: block; }
  .slabel { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .09em; margin-bottom: .5rem; }
  .stitle { font-size: 21px; font-weight: 500; color: var(--text-primary); margin-bottom: 1.25rem; line-height: 1.3; }
  .card {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: .75rem;
  }
  .cs { font-size: 17px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
  .ce { font-size: 14px; color: var(--text-secondary); }
  .cn { font-size: 13px; color: var(--coral-text); margin-top: 6px; }
  .hl  { background: var(--coral-bg);  color: var(--coral-text);  padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .hl2 { background: var(--green-bg);  color: var(--green-text);  padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .hl3 { background: var(--purple-bg); color: var(--purple-text); padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .spk {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md); padding: 5px 12px;
    font-size: 13px; color: var(--text-secondary);
    cursor: pointer; margin-top: 8px; transition: background .15s;
    font-family: var(--font);
  }
  .spk:hover { background: var(--bg-tertiary); }
  .spk svg { width: 14px; height: 14px; flex-shrink: 0; }
  .ibox {
    background: var(--bg-secondary);
    border-left: 3px solid var(--coral-border);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
    padding: .75rem 1rem;
    margin-bottom: 1rem;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
  }
  .ibox-purple { border-left-color: var(--purple-border); }
  .ibox strong { color: var(--text-primary); font-weight: 500; }
  .navrow { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .btnp {
    background: var(--coral-border); color: var(--coral-bg);
    border: none; border-radius: var(--radius-md);
    padding: 10px 24px; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: opacity .15s; font-family: var(--font);
  }
  .btnp:hover { opacity: .88; }
  .btnp:disabled { opacity: .4; cursor: default; }
  .btng {
    background: none; border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md); padding: 10px 20px;
    font-size: 15px; color: var(--text-secondary);
    cursor: pointer; font-family: var(--font);
  }
  .btng:hover { background: var(--bg-secondary); }
  .blank { display: inline-block; min-width: 80px; border-bottom: 2px solid var(--coral-border); text-align: center; padding: 0 4px; font-weight: 500; color: var(--coral-text); }
  .optsrow { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 1rem; }
  .opt {
    border: 1.5px solid var(--border-mid); background: var(--bg-primary);
    border-radius: var(--radius-md); padding: 9px 18px;
    font-size: 15px; cursor: pointer; color: var(--text-primary);
    transition: all .15s; font-family: var(--font);
  }
  .opt:hover:not(.locked) { border-color: var(--coral-border); background: var(--coral-bg); color: var(--coral-text); }
  .opt.sel { border-color: var(--coral-border); background: var(--coral-bg); color: var(--coral-text); }
  .opt.ok  { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); }
  .opt.bad { border-color: #E24B4A; background: var(--red-bg); color: var(--red-text); }
  .opt.locked { cursor: default; }
  .fb { font-size: 14px; padding: 8px 12px; border-radius: var(--radius-md); margin-bottom: .75rem; line-height: 1.5; }
  .fb.ok  { background: var(--green-bg); color: var(--green-text); }
  .fb.bad { background: var(--red-bg);   color: var(--red-text); }
  .match-wrap { display: grid; grid-template-columns: 1fr 28px 1fr; gap: 10px; align-items: start; }
  .mcol { display: flex; flex-direction: column; gap: 8px; }
  .mi {
    border: 1.5px solid var(--border-mid); border-radius: var(--radius-md);
    padding: 9px 14px; font-size: 14px; background: var(--bg-primary);
    cursor: pointer; transition: all .15s; color: var(--text-primary);
    line-height: 1.4; min-height: 52px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .mi:hover:not(.locked) { border-color: var(--coral-border); background: var(--coral-bg); color: var(--coral-text); }
  .mi.sel-l  { border-color: var(--coral-border); background: var(--coral-bg); color: var(--coral-text); }
  .mi.ok     { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); cursor: default; }
  .mi.bad    { border-color: #E24B4A; background: var(--red-bg); color: var(--red-text); }
  .mi.locked { cursor: default; }
  .arr { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; }
  .arrline { height: 52px; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); font-size: 15px; }
  .tbl { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: .75rem; }
  .tbl th { text-align: left; font-weight: 500; font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .06em; padding: 6px 10px; border-bottom: 0.5px solid var(--border-light); }
  .tbl td { padding: 9px 10px; border-bottom: 0.5px solid var(--border-light); color: var(--text-primary); }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl .dim { color: var(--text-secondary); }
  .prep-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
  .prep-card { background: var(--bg-tertiary); border-radius: var(--radius-md); padding: 8px; text-align: center; }
  .prep-word { font-weight: 500; font-size: 15px; color: var(--text-primary); }
  .prep-mean { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .use-label { font-size: 13px; font-weight: 500; color: var(--coral-text); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
  .score-wrap { display: flex; gap: 16px; justify-content: center; margin-bottom: 1.5rem; }
  .score-circle {
    width: 90px; height: 90px; border-radius: 50%;
    border: 3px solid var(--green-border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-num { font-size: 28px; font-weight: 500; color: var(--green-text); line-height: 1; }
  .score-lbl { font-size: 11px; color: var(--text-tertiary); }
  footer { margin-top: 2rem; font-size: 12px; color: var(--text-tertiary); text-align: center; }
  @media (max-width: 480px) {
    .prep-grid { grid-template-columns: repeat(2,1fr); }
    .app { padding: 1.25rem; }
  }

  
  .home-link {
    font-size: 13px; color: var(--text-tertiary); text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border-light);
    transition: background .15s; cursor: pointer;
    background: none; font-family: var(--font);
  }
  .home-link:hover { background: var(--bg-secondary); color: var(--text-secondary); }
  .btn-complete {
    background: var(--green-border); color: #fff;

    padding: 12px 28px; font-size: 15px; font-weight: 500;
    cursor: pointer; font-family: var(--font);
    transition: opacity .15s; display: block;
    width: 100%; text-align: center;
  }
  .btn-complete:hover { opacity: .88; }

  
  .home-link {
    font-size:13px;color:var(--text-tertiary);text-decoration:none;
    display:inline-flex;align-items:center;gap:4px;
    padding:4px 10px;border-radius:var(--radius-md);
    border:0.5px solid var(--border-light);
    transition:background .15s;cursor:pointer;
    background:none;font-family:var(--font);
  }
  .home-link:hover{background:var(--bg-secondary);color:var(--text-secondary);}
  .btn-complete{
    background:var(--green-border);color:#fff;
    border:none;border-radius:var(--radius-md);
    padding:12px 28px;font-size:15px;font-weight:500;
    cursor:pointer;font-family:var(--font);
    transition:opacity .15s;display:block;
    width:100%;text-align:center;
  }
  .btn-complete:hover{opacity:.88;}

<script

</head>
<body>
<div class="lesson-header">
  <div class="lesson-title-row">
    <span class="lesson-badge">Lekcija 6c</span>
    <span class="lesson-name">Instrumental — Predlozi &middot; Instrumental Prepositions</span>
  </div>
  <a class="home-link" href="serbian-course-home.html">&#x2190; Kurs</a>
</div>
<div class="app">
  <div class="progress-bar" id="pbar"></div>
  <div id="screens"></div>
</div>
<footer>Serbian Language Course &middot; Lekcija 6c &middot; Instrumental Prepositions</footer>
<script>
const SCREENS=[
  {id:'intro', label:'Lekcija 6c · Lesson 6c'},
  {id:'sa', label:'Sa · With'},
  {id:'position', label:'Položaj · Position'},
  {id:'ex1', label:'Vežba 1 · Exercise 1'},
  {id:'ex2', label:'Vežba 2 · Exercise 2'},
  {id:'done', label:'Završeno · Done'},
];
let cur=0;
let ex1s={answers:{},checked:{}};
let ex2s={answers:{},checked:{}};

function speak(t){
  if(window.responsiveVoice){
    responsiveVoice.cancel();
    responsiveVoice.speak(t,"Serbian Male",{rate:0.9});
  } else {
    // fallback to browser TTS if ResponsiveVoice fails to load
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(t);
    u.lang='sr-RS';u.rate=0.85;
    window.speechSynthesis.speak(u);
  }
}
function spkBtn(t,l){
  const lang = l || 'sr-RS';
  const safe = t.replace(/'/g,"\\'");
  return '<button class="spk" onclick="speak(\'' + safe + '\',\'' + lang + '\')">'
    + '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">'
    + '<path d="M10 3v14M6 6v8M14 5v10M2 8v4M18 7v6"/>'
    + '</svg>Slušaj · Listen</button>';
}

const EX1=[
  {s:'Sedi <span class="hl">pod</span> ___.', e:'He is sitting under the tree.',
   opts:['drvetom', 'drveta', 'drvetu'], correct:0, audio:'Sedi pod drvetom.',
   expl:'Pod + instrumental marks <strong>static position below</strong>: drvo → <strong>drvetom</strong>.'},
  {s:'Lampa visi <span class="hl">nad</span> ___.', e:'The lamp hangs above the table.',
   opts:['stolom', 'stola', 'stolu'], correct:0, audio:'Lampa visi nad stolom.',
   expl:'Nad + instrumental = <strong>above/over (static)</strong>: sto → <strong>stolom</strong>.'},
  {s:'Stoji <span class="hl">pred</span> ___.', e:'She stands in front of the door.',
   opts:['vratima', 'vrata', 'vratima'], correct:0, audio:'Stoji pred vratima.',
   expl:'Pred + instrumental = <strong>in front of (static)</strong>: vrata (pl. neut.) → <strong>vratima</strong>.'},
  {s:'Kutija stoji <span class="hl">za</span> ___.', e:'The box is standing behind the door.',
   opts:['vratima', 'vrata', 'vrati'], correct:0, audio:'Kutija stoji za vratima.',
   expl:'Za + instrumental = <strong>behind (static position)</strong>: vrata → <strong>vratima</strong>.'},
  {s:'Puši <span class="hl">ispred</span> ___.', e:'He smokes in front of the building.',
   opts:['zgrade', 'zgradом', 'zgradi'], correct:0, audio:'Puši ispred zgrade.',
   expl:'<strong>Ispred</strong> takes <strong>genitive</strong>, not instrumental! zgrada → <strong>zgrade</strong>. Always check which case a preposition demands.'}
];

const EX2=[
  {s:'Maca sedi pod stolom.', e:'The cat sits under the table.',
   opts:['pod + instrumental', 'pod + akuzativ', 'pod + genitiv'], correct:0,
   expl:'<strong>Pod + instrumental</strong> marks static location (where something is, not where it moves to).'},
  {s:'Stavi kapu pod sto.', e:'Put the hat under the table.',
   opts:['pod + instrumental', 'pod + akuzativ', 'pod + genitiv'], correct:1,
   expl:'<strong>Pod + accusative</strong> marks movement/direction (putting something somewhere). Compare: pod stolom (location) vs. pod sto (motion).'},
  {s:'Razgovaramo sa kolegom.', e:'We are talking with a colleague.',
   opts:['sa + instrumental', 'sa + genitiv', 'sa + dativ'], correct:0,
   expl:'<strong>Sa + instrumental</strong> always marks companionship — being or doing something with someone.'},
  {s:'Nad gradom se vide zvezde.', e:'Stars can be seen above the city.',
   opts:['nad + instrumental', 'nad + akuzativ', 'nad + genitiv'], correct:0,
   expl:'<strong>Nad + instrumental</strong> = above/over a static location. Grad → gradom.'},
  {s:'Razgovarali su među ___.', e:'They talked among themselves.',
   opts:['sobom', 'sebe', 'sebi'], correct:0,
   expl:'<strong>Između/među + instrumental</strong>: reflexive pronoun sebe → <strong>sobom</strong>. Među sobom = among themselves.'}
];

function buildProgress(){
  document.getElementById('pbar').innerHTML=SCREENS.map((s,i)=>
    '<div class="pdot '+(i<cur?'done':i===cur?'active':'')+'" title="'+(s.label||'')+'"></div>').join('');
}
function buildScreens(){
  const c=document.getElementById('screens');c.innerHTML='';
  const mk=(id,html)=>{
    const d=document.createElement('div');
    d.className='screen '+(id===SCREENS[cur].id?'active':'');
    d.id='sc-'+id;d.innerHTML=html;c.appendChild(d);
  };
  buildAllScreens(mk);
}
function buildEx1HTML(){
  let h='<div class="slabel">'+SCREENS.find(s=>s.id==='ex1').label+'</div>';
  h+='<div class="ibox">Izaberi tačan instrumental. Pick the correct instrumental form.</div>';
  EX1.forEach((q,qi)=>{
    const chk=ex1s.checked[qi]!==undefined;
    const sel=ex1s.answers[qi];
    const filled=sel!==undefined?q.opts[sel]:'___';
    h+='<div class="card" style="margin-bottom:1rem;">'
      +'<div style="font-size:17px;color:var(--text-primary);margin-bottom:4px;line-height:1.6;">'
      +q.s.replace('___','<span class="blank">'+filled+'</span>')+'</div>'
      +'<div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">'+q.e+'</div>'
      +'<div class="optsrow">';
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+='<button class="'+cls+'" onclick="ex1pick('+qi+','+oi+')">'+opt+'</button>';
    });
    h+='</div>';
    if(chk)h+='<div class="fb '+(ex1s.checked[qi]?'ok':'bad')+'">'+(ex1s.checked[qi]?'Tačno! ✓':'Netačno.')+' — '+q.expl+'</div>';
    h+=spkBtn(q.audio||q.s.replace('___',q.opts[q.correct]).replace(/<[^>]+>/g,''))+'</div>';
  });
  const allA=EX1.every((_,i)=>ex1s.answers[i]!==undefined);
  const allC=EX1.every((_,i)=>ex1s.checked[i]!==undefined);
  h+='<div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button>';
  if(!allC)h+='<button class="btnp" '+(allA?'':'disabled')+' onclick="checkEx1()">Proveri</button>';
  else h+='<button class="btnp" onclick="goNext()">Vežba 2 →</button>';
  h+='</div>';return h;
}
function buildEx2HTML(){
  let h='<div class="slabel">'+SCREENS.find(s=>s.id==='ex2').label+'</div>';
  h+='<div class="ibox">Prepoznaj upotrebu instrumentala. Identify the use of the instrumental.</div>';
  EX2.forEach((q,qi)=>{
    const chk=ex2s.checked[qi]!==undefined;
    const sel=ex2s.answers[qi];
    h+='<div class="card" style="margin-bottom:1rem;">'
      +'<div class="cs">'+q.s+'</div>'
      +'<div class="ce">'+q.e+'</div>'
      +'<div class="optsrow" style="margin-top:10px;">';
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+='<button class="'+cls+'" onclick="ex2pick('+qi+','+oi+')">'+opt+'</button>';
    });
    h+='</div>';
    if(chk)h+='<div class="fb '+(ex2s.checked[qi]?'ok':'bad')+'">'+(ex2s.checked[qi]?'Tačno! ✓':'Netačno.')+' — '+q.expl+'</div>';
    h+='</div>';
  });
  const allA=EX2.every((_,i)=>ex2s.answers[i]!==undefined);
  const allC=EX2.every((_,i)=>ex2s.checked[i]!==undefined);
  h+='<div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button>';
  if(!allC)h+='<button class="btnp" '+(allA?'':'disabled')+' onclick="checkEx2()">Proveri</button>';
  else h+='<button class="btnp" onclick="goNext()">Završetak →</button>';
  h+='</div>';return h;
}

function buildAllScreens(mk){
  mk('intro',
    '<div class="slabel">'+SCREENS[0].label+'</div>'
    +'<div class="stitle">Instrumental — Predlozi &middot; Instrumental Prepositions</div>'
    +'<div class="ibox" style="border-left:3px solid var(--coral-border);">'
    +'<strong>Predlozi uz instrumental</strong><br><br>'
    +'The instrumental has two groups of prepositions:<br><br>'
    +'1. <strong>Sa</strong> (with) — used for companionship and means in some contexts<br>'
    +'2. <strong>Position prepositions</strong>: nad, pod, pred, za, među — these mark <strong>static location</strong>.<br><br>'
    +'<strong>Key distinction:</strong> nad/pod/pred/za also take the <strong>accusative</strong> when there is <strong>motion</strong>. '
    +'Instrumental = where something <em>is</em>. Accusative = where something <em>goes</em>.'
    +'</div>'
    +'<div class="card"><div class="cs">Sedi <span class="hl">pod</span> <span class="hl2">drvetom</span>.</div>'
    +'<div class="ce">He sits under the tree. (static — instrumental)</div>'
    +spkBtn('Sedi pod drvetom.')+'</div>'
    +'<div class="card"><div class="cs">Stavi to <span class="hl">pod</span> <span class="hl3">sto</span>.</div>'
    +'<div class="ce">Put it under the table. (motion — accusative)</div>'
    +spkBtn('Stavi to pod sto.')+'</div>'
    +'<div class="navrow"><span></span><button class="btnp" onclick="goNext()">Sa →</button></div>'
  );

  mk('sa',
    '<div class="slabel">'+SCREENS[1].label+'</div>'
    +'<div class="stitle">Sa &middot; With</div>'
    +'<div class="ibox"><strong>Sa</strong> is the core instrumental preposition. It has two uses:<br><br>'
    +'1. <strong>Companionship</strong>: sa sestrom (with sister), sa prijateljem (with a friend)<br>'
    +'2. <strong>Means / together with</strong>: kafa sa mlekom (coffee with milk), hleb sa puterom (bread with butter)<br><br>'
    +'<strong>Sa or s?</strong> Before consonant clusters or when easier to pronounce, <em>sa</em> shortens to <em>s</em>: s tobom, s njim. Both are correct.</div>'
    +'<div class="card"><div class="cs">Kafa sa <span class="hl">mlekom</span>.</div>'
    +'<div class="ce">Coffee with milk.</div>'
    +'<div class="cn">mleko (n) → <strong>mlekom</strong></div>'
    +spkBtn('Kafa sa mlekom.')+'</div>'
    +'<div class="card"><div class="cs">Došao je s <span class="hl">njim</span>.</div>'
    +'<div class="ce">He came with him. (s = sa before njim)</div>'
    +'<div class="cn">on → <strong>njim</strong></div>'
    +spkBtn('Došao je s njim.')+'</div>'
    +'<div class="card"><div class="cs">Hleb sa <span class="hl">puterom</span>.</div>'
    +'<div class="ce">Bread with butter.</div>'
    +'<div class="cn">puter (m) → <strong>puterom</strong></div>'
    +spkBtn('Hleb sa puterom.')+'</div>'
    +'<div class="navrow">'
    +'<button class="btng" onclick="goPrev()">&#x2190; Nazad</button>'
    +'<button class="btnp" onclick="goNext()">Položaj →</button></div>'
  );

  mk('position',
    '<div class="slabel">'+SCREENS[2].label+'</div>'
    +'<div class="stitle">Položajni predlozi &middot; Position Prepositions</div>'
    +'<div class="ibox">These prepositions take the <strong>instrumental for static location</strong> '
    +'(something is <em>there</em>) and the <strong>accusative for motion</strong> (something moves <em>to there</em>). '
    +'This static/motion split is the same pattern as <em>u</em> and <em>na</em> in the accusative lesson.</div>'
    +'<div class="prep-grid">'
    +'<div class="prep-card"><div class="prep-word">nad</div><div class="prep-mean">above, over</div><div class="prep-ex">nad stolom</div></div>'
    +'<div class="prep-card"><div class="prep-word">pod</div><div class="prep-mean">under, below</div><div class="prep-ex">pod krevetom</div></div>'
    +'<div class="prep-card"><div class="prep-word">pred</div><div class="prep-mean">in front of</div><div class="prep-ex">pred kućom</div></div>'
    +'<div class="prep-card"><div class="prep-word">za</div><div class="prep-mean">behind</div><div class="prep-ex">za vratima</div></div>'
    +'<div class="prep-card"><div class="prep-word">među</div><div class="prep-mean">among, between</div><div class="prep-ex">među prijateljima</div></div>'
    +'<div class="prep-card"><div class="prep-word">s(a)</div><div class="prep-mean">with</div><div class="prep-ex">sa bratom</div></div>'
    +'</div>'
    +'<div class="card">'
    +'<div class="cs">Mačka leži <span class="hl">pod</span> <span class="hl2">krevetom</span>.</div>'
    +'<div class="ce">The cat lies under the bed. (static — instr.)</div>'
    +spkBtn('Mačka leži pod krevetom.')+'</div>'
    +'<div class="card">'
    +'<div class="cs">Lampa je <span class="hl">nad</span> <span class="hl2">stolom</span>.</div>'
    +'<div class="ce">The lamp is above the table. (static — instr.)</div>'
    +spkBtn('Lampa je nad stolom.')+'</div>'
    +'<div class="card">'
    +'<div class="cs">Stoje <span class="hl">pred</span> <span class="hl2">kućom</span>.</div>'
    +'<div class="ce">They stand in front of the house. (static — instr.)</div>'
    +spkBtn('Stoje pred kućom.')+'</div>'
    +'<div class="ibox" style="margin-top:.5rem;background:rgba(255,190,0,.07);border-left:3px solid #f5a623;">'
    +'<strong>&#x26A0; za + instr. vs. za + akuz.:</strong><br>'
    +'Za vratima = <em>behind</em> the door (static — instrumental)<br>'
    +'Kupio sam poklon za tebe = <em>for</em> you (purpose — accusative)'
    +'</div>'
    +'<div class="navrow">'
    +'<button class="btng" onclick="goPrev()">&#x2190; Nazad</button>'
    +'<button class="btnp" onclick="goNext()">Vežba 1 →</button></div>'
  );

  const s1=EX1.filter((_,i)=>ex1s.checked[i]===true).length;
  const s2=EX2.filter((_,i)=>ex2s.checked[i]===true).length;
  mk('ex1',buildEx1HTML());
  mk('ex2',buildEx2HTML());
  mk('done',
    '<div class="slabel">'+SCREENS[SCREENS.length-1].label+'</div>'
    +'<div class="stitle">Lekcija 6c završena &middot; Lekcija 6c complete!</div>'
    +'<div class="score-wrap">'
    +'<div class="score-circle"><div class="score-num">'+s1+'/'+EX1.length+'</div><div class="score-lbl">Vežba 1</div></div>'
    +'<div class="score-circle"><div class="score-num">'+s2+'/'+EX2.length+'</div><div class="score-lbl">Vežba 2</div></div>'
    +'</div>'
    +'<div class="card"><div class="cs" style="font-size:15px;margin-bottom:8px;">Šta si naučio/la &middot; What you learned</div>'
    +'<ul style="padding-left:1.1rem;font-size:14px;color:var(--text-secondary);line-height:2.2;">'
    +'<li><strong>Sa + instrumental</strong> = companionship or ingredient (sa sestrom, kafa sa mlekom)</li><li><strong>Nad, pod, pred, za, među + instrumental</strong> = static position</li><li>Same prepositions + <strong>accusative</strong> = motion/direction</li><li><strong>Za + instrumental</strong> = behind; <strong>za + accusative</strong> = for (purpose)</li><li>Sa shortens to <strong>s</strong> before consonant clusters: s tobom, s njim</li>'
    +'</ul></div>'
    +'<div style="display:flex;flex-direction:column;gap:.6rem;margin-top:1.25rem;">'
    +'<button class="btn-complete" onclick="markAndGoNext()">&#x279C; Sledeća lekcija &mdash; Lekcija 7 &mdash; Lokativ.</button>'
    +'<button class="btng" style="width:100%;text-align:center;" onclick="markAndGoHome()">&#x21A9; Vrati se na početnu &middot; Back to home</button>'
    +'<button class="btng" style="width:100%;text-align:center;" onclick="restart()">&#x21BA; Ponovi lekciju &middot; Restart</button>'
    +'</div>'
  );
}

function goNext(){if(cur<SCREENS.length-1){cur++;render();window.scrollTo({top:0,behavior:'smooth'});}}
function goPrev(){if(cur>0){cur--;render();window.scrollTo({top:0,behavior:'smooth'});}}
function restart(){cur=0;ex1s={answers:{},checked:{}};ex2s={answers:{},checked:{}};render();}
function render(){
  buildScreens();buildProgress();
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.toggle('active',s.id==='sc-'+SCREENS[cur].id);
  });
}
function ex1pick(qi,oi){if(ex1s.checked[qi]!==undefined)return;ex1s.answers[qi]=oi;const d=document.getElementById('sc-ex1');if(d)d.innerHTML=buildEx1HTML();}
function ex2pick(qi,oi){if(ex2s.checked[qi]!==undefined)return;ex2s.answers[qi]=oi;const d=document.getElementById('sc-ex2');if(d)d.innerHTML=buildEx2HTML();}
function checkEx1(){EX1.forEach((_,i)=>{if(ex1s.answers[i]!==undefined)ex1s.checked[i]=(ex1s.answers[i]===EX1[i].correct);});const d=document.getElementById('sc-ex1');if(d)d.innerHTML=buildEx1HTML();}
function checkEx2(){EX2.forEach((_,i)=>{if(ex2s.answers[i]!==undefined)ex2s.checked[i]=(ex2s.answers[i]===EX2[i].correct);});const d=document.getElementById('sc-ex2');if(d)d.innerHTML=buildEx2HTML();}
render();

function markAndGoHome(){
  try{const p=JSON.parse(localStorage.getItem('serbian_course_progress')||'{}');p['L6c']=true;localStorage.setItem('serbian_course_progress',JSON.stringify(p));}catch(e){}
  window.location.href='serbian-course-home.html';
}
function markAndGoNext(){
  try{const p=JSON.parse(localStorage.getItem('serbian_course_progress')||'{}');p['L6c']=true;localStorage.setItem('serbian_course_progress',JSON.stringify(p));}catch(e){}
  window.location.href='serbian-lesson7a-lokativ-imenice.html';
}
</script>
