<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serbian · Lekcija 1a · Nominativ — Imenice</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f4f0;
    --bg-tertiary: #eeedea;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #9b9b9b;
    --border-light: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.18);
    --radius-md: 8px;
    --radius-lg: 12px;
    --purple-bg: #EEEDFE;
    --purple-text: #534AB7;
    --purple-border: #7F77DD;
    --green-bg: #E1F5EE;
    --green-text: #0F6E56;
    --green-border: #1D9E75;
    --red-bg: #FCEBEB;
    --red-text: #A32D2D;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #2a2a2a;
      --bg-tertiary: #333;
      --text-primary: #f0f0f0;
      --text-secondary: #a0a0a0;
      --text-tertiary: #666;
      --border-light: rgba(255,255,255,0.1);
      --border-mid: rgba(255,255,255,0.18);
      --purple-bg: #26215C;
      --purple-text: #AFA9EC;
      --purple-border: #7F77DD;
      --green-bg: #04342C;
      --green-text: #9FE1CB;
      --green-border: #1D9E75;
      --red-bg: #501313;
      --red-text: #F09595;
    }
  }
  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  .lesson-header {
    width: 100%;
    max-width: 680px;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .lesson-title-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .lesson-badge {
    background: var(--purple-bg);
    color: var(--purple-text);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .lesson-name {
    font-size: 14px;
    color: var(--text-secondary);
  }
  .app {
    width: 100%;
    max-width: 680px;
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border-light);
    padding: 2rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .progress-bar { display: flex; gap: 6px; margin-bottom: 1.75rem; }
  .pdot { height: 5px; flex: 1; border-radius: 10px; background: var(--border-light); transition: background .3s; }
  .pdot.done { background: var(--green-border); }
  .pdot.active { background: var(--purple-border); }
  .screen { display: none; }
  .screen.active { display: block; }
  .slabel { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .09em; margin-bottom: .5rem; }
  .stitle { font-size: 21px; font-weight: 500; color: var(--text-primary); margin-bottom: 1.25rem; line-height: 1.3; }
  .card {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: .75rem;
  }
  .cs { font-size: 17px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
  .ce { font-size: 14px; color: var(--text-secondary); }
  .cn { font-size: 13px; color: var(--purple-text); margin-top: 6px; }
  .hl { background: var(--purple-bg); color: var(--purple-text); padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .hl2 { background: var(--green-bg); color: var(--green-text); padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .spk {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md); padding: 5px 12px;
    font-size: 13px; color: var(--text-secondary);
    cursor: pointer; margin-top: 8px; transition: background .15s;
    font-family: var(--font);
  }
  .spk:hover { background: var(--bg-tertiary); }
  .spk svg { width: 14px; height: 14px; flex-shrink: 0; }
  .ibox {
    background: var(--bg-secondary);
    border-left: 3px solid var(--purple-border);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
    padding: .75rem 1rem;
    margin-bottom: 1rem;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
  }
  .ibox strong { color: var(--text-primary); font-weight: 500; }
  .navrow { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .btnp {
    background: #534AB7; color: #EEEDFE;
    border: none; border-radius: var(--radius-md);
    padding: 10px 24px; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: opacity .15s; font-family: var(--font);
  }
  .btnp:hover { opacity: .88; }
  .btnp:disabled { opacity: .4; cursor: default; }
  .btng {
    background: none; border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md); padding: 10px 20px;
    font-size: 15px; color: var(--text-secondary);
    cursor: pointer; font-family: var(--font);
  }
  .btng:hover { background: var(--bg-secondary); }
  .pair-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: .75rem; }
  .pair-card {
    background: var(--bg-secondary); border: 0.5px solid var(--border-light);
    border-radius: var(--radius-lg); padding: .9rem 1rem;
  }
  .pair-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px; }
  .pair-text { font-size: 16px; font-weight: 500; color: var(--text-primary); }
  .pair-sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .blank { display: inline-block; min-width: 80px; border-bottom: 2px solid var(--purple-border); text-align: center; padding: 0 4px; font-weight: 500; color: var(--purple-text); }
  .optsrow { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 1rem; }
  .opt {
    border: 1.5px solid var(--border-mid); background: var(--bg-primary);
    border-radius: var(--radius-md); padding: 9px 18px;
    font-size: 15px; cursor: pointer; color: var(--text-primary);
    transition: all .15s; font-family: var(--font);
  }
  .opt:hover:not(.locked) { border-color: var(--purple-border); background: var(--purple-bg); color: var(--purple-text); }
  .opt.sel { border-color: var(--purple-border); background: var(--purple-bg); color: var(--purple-text); }
  .opt.ok { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); }
  .opt.bad { border-color: #E24B4A; background: var(--red-bg); color: var(--red-text); }
  .opt.locked { cursor: default; }
  .fb { font-size: 14px; padding: 8px 12px; border-radius: var(--radius-md); margin-bottom: .75rem; line-height: 1.5; }
  .fb.ok { background: var(--green-bg); color: var(--green-text); }
  .fb.bad { background: var(--red-bg); color: var(--red-text); }
  .match-wrap { display: grid; grid-template-columns: 1fr 28px 1fr; gap: 10px; align-items: start; }
  .mcol { display: flex; flex-direction: column; gap: 8px; }
  .mi {
    border: 1.5px solid var(--border-mid); border-radius: var(--radius-md);
    padding: 9px 14px; font-size: 14px; background: var(--bg-primary);
    cursor: pointer; transition: all .15s; color: var(--text-primary); line-height: 1.4;
    min-height: 52px; display: flex; flex-direction: column; justify-content: center;
  }
  .mi:hover:not(.locked) { border-color: var(--purple-border); background: var(--purple-bg); color: var(--purple-text); }
  .mi.sel-l { border-color: var(--purple-border); background: var(--purple-bg); color: var(--purple-text); }
  .mi.ok { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); cursor: default; }
  .mi.bad { border-color: #E24B4A; background: var(--red-bg); color: var(--red-text); }
  .mi.locked { cursor: default; }
  .arr { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; padding-top: 2px; }
  .arrline { height: 52px; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); font-size: 15px; }
  .score-wrap { display: flex; gap: 16px; justify-content: center; margin-bottom: 1.5rem; }
  .score-circle {
    width: 90px; height: 90px; border-radius: 50%;
    border: 3px solid var(--green-border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-num { font-size: 28px; font-weight: 500; color: var(--green-text); line-height: 1; }
  .score-lbl { font-size: 11px; color: var(--text-tertiary); }
  .sub-label { font-size: 14px; color: var(--text-secondary); font-weight: 500; margin-bottom: 1rem; margin-top: .75rem; }
  footer {
    margin-top: 2rem;
    font-size: 12px;
    color: var(--text-tertiary);
    text-align: center;
  }
  @media (max-width: 480px) {
    .pair-grid { grid-template-columns: 1fr; }
    .app { padding: 1.25rem; }
  }

  .home-link {
    font-size: 13px; color: var(--text-tertiary); text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border-light);
    transition: background .15s; cursor: pointer;
    background: none; font-family: var(--font);
  }
  .home-link:hover { background: var(--bg-secondary); color: var(--text-secondary); }
  .btn-complete {
    background: var(--green-border); color: #fff;
    border: none; border-radius: var(--radius-md);
    padding: 12px 28px; font-size: 15px; font-weight: 500;
    cursor: pointer; font-family: var(--font);
    transition: opacity .15s; display: block;
    width: 100%; text-align: center;
  }
  .btn-complete:hover { opacity: .88; }

  </style>
</head>
<body>

<div class="lesson-header">
  <div class="lesson-title-row">
    <span class="lesson-badge">Lekcija 1a</span>
    <span class="lesson-name">Nominativ — Imenice · Nouns</span>
  </div>
  <span style="font-size:12px;color:var(--text-tertiary)">1 od 2 lekcije o nominativu</span>
</div>

<div class="app">
  <div class="progress-bar" id="pbar"></div>
  <div id="screens"></div>
</div>

<footer>Serbian Language Course · Lesson 1a · Nominativ – Nouns</footer>

<script>
const SCREENS=[
  {id:'intro',   label:'Lekcija 1a · Lesson 1a'},
  {id:'gender',  label:'Rod imenice · Noun gender'},
  {id:'examples',label:'Primeri · Examples'},
  {id:'ex1',     label:'Vežba 1 · Exercise 1'},
  {id:'ex2',     label:'Vežba 2 · Exercise 2'},
  {id:'done',    label:'Završeno · Done'},
];
let cur=0;
let ex1s={answers:{},checked:{}};
let ex2s={answers:{},checked:{}};

function speak(t,l){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang=l||'sr-RS';u.rate=0.85;
  window.speechSynthesis.speak(u);
}
function spkBtn(t){
  return `<button class="spk" onclick="speak('${t.replace(/'/g,"\\'")}','sr-RS')">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <path d="M10 3v14M6 6v8M14 5v10M2 8v4M18 7v6"/>
    </svg>Slušaj · Listen</button>`;
}

// EX1: Choose nominative noun form (vs. genitive / dative distractors)
const EX1=[
  {s:'_____ je u parku.',e:'_____ is in the park.',opts:['Marko','Marka','Marku'],correct:0,
    expl:'<strong>Marko</strong> is the subject — nominative. "Marka" is genitive, "Marku" is dative.'},
  {s:'_____ voli muziku.',e:'_____ loves music.',opts:['Ana','Ane','Ani'],correct:0,
    expl:'<strong>Ana</strong> is the subject — nominative feminine. "Ane" is genitive, "Ani" is dative.'},
  {s:'_____ je veliki grad.',e:'_____ is a big city.',opts:['Beograd','Beograda','Beogradu'],correct:0,
    expl:'<strong>Beograd</strong> is the subject — nominative masculine. "Beograda" is genitive, "Beogradu" is dative.'},
  {s:'_____ trči u parku.',e:'_____ is running in the park.',opts:['Pas','Psa','Psu'],correct:0,
    expl:'<strong>Pas</strong> (dog) is the subject — nominative masculine. "Psa" is genitive, "Psu" is dative.'},
  {s:'_____ je na stolu.',e:'_____ is on the table.',opts:['Knjiga','Knjige','Knjizi'],correct:0,
    expl:'<strong>Knjiga</strong> (book) is the subject — nominative feminine. "Knjige" is genitive, "Knjizi" is dative.'},
];

// EX2: Identify the gender of the noun
const EX2=[
  {s:'grad (city)',opts:['Muški · Masculine','Ženski · Feminine','Srednji · Neuter'],correct:0,
    expl:'<strong>Grad</strong> ends in a consonant → masculine.'},
  {s:'žena (woman)',opts:['Muški · Masculine','Ženski · Feminine','Srednji · Neuter'],correct:1,
    expl:'<strong>Žena</strong> ends in -a → feminine.'},
  {s:'dete (child)',opts:['Muški · Masculine','Ženski · Feminine','Srednji · Neuter'],correct:2,
    expl:'<strong>Dete</strong> ends in -e → neuter.'},
  {s:'selo (village)',opts:['Muški · Masculine','Ženski · Feminine','Srednji · Neuter'],correct:2,
    expl:'<strong>Selo</strong> ends in -o → neuter.'},
  {s:'torba (bag)',opts:['Muški · Masculine','Ženski · Feminine','Srednji · Neuter'],correct:1,
    expl:'<strong>Torba</strong> ends in -a → feminine.'},
];

function buildProgress(){
  document.getElementById('pbar').innerHTML=SCREENS.map((s,i)=>
    `<div class="pdot ${i<cur?'done':i===cur?'active':''}"></div>`).join('');
}

function buildScreens(){
  const c=document.getElementById('screens');c.innerHTML='';
  const mk=(id,html)=>{
    const d=document.createElement('div');
    d.className=`screen ${id===SCREENS[cur].id?'active':''}`;
    d.id=`sc-${id}`;d.innerHTML=html;c.appendChild(d);
  };

  mk('intro',`
    <div class="slabel">${SCREENS[0].label}</div>
    <div class="stitle">Nominativ — Imenice · Nominative Nouns</div>
    <div class="ibox">
      <strong>What is the nominative?</strong><br>
      The <strong>nominative</strong> is the base form of a noun. It marks the <em>subject</em> — the person or thing performing the action or being described.<br><br>
      <strong>Šta je nominativ?</strong><br>
      <strong>Nominativ</strong> je osnovni oblik imenice. Označava <em>subjekat</em> — osobu ili stvar koja vrši radnju ili se opisuje.
    </div>
    <div class="card">
      <div class="cs"><span class="hl">Marko</span> spava.</div>
      <div class="ce">Marko is sleeping.</div>
      <div class="cn">Marko = subject → nominative</div>
      ${spkBtn('Marko spava.')}
    </div>
    <div class="card">
      <div class="cs"><span class="hl">Ana</span> čita.</div>
      <div class="ce">Ana is reading.</div>
      <div class="cn">Ana = subject → nominative</div>
      ${spkBtn('Ana čita.')}
    </div>
    <div class="card">
      <div class="cs"><span class="hl">Pas</span> trči.</div>
      <div class="ce">The dog is running.</div>
      <div class="cn">Pas (dog) = subject → nominative</div>
      ${spkBtn('Pas trči.')}
    </div>
    <div class="navrow"><span></span><button class="btnp" onclick="goNext()">Dalje · Next →</button></div>
  `);

  mk('gender',`
    <div class="slabel">${SCREENS[1].label}</div>
    <div class="stitle">Rod imenice · Noun gender</div>
    <div class="ibox">
      Serbian nouns have three genders: <strong>masculine, feminine, and neuter</strong>. Gender determines how a noun changes in all cases. In the nominative, the ending usually signals the gender.
    </div>
    <div class="sub-label">Muški rod · Masculine — usually ends in a consonant</div>
    <div class="pair-grid">
      <div class="pair-card">
        <div class="pair-label">Masculine</div>
        <div class="pair-text"><span class="hl">grad</span> — city</div>
        ${spkBtn('grad')}
      </div>
      <div class="pair-card">
        <div class="pair-label">Masculine</div>
        <div class="pair-text"><span class="hl">pas</span> — dog</div>
        ${spkBtn('pas')}
      </div>
    </div>
    <div class="sub-label">Ženski rod · Feminine — usually ends in -a</div>
    <div class="pair-grid">
      <div class="pair-card">
        <div class="pair-label">Feminine</div>
        <div class="pair-text"><span class="hl2">knjiga</span> — book</div>
        ${spkBtn('knjiga')}
      </div>
      <div class="pair-card">
        <div class="pair-label">Feminine</div>
        <div class="pair-text"><span class="hl2">žena</span> — woman</div>
        ${spkBtn('žena')}
      </div>
    </div>
    <div class="sub-label">Srednji rod · Neuter — usually ends in -o or -e</div>
    <div class="pair-grid">
      <div class="pair-card">
        <div class="pair-label">Neuter</div>
        <div class="pair-text"><span class="hl">dete</span> — child</div>
        ${spkBtn('dete')}
      </div>
      <div class="pair-card">
        <div class="pair-label">Neuter</div>
        <div class="pair-text"><span class="hl">selo</span> — village</div>
        ${spkBtn('selo')}
      </div>
    </div>
    <div class="ibox" style="margin-top:.75rem;">
      <strong>⚠ Note:</strong> Gender must be memorized — it does not always match English logic. <em>Dete</em> (child) is neuter. <em>Stvar</em> (thing) is feminine.
    </div>
    <div class="navrow">
      <button class="btng" onclick="goPrev()">← Nazad</button>
      <button class="btnp" onclick="goNext()">Primeri · Examples →</button>
    </div>
  `);

  mk('examples',`
    <div class="slabel">${SCREENS[2].label}</div>
    <div class="stitle">Imenice kao subjekat · Nouns as subject</div>
    <div class="ibox">
      The nominative is used whenever the noun is the subject. Notice how the noun stays in its base form — no ending change needed in the nominative.
    </div>
    <div class="card">
      <div class="cs"><span class="hl">Marko</span> voli kafu.</div>
      <div class="ce">Marko loves coffee. — masculine noun, subject</div>
      ${spkBtn('Marko voli kafu.')}
    </div>
    <div class="card">
      <div class="cs"><span class="hl">Ana</span> čita novine.</div>
      <div class="ce">Ana reads the newspaper. — feminine noun, subject</div>
      ${spkBtn('Ana čita novine.')}
    </div>
    <div class="card">
      <div class="cs"><span class="hl">Dete</span> spava.</div>
      <div class="ce">The child is sleeping. — neuter noun, subject</div>
      ${spkBtn('Dete spava.')}
    </div>
    <div class="card">
      <div class="cs"><span class="hl">Beograd</span> je veliki grad.</div>
      <div class="ce">Belgrade is a big city. — masculine noun, subject</div>
      ${spkBtn('Beograd je veliki grad.')}
    </div>
    <div class="navrow">
      <button class="btng" onclick="goPrev()">← Nazad</button>
      <button class="btnp" onclick="goNext()">Vežba 1 →</button>
    </div>
  `);

  mk('ex1', buildEx1HTML());
  mk('ex2', buildEx2HTML());

  const s1=EX1.filter((_,i)=>ex1s.checked[i]===true).length;
  const s2=EX2.filter((_,i)=>ex2s.checked[i]===true).length;
  mk('done',`
    <div class="slabel">${SCREENS[5].label}</div>
    <div class="stitle">Lekcija 1a završena · Lesson 1a complete!</div>
    <div class="score-wrap">
      <div class="score-circle"><div class="score-num">${s1}/${EX1.length}</div><div class="score-lbl">Vežba 1</div></div>
      <div class="score-circle"><div class="score-num">${s2}/${EX2.length}</div><div class="score-lbl">Vežba 2</div></div>
    </div>
    <div class="card">
      <div class="cs" style="font-size:15px;margin-bottom:8px;">Šta si naučio/la · What you learned</div>
      <ul style="padding-left:1.1rem;font-size:14px;color:var(--text-secondary);line-height:2.1;">
        <li>Nominative marks the <strong>subject</strong> of a sentence</li>
        <li>Three genders: <strong>masculine</strong> (consonant), <strong>feminine</strong> (-a), <strong>neuter</strong> (-o/-e)</li>
        <li>Nominative is the <strong>base form</strong> — no ending change</li>
        <li>Gender must be <strong>memorized</strong> per noun</li>
      </ul>
    </div>
    <div style="display:flex;flex-direction:column;gap:.6rem;margin-top:1.25rem;">
      <button class="btn-complete" onclick="markAndGoNext()">&#x279C; Sledeća lekcija &mdash; Lekcija 1b — Nominativ: Zamenice</button>
      <button class="btng" style="width:100%;text-align:center;" onclick="markAndGoHome()">&#x21A9; Vrati se na početnu &middot; Back to home</button>
      <button class="btng" style="width:100%;text-align:center;" onclick="restart()">&#x21BA; Ponovi lekciju &middot; Restart</button>
    </div>
  `);
}

function buildEx1HTML(){
  let h=`<div class="slabel">${SCREENS[3].label}</div>
    <div class="stitle">Izaberi tačnu imenicu · Choose the correct noun</div>
    <div class="ibox">Pick the <strong>nominative</strong> form. The other options are genitive or dative forms of the same noun.</div>`;
  EX1.forEach((q,qi)=>{
    const chk=ex1s.checked[qi]!==undefined;
    const sel=ex1s.answers[qi];
    const filled=sel!==undefined?q.opts[sel]:'?';
    h+=`<div class="card" style="margin-bottom:1rem;">
      <div style="font-size:17px;color:var(--text-primary);margin-bottom:4px;line-height:1.6;">
        ${q.s.replace('_____',`<span class="blank">${filled}</span>`)}
      </div>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">${q.e}</div>
      <div class="optsrow">`;
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+=`<button class="${cls}" onclick="ex1pick(${qi},${oi})">${opt}</button>`;
    });
    h+=`</div>`;
    if(chk){
      h+=`<div class="fb ${ex1s.checked[qi]?'ok':'bad'}">${ex1s.checked[qi]?'Tačno! Correct':'Netačno. Not quite'} — ${q.expl}</div>`;
      h+=spkBtn(q.s.replace('_____',q.opts[q.correct]));
    }
    h+=`</div>`;
  });
  const allA=EX1.every((_,i)=>ex1s.answers[i]!==undefined);
  const allC=EX1.every((_,i)=>ex1s.checked[i]!==undefined);
  h+=`<div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button>`;
  if(!allC)h+=`<button class="btnp" ${allA?'':'disabled'} onclick="checkEx1()">Proveri · Check</button>`;
  else h+=`<button class="btnp" onclick="goNext()">Vežba 2 →</button>`;
  h+=`</div>`;return h;
}

function buildEx2HTML(){
  let h=`<div class="slabel">${SCREENS[4].label}</div>
    <div class="stitle">Koji je rod? · What is the gender?</div>
    <div class="ibox">Look at the noun ending and identify its gender. Remember: consonant = masculine, -a = feminine, -o/-e = neuter.</div>`;
  EX2.forEach((q,qi)=>{
    const chk=ex2s.checked[qi]!==undefined;
    const sel=ex2s.answers[qi];
    h+=`<div class="card" style="margin-bottom:1rem;">
      <div style="font-size:19px;font-weight:500;color:var(--text-primary);margin-bottom:10px;">${q.s}</div>
      <div class="optsrow">`;
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+=`<button class="${cls}" onclick="ex2pick(${qi},${oi})">${opt}</button>`;
    });
    h+=`</div>`;
    if(chk)h+=`<div class="fb ${ex2s.checked[qi]?'ok':'bad'}">${ex2s.checked[qi]?'Tačno! Correct':'Netačno. Not quite'} — ${q.expl}</div>`;
    h+=`</div>`;
  });
  const allA=EX2.every((_,i)=>ex2s.answers[i]!==undefined);
  const allC=EX2.every((_,i)=>ex2s.checked[i]!==undefined);
  h+=`<div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button>`;
  if(!allC)h+=`<button class="btnp" ${allA?'':'disabled'} onclick="checkEx2()">Proveri · Check</button>`;
  else h+=`<button class="btnp" onclick="goNext()">Završetak · Finish →</button>`;
  h+=`</div>`;return h;
}

function ex1pick(qi,oi){if(ex1s.checked[qi]!==undefined)return;ex1s.answers[qi]=oi;refreshEx1();}
function refreshEx1(){
  const old=document.getElementById('sc-ex1');if(!old)return;
  const d=document.createElement('div');
  d.className=`screen ${SCREENS[cur].id==='ex1'?'active':''}`;
  d.id='sc-ex1';d.innerHTML=buildEx1HTML();old.replaceWith(d);
}
function checkEx1(){EX1.forEach((_,i)=>{if(ex1s.answers[i]!==undefined)ex1s.checked[i]=ex1s.answers[i]===EX1[i].correct;});refreshEx1();}
function ex2pick(qi,oi){if(ex2s.checked[qi]!==undefined)return;ex2s.answers[qi]=oi;refreshEx2();}
function refreshEx2(){
  const old=document.getElementById('sc-ex2');if(!old)return;
  const d=document.createElement('div');
  d.className=`screen ${SCREENS[cur].id==='ex2'?'active':''}`;
  d.id='sc-ex2';d.innerHTML=buildEx2HTML();old.replaceWith(d);
}
function checkEx2(){EX2.forEach((_,i)=>{if(ex2s.answers[i]!==undefined)ex2s.checked[i]=ex2s.answers[i]===EX2[i].correct;});refreshEx2();}
function goNext(){if(cur<SCREENS.length-1){cur++;render();window.scrollTo({top:0,behavior:'smooth'});}}
function goPrev(){if(cur>0){cur--;render();window.scrollTo({top:0,behavior:'smooth'});}}
function restart(){cur=0;ex1s={answers:{},checked:{}};ex2s={answers:{},checked:{}};render();}
function render(){buildScreens();buildProgress();
  document.querySelectorAll('.screen').forEach(s=>{s.classList.toggle('active',s.id===`sc-${SCREENS[cur].id}`); });
}
render();
