<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serbian · Lekcija 5c · Vokativ — U rečenici</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f4f0;
    --bg-tertiary: #eeedea;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #9b9b9b;
    --border-light: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.18);
    --radius-md: 8px;
    --radius-lg: 12px;
    --pink-bg: #FBEAF0;
    --pink-text: #72243E;
    --pink-border: #D4537E;
    --purple-bg: #EEEDFE;
    --purple-text: #534AB7;
    --purple-border: #7F77DD;
    --green-bg: #E1F5EE;
    --green-text: #0F6E56;
    --green-border: #1D9E75;
    --amber-bg: #FAEEDA;
    --amber-text: #633806;
    --amber-border: #BA7517;
    --red-bg: #FCEBEB;
    --red-text: #A32D2D;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1e; --bg-secondary: #2a2a2a; --bg-tertiary: #333;
      --text-primary: #f0f0f0; --text-secondary: #a0a0a0; --text-tertiary: #666;
      --border-light: rgba(255,255,255,0.1); --border-mid: rgba(255,255,255,0.18);
      --pink-bg: #4B1528; --pink-text: #ED93B1; --pink-border: #D4537E;
      --purple-bg: #26215C; --purple-text: #AFA9EC; --purple-border: #7F77DD;
      --green-bg: #04342C; --green-text: #9FE1CB; --green-border: #1D9E75;
      --amber-bg: #412402; --amber-text: #FAC775; --amber-border: #BA7517;
      --red-bg: #501313; --red-text: #F09595;
    }
  }
  body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
  .lesson-header { width: 100%; max-width: 680px; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  .lesson-title-row { display: flex; align-items: center; gap: 12px; }
  .lesson-badge { background: var(--pink-bg); color: var(--pink-text); font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; }
  .lesson-name { font-size: 14px; color: var(--text-secondary); }
  .app { width: 100%; max-width: 680px; background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border-light); padding: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .progress-bar { display: flex; gap: 6px; margin-bottom: 1.75rem; }
  .pdot { height: 5px; flex: 1; border-radius: 10px; background: var(--border-light); transition: background .3s; }
  .pdot.done { background: var(--green-border); }
  .pdot.active { background: var(--pink-border); }
  .screen { display: none; }
  .screen.active { display: block; }
  .slabel { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .09em; margin-bottom: .5rem; }
  .stitle { font-size: 21px; font-weight: 500; color: var(--text-primary); margin-bottom: 1.25rem; line-height: 1.3; }
  .card { background: var(--bg-secondary); border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: .75rem; }
  .cs { font-size: 17px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
  .ce { font-size: 14px; color: var(--text-secondary); }
  .cn { font-size: 13px; color: var(--pink-text); margin-top: 6px; }
  .hl  { background: var(--pink-bg);   color: var(--pink-text);   padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .hl2 { background: var(--green-bg);  color: var(--green-text);  padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .hl3 { background: var(--purple-bg); color: var(--purple-text); padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .hl4 { background: var(--amber-bg);  color: var(--amber-text);  padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .spk { display: inline-flex; align-items: center; gap: 6px; background: none; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 5px 12px; font-size: 13px; color: var(--text-secondary); cursor: pointer; margin-top: 8px; transition: background .15s; font-family: var(--font); }
  .spk:hover { background: var(--bg-tertiary); }
  .spk svg { width: 14px; height: 14px; flex-shrink: 0; }
  .ibox { background: var(--bg-secondary); border-left: 3px solid var(--pink-border); border-radius: 0 var(--radius-md) var(--radius-md) 0; padding: .75rem 1rem; margin-bottom: 1rem; font-size: 14px; line-height: 1.7; color: var(--text-secondary); }
  .ibox strong { color: var(--text-primary); font-weight: 500; }
  .ibox-amber { border-left-color: var(--amber-border); }
  .ibox-purple { border-left-color: var(--purple-border); }
  .navrow { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .btnp { background: var(--pink-border); color: var(--pink-bg); border: none; border-radius: var(--radius-md); padding: 10px 24px; font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity .15s; font-family: var(--font); }
  .btnp:hover { opacity: .88; }
  .btnp:disabled { opacity: .4; cursor: default; }
  .btng { background: none; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 10px 20px; font-size: 15px; color: var(--text-secondary); cursor: pointer; font-family: var(--font); }
  .btng:hover { background: var(--bg-secondary); }
  .blank { display: inline-block; min-width: 80px; border-bottom: 2px solid var(--pink-border); text-align: center; padding: 0 4px; font-weight: 500; color: var(--pink-text); }
  .optsrow { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 1rem; }
  .opt { border: 1.5px solid var(--border-mid); background: var(--bg-primary); border-radius: var(--radius-md); padding: 9px 18px; font-size: 15px; cursor: pointer; color: var(--text-primary); transition: all .15s; font-family: var(--font); }
  .opt:hover:not(.locked) { border-color: var(--pink-border); background: var(--pink-bg); color: var(--pink-text); }
  .opt.sel { border-color: var(--pink-border); background: var(--pink-bg); color: var(--pink-text); }
  .opt.ok  { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); }
  .opt.bad { border-color: #E24B4A; background: var(--red-bg); color: var(--red-text); }
  .opt.locked { cursor: default; }
  .fb { font-size: 14px; padding: 8px 12px; border-radius: var(--radius-md); margin-bottom: .75rem; line-height: 1.5; }
  .fb.ok  { background: var(--green-bg); color: var(--green-text); }
  .fb.bad { background: var(--red-bg);   color: var(--red-text); }
  .tbl { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: .75rem; }
  .tbl th { text-align: left; font-weight: 500; font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .06em; padding: 6px 10px; border-bottom: 0.5px solid var(--border-light); }
  .tbl td { padding: 9px 10px; border-bottom: 0.5px solid var(--border-light); color: var(--text-primary); vertical-align: top; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl .dim { color: var(--text-secondary); font-size: 13px; }
  .score-wrap { display: flex; gap: 16px; justify-content: center; margin-bottom: 1.5rem; }
  .score-circle { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--green-border); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .score-num { font-size: 28px; font-weight: 500; color: var(--green-text); line-height: 1; }
  .score-lbl { font-size: 11px; color: var(--text-tertiary); }
  .btn-complete { background: var(--green-border); color: #fff; border: none; border-radius: var(--radius-md); padding: 12px 28px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: var(--font); transition: opacity .15s; display: block; width: 100%; text-align: center; }
  .btn-complete:hover { opacity: .88; }
  .recap-row { display: flex; align-items: baseline; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid var(--border-light); font-size: 14px; }
  .recap-row:last-child { border-bottom: none; }
  .recap-badge { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-tertiary); min-width: 28px; flex-shrink: 0; }
  footer { margin-top: 2rem; font-size: 12px; color: var(--text-tertiary); text-align: center; }
  @media (max-width: 480px) { .app { padding: 1.25rem; } }
</style>
</head>
<body>
<div class="lesson-header">
  <div class="lesson-title-row">
    <span class="lesson-badge">Lekcija 5c</span>
    <span class="lesson-name">Vokativ &#x2014; U re&#269;enici &middot; In sentences</span>
  </div>
  <span style="font-size:12px;color:var(--text-tertiary)">3 od 3 lekcije o vokativu</span>
</div>
<div class="app">
  <div class="progress-bar" id="pbar"></div>
  <div id="screens"></div>
</div>
<footer>Serbian Language Course &middot; Lekcija 5c &middot; Vokativ &#x2014; U re\u010denici</footer>
<script>
const SCREENS=[
  {id:'intro',    label:'Lekcija 5c \xb7 Lesson 5c'},
  {id:'position', label:'Polo\u017eaj \xb7 Position in sentence'},
  {id:'plural',   label:'Mno\u017eina \xb7 Plural'},
  {id:'particles',label:'\u010cestice \xb7 Particles'},
  {id:'ex1',      label:'Ve\u017eba 1 \xb7 Exercise 1'},
  {id:'ex2',      label:'Ve\u017eba 2 \xb7 Exercise 2'},
  {id:'done',     label:'Zavr\u0161eno \xb7 Done'},
];
let cur=0;
let ex1s={answers:{},checked:{}};
let ex2s={answers:{},checked:{}};

function speak(t,l){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang=l||'sr-RS';u.rate=0.85;
  window.speechSynthesis.speak(u);
}
function spkBtn(t,l){
  const lang=l||'sr-RS';
  const safe=t.replace(/'/g,"\\'");
  return '<button class="spk" onclick="speak(\''+safe+'\',\''+lang+'\')">'
    +'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">'
    +'<path d="M10 3v14M6 6v8M14 5v10M2 8v4M18 7v6"/>'
    +'</svg>Slu\u0161aj</button>';
}

// EX1: choose the sentence with correct punctuation / vocative placement
const EX1=[
  {s:'Which sentence is written correctly?',
   e:'Marko, come here! vs. Marko come here!',
   opts:['Marko, do\u0111i ovamo!','Marko do\u0111i ovamo!','Marko. do\u0111i ovamo!'], correct:0,
   audio:'Marko, do\u0111i ovamo!',
   expl:'The vocative is <strong>always separated by a comma</strong> in writing. "Marko, do\u0111i ovamo!" is correct. Without the comma it is ambiguous or simply wrong punctuation in Serbian.'},
  {s:'Which sentence is written correctly?',
   e:'Mum, are you home? (vocative at the end)',
   opts:['Jesi li ku\u0107i, mamo?','Jesi li ku\u0107i mamo?','Jesi li ku\u0107i? Mamo'], correct:0,
   audio:'Jesi li ku\u0107i, mamo?',
   expl:'When the vocative appears at the <strong>end</strong> of the sentence, the comma comes <em>before</em> it: "Jesi li ku\u0107i, mamo?" The vocative is still set off regardless of position.'},
  {s:'Choose the correct vocative form for plural address.',
   e:'Students, listen! (addressing multiple students)',
   opts:['Studenti, slu\u0161ajte!','Studente, slu\u0161ajte!','Student, slu\u0161ajte!'], correct:0,
   audio:'Studenti, slu\u0161ajte!',
   expl:'The vocative plural of most masculine nouns is <strong>identical to the nominative plural</strong>: student \u2192 studenti (pl. nom. = pl. voc.). The singular vocative "studente" would be wrong for a group.'},
  {s:'Which version uses the particle correctly?',
   e:'Hey, Marko! / O Marko!',
   opts:['Hej, Marko!','Hej Marko!','Hej; Marko!'], correct:0,
   audio:'Hej, Marko!',
   expl:'Vocative particles (hej, ej, o) are also separated from the name by a comma: <strong>Hej, Marko!</strong>. The particle itself is not the vocative \u2014 the name in vocative form is.'},
  {s:'Complete the sentence with the right form.',
   e:'People, be careful!',
   opts:['Ljudi, oprezno!','Ljude, oprezno!','Narod, oprezno!'], correct:0,
   audio:'Ljudi, oprezno!',
   expl:'The vocative plural of <em>\u010dovek</em> (man) in collective address is <strong>ljudi</strong> (people) \u2014 the nominative plural, which doubles as the vocative plural. It is the standard way to address a crowd.'},
];

// EX2: rewrite the sentence replacing the noun with the correct vocative form
const EX2=[
  {s:'Original: <em>Ana, do\u0111i ovde!</em><br>Now address <strong>both Ana and Marko</strong> at once.',
   e:'Ana and Marko, come here!',
   opts:['Ano i Marko, do\u0111ite ovde!','Ana i Marko, do\u0111ite ovde!','Ano i Marku, do\u0111ite ovde!'], correct:0,
   expl:'When addressing multiple people by name, each name takes the vocative: Ana \u2192 <strong>Ano</strong>, Marko \u2192 <strong>Marko</strong> (unchanged). The verb shifts to plural: do\u0111i \u2192 do\u0111ite.'},
  {s:'Sentence: <em>Pomozite mi!</em><br>Add a formal address to a <strong>male doctor</strong> at the beginning.',
   e:'Doctor, help me!',
   opts:['Doktore, pomozite mi!','Doktor, pomozite mi!','Doktoru, pomozite mi!'], correct:0,
   expl:'doktor \u2192 vocative: <strong>doktore</strong> (masc. consonant stem + -e). Place at sentence start, followed by a comma.'},
  {s:'Choose the sentence where the vocative is at the <strong>middle</strong> of the sentence.',
   e:'I\'m telling you, brother, you\'re wrong.',
   opts:['Ka\u017eem ti, brate, gre\u0161i\u0161.','Brate, ka\u017eem ti da gre\u0161i\u0161.','Ka\u017eem ti da gre\u0161i\u0161, brate.'], correct:0,
   expl:'The vocative can appear anywhere in the sentence \u2014 beginning, middle, or end \u2014 and is <strong>always set off by commas on both sides</strong> when mid-sentence: "Ka\u017eem ti, brate, gre\u0161i\u0161."'},
  {s:'Address a group of <strong>female friends</strong>: drugarica (sg) \u2192 plural vocative?',
   e:'Friends, let\'s go!',
   opts:['Drugarice, idemo!','Drugarico, idemo!','Drugarica, idemo!'], correct:0,
   expl:'The plural of drugarica is drugarice (nom. pl.). The vocative plural = nominative plural for this noun: <strong>Drugarice, idemo!</strong> The singular vocative "drugarice" happens to look the same \u2014 context (plural verb idemo) clarifies.'},
  {s:'Which correctly uses the particle <em>o</em> (O) for poetic address?',
   e:'O homeland, I love you!',
   opts:['O domovino, volim te!','O domovina, volim te!','O domovini, volim te!'], correct:0,
   expl:'domovina (fem. -a) \u2192 vocative: <strong>domovino</strong>. The particle <em>o</em> precedes the vocative, separated by no comma in poetic/elevated style (this differs from conversational hej/ej which do take a comma).'},
];

function buildProgress(){
  document.getElementById('pbar').innerHTML=SCREENS.map((s,i)=>
    `<div class="pdot ${i<cur?'done':i===cur?'active':''}"></div>`).join('');
}

function buildScreens(){
  const c=document.getElementById('screens');c.innerHTML='';
  const mk=(id,html)=>{
    const d=document.createElement('div');
    d.className=`screen ${id===SCREENS[cur].id?'active':''}`;
    d.id=`sc-${id}`;d.innerHTML=html;c.appendChild(d);
  };

  mk('intro',`
    <div class="slabel">${SCREENS[0].label}</div>
    <div class="stitle">Vokativ u re\u010denici &middot; Vocative in the sentence</div>
    <div class="ibox" style="border-left:3px solid var(--pink-border);">
      <strong>Tri va\u017ena pravila.</strong><br><br>
      1. Vokativ se uvek <strong>odvaja zarezom</strong> u pisanju.<br>
      2. Mo\u017ee da stoji na po\u010detku, u sredini ili na kraju re\u010denice.<br>
      3. Mno\u017eina vokativa je <strong>naj\u010de\u0161\u0107e ista kao nominativ mno\u017eine</strong>.<br><br>
      <strong>Three key rules.</strong><br>
      1. The vocative is always set off by a <strong>comma</strong> in writing.<br>
      2. It can appear at the start, middle, or end of a sentence.<br>
      3. The vocative plural is <strong>usually identical to the nominative plural</strong>.
    </div>
    <div class="card">
      <div class="cs"><span class="hl">Marko</span>, do\u0111i ovamo!</div>
      <div class="ce">Marko, come here! &#x2014; vocative at the start</div>
      <div class="cn">comma after the vocative, then the main clause</div>
      ${spkBtn('Marko, do\u0111i ovamo!')}
    </div>
    <div class="card">
      <div class="cs">Jesi li ku\u0107i, <span class="hl">mamo</span>?</div>
      <div class="ce">Are you home, mum? &#x2014; vocative at the end</div>
      <div class="cn">comma before the vocative when it follows the main clause</div>
      ${spkBtn('Jesi li ku\u0107i, mamo?')}
    </div>
    <div class="card">
      <div class="cs">Ka\u017eem ti, <span class="hl">brate</span>, gre\u0161i\u0161.</div>
      <div class="ce">I'm telling you, brother, you're wrong. &#x2014; vocative mid-sentence</div>
      <div class="cn">commas on both sides when the vocative interrupts the sentence</div>
      ${spkBtn('Ka\u017eem ti, brate, gre\u0161i\u0161.')}
    </div>
    <div class="navrow"><span></span><button class="btnp" onclick="goNext()">Polo\u017eaj &#x2192;</button></div>
  `);

  mk('position',`
    <div class="slabel">${SCREENS[1].label}</div>
    <div class="stitle">Gde stoji vokativ? &middot; Where does the vocative go?</div>
    <div class="ibox">The vocative is syntactically <strong>free</strong> &#x2014; unlike other cases it is not governed by a verb or preposition.
    It simply "floats" outside the core sentence and can attach at any point.
    The comma is the signal that tells the reader a vocative is present.</div>
    <div class="card">
      <div style="font-size:13px;font-weight:500;color:var(--pink-text);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;">Po\u010detak &middot; Start</div>
      <div class="cs"><span class="hl">Sine</span>, pazi na sebe!</div>
      <div class="ce">Son, take care of yourself!</div>
      ${spkBtn('Sine, pazi na sebe!')}
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:500;color:var(--pink-text);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;">Sredina &middot; Middle</div>
      <div class="cs">Molim te, <span class="hl">mamo</span>, ne brini!</div>
      <div class="ce">Please, mum, don't worry!</div>
      ${spkBtn('Molim te, mamo, ne brini!')}
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:500;color:var(--pink-text);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;">Kraj &middot; End</div>
      <div class="cs">Kako si, <span class="hl">drugarice</span>?</div>
      <div class="ce">How are you, (female) friend?</div>
      ${spkBtn('Kako si, drugarice?')}
    </div>
    <div class="ibox ibox-amber" style="margin-top:.25rem;">
      <strong>&#x26A0; In speech</strong> the comma is replaced by a brief <strong>intonation break</strong> (a slight pause).
      The vocative typically has a falling or calling intonation that distinguishes it from the rest of the sentence.
    </div>
    <div class="navrow">
      <button class="btng" onclick="goPrev()">&#x2190; Nazad</button>
      <button class="btnp" onclick="goNext()">Mno\u017eina &#x2192;</button>
    </div>
  `);

  mk('plural',`
    <div class="slabel">${SCREENS[2].label}</div>
    <div class="stitle">Vokativ mno\u017eine &middot; Vocative plural</div>
    <div class="ibox">Serbian does have a vocative plural, but for most nouns it is <strong>identical to the nominative plural</strong>.
    This makes it simple to use &#x2014; just use the regular plural form and add commas.</div>
    <table class="tbl">
      <thead><tr><th>Nominativ jd.</th><th>Vokativ jd.</th><th>Nominativ mn.</th><th>Vokativ mn.</th></tr></thead>
      <tbody>
        <tr>
          <td>brat</td>
          <td><span class="hl">brate</span></td>
          <td>bra\u0107a</td>
          <td><span class="hl2">bra\u0107o</span> <span style="font-size:12px;color:var(--text-tertiary)">(exception)</span></td>
        </tr>
        <tr>
          <td>drug</td>
          <td><span class="hl">dru\u017ee</span></td>
          <td>drugovi</td>
          <td><span class="hl2">drugovi</span></td>
        </tr>
        <tr>
          <td>student</td>
          <td><span class="hl">studente</span></td>
          <td>studenti</td>
          <td><span class="hl2">studenti</span></td>
        </tr>
        <tr>
          <td>mama</td>
          <td><span class="hl">mamo</span></td>
          <td>mame</td>
          <td><span class="hl2">mame</span></td>
        </tr>
        <tr>
          <td>drugarica</td>
          <td><span class="hl">drugarice</span></td>
          <td>drugarice</td>
          <td><span class="hl2">drugarice</span></td>
        </tr>
      </tbody>
    </table>
    <div class="ibox ibox-purple" style="margin-top:.25rem;">
      <strong>Exception &#x2014; bra\u0107a:</strong> The collective noun <em>bra\u0107a</em> (brothers) is grammatically feminine singular,
      so its vocative is <strong>bra\u0107o</strong> (following the fem. -a \u2192 -o rule), not <em>bra\u0107a</em>.
      This is one of the few genuine plural vocative forms that differs from the nominative plural.
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:10px;">Hear plural vocatives in use</div>
      <div class="cs"><span class="hl2">Studenti</span>, ti\u0161ina, molim!</div>
      <div class="ce">Students, silence please!</div>
      ${spkBtn('Studenti, ti\u0161ina, molim!')}
    </div>
    <div class="navrow">
      <button class="btng" onclick="goPrev()">&#x2190; Nazad</button>
      <button class="btnp" onclick="goNext()">\u010cestice &#x2192;</button>
    </div>
  `);

  mk('particles',`
    <div class="slabel">${SCREENS[3].label}</div>
    <div class="stitle">\u010cestice uz vokativ &middot; Particles with the vocative</div>
    <div class="ibox">Serbian has several particles that intensify or colour a vocative call.
    They appear before the vocative and have their own punctuation rules.</div>
    <div class="card">
      <div class="cs"><span class="hl3">Hej</span>, <span class="hl">Marko</span>!</div>
      <div class="ce">Hey, Marko! &#x2014; casual call, colloquial</div>
      <div class="cn">hej + comma + vocative. Used to get someone's attention informally.</div>
      ${spkBtn('Hej, Marko!')}
    </div>
    <div class="card">
      <div class="cs"><span class="hl3">Ej</span>, <span class="hl">drugarice</span>!</div>
      <div class="ce">Hey, friend! &#x2014; colloquial, slightly warmer than hej</div>
      <div class="cn">ej + comma + vocative</div>
      ${spkBtn('Ej, drugarice!')}
    </div>
    <div class="card">
      <div class="cs"><span class="hl3">O</span> <span class="hl">domovino</span> moja!</div>
      <div class="ce">O my homeland! &#x2014; poetic, elevated register</div>
      <div class="cn">o + vocative (no comma in literary/poetic use). domovina \u2192 domovino.</div>
      ${spkBtn('O domovino moja!')}
    </div>
    <div class="card">
      <div class="cs"><span class="hl3">Ajde</span>, <span class="hl">brate</span>, idemo!</div>
      <div class="ce">Come on, bro, let's go! &#x2014; very common colloquial expression</div>
      <div class="cn">ajde (come on) + comma + vocative. One of the most frequent patterns in spoken Serbian.</div>
      ${spkBtn('Ajde, brate, idemo!')}
    </div>
    <div class="ibox ibox-amber" style="margin-top:.5rem;">
      <strong>Punctuation summary:</strong><br>
      <em>Hej</em> and <em>ej</em>: always followed by a comma before the vocative.<br>
      <em>O</em> in poetic register: no comma (merged with the vocative).<br>
      <em>O</em> in spoken register: comma permitted.<br>
      The vocative itself always takes a comma separating it from the rest of the sentence.
    </div>
    <div class="navrow">
      <button class="btng" onclick="goPrev()">&#x2190; Nazad</button>
      <button class="btnp" onclick="goNext()">Ve\u017eba 1 &#x2192;</button>
    </div>
  `);

  mk('ex1', buildEx1HTML());
  mk('ex2', buildEx2HTML());

  const s1=EX1.filter((_,i)=>ex1s.checked[i]===true).length;
  const s2=EX2.filter((_,i)=>ex2s.checked[i]===true).length;
  const lastScreen=SCREENS[SCREENS.length-1];
  mk('done',`
    <div class="slabel">${lastScreen.label}</div>
    <div class="stitle">\u010cestitamo! Sve 3 lekcije o vokativu zavr\u0161ene!</div>
    <div class="score-wrap">
      <div class="score-circle"><div class="score-num">${s1}/${EX1.length}</div><div class="score-lbl">Ve\u017eba 1</div></div>
      <div class="score-circle"><div class="score-num">${s2}/${EX2.length}</div><div class="score-lbl">Ve\u017eba 2</div></div>
    </div>
    <div class="card">
      <div class="cs" style="font-size:15px;margin-bottom:10px;">\u0160ta si nau\u010dio/la u svim 3 lekcijama o vokativu</div>
      <div style="padding-top:4px;">
        <div class="recap-row"><span class="recap-badge">5a</span><span>Endings: masc. consonant \u2192 <strong>-e</strong> (sibilarization k\u2192\u010d, g\u2192\u017e, h\u2192\u0161); masc. -o \u2192 unchanged; fem. -a \u2192 <strong>-o</strong>; fem. consonant &amp; neuter \u2192 unchanged</span></div>
        <div class="recap-row"><span class="recap-badge">5b</span><span>Family terms (mamo, tato, brate); formal titles (gospodine, profesore, doktore); soft stems take <strong>-u</strong> (prijatelju, u\u010ditelju); -ica nouns take <strong>-ice</strong></span></div>
        <div class="recap-row"><span class="recap-badge">5c</span><span>Always set off by <strong>comma</strong>; free position in sentence; plural vocative = nominative plural (except bra\u0107o); particles: hej/ej + comma; o without comma in poetry</span></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:.6rem;margin-top:1.25rem;">
      <button class="btn-complete" onclick="markAndGoNext()">&#x279C; Slede\u0107a lekcija &mdash; Lekcija 6 &mdash; Instrumental: expressing means, company, and state ("putovati vozom", "biti sa prijateljem").</button>
      <button class="btng" style="width:100%;text-align:center;" onclick="markAndGoHome()">&#x21A9; Vrati se na po\u010detnu &middot; Back to home</button>
      <button class="btng" style="width:100%;text-align:center;" onclick="restart()">&#x21BA; Ponovi lekciju &middot; Restart</button>
    </div>
  `);
}

function buildEx1HTML(){
  let h=`<div class="slabel">${SCREENS.find(s=>s.id==='ex1').label}</div>`;
  h+=`<div class="ibox">Choose the correctly written sentence in each case. Focus on punctuation and the right vocative form.</div>`;
  EX1.forEach((q,qi)=>{
    const chk=ex1s.checked[qi]!==undefined;
    const sel=ex1s.answers[qi];
    const filled=sel!==undefined?q.opts[sel]:'___';
    h+=`<div class="card" style="margin-bottom:1rem;">
      <div style="font-size:15px;color:var(--text-primary);margin-bottom:4px;line-height:1.6;font-weight:500;">${q.s}</div>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">${q.e}</div>
      <div class="optsrow">`;
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+=`<button class="${cls}" onclick="ex1pick(${qi},${oi})" style="font-size:14px;">${opt}</button>`;
    });
    h+=`</div>`;
    if(chk)h+=`<div class="fb ${ex1s.checked[qi]?'ok':'bad'}">${ex1s.checked[qi]?'Ta\u010dno! \u2713':'Neta\u010dno.'} \u2014 ${q.expl}</div>`;
    h+=`${spkBtn(q.audio||q.opts[q.correct])}</div>`;
  });
  const allA=EX1.every((_,i)=>ex1s.answers[i]!==undefined);
  const allC=EX1.every((_,i)=>ex1s.checked[i]!==undefined);
  h+=`<div class="navrow"><button class="btng" onclick="goPrev()">\u2190 Nazad</button>`;
  if(!allC)h+=`<button class="btnp" ${allA?'':'disabled'} onclick="checkEx1()">Proveri</button>`;
  else h+=`<button class="btnp" onclick="goNext()">Ve\u017eba 2 \u2192</button>`;
  h+=`</div>`;return h;
}

function buildEx2HTML(){
  let h=`<div class="slabel">${SCREENS.find(s=>s.id==='ex2').label}</div>`;
  h+=`<div class="ibox">Each question asks you to transform or extend a sentence using the vocative correctly. Read the instruction carefully.</div>`;
  EX2.forEach((q,qi)=>{
    const chk=ex2s.checked[qi]!==undefined;
    const sel=ex2s.answers[qi];
    h+=`<div class="card" style="margin-bottom:1rem;">
      <div style="font-size:16px;margin-bottom:6px;">${q.s}</div>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">${q.e}</div>
      <div class="optsrow">`;
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+=`<button class="${cls}" onclick="ex2pick(${qi},${oi})" style="font-size:14px;">${opt}</button>`;
    });
    h+=`</div>`;
    if(chk)h+=`<div class="fb ${ex2s.checked[qi]?'ok':'bad'}">${ex2s.checked[qi]?'Ta\u010dno! \u2713':'Neta\u010dno.'} \u2014 ${q.expl}</div>`;
    h+=`</div>`;
  });
  const allA=EX2.every((_,i)=>ex2s.answers[i]!==undefined);
  const allC=EX2.every((_,i)=>ex2s.checked[i]!==undefined);
  h+=`<div class="navrow"><button class="btng" onclick="goPrev()">\u2190 Nazad</button>`;
  if(!allC)h+=`<button class="btnp" ${allA?'':'disabled'} onclick="checkEx2()">Proveri</button>`;
  else h+=`<button class="btnp" onclick="goNext()">Zavr\u0161etak \u2192</button>`;
  h+=`</div>`;return h;
}

function ex1pick(qi,oi){if(ex1s.checked[qi]!==undefined)return;ex1s.answers[qi]=oi;refreshEx1();}
function refreshEx1(){
  const old=document.getElementById('sc-ex1');if(!old)return;
  const d=document.createElement('div');
  d.className=`screen ${SCREENS[cur].id==='ex1'?'active':''}`;
  d.id='sc-ex1';d.innerHTML=buildEx1HTML();old.replaceWith(d);
}
function checkEx1(){EX1.forEach((_,i)=>{if(ex1s.answers[i]!==undefined)ex1s.checked[i]=ex1s.answers[i]===EX1[i].correct;});refreshEx1();}
function ex2pick(qi,oi){if(ex2s.checked[qi]!==undefined)return;ex2s.answers[qi]=oi;refreshEx2();}
function refreshEx2(){
  const old=document.getElementById('sc-ex2');if(!old)return;
  const d=document.createElement('div');
  d.className=`screen ${SCREENS[cur].id==='ex2'?'active':''}`;
  d.id='sc-ex2';d.innerHTML=buildEx2HTML();old.replaceWith(d);
}
function checkEx2(){EX2.forEach((_,i)=>{if(ex2s.answers[i]!==undefined)ex2s.checked[i]=ex2s.answers[i]===EX2[i].correct;});refreshEx2();}
function goNext(){if(cur<SCREENS.length-1){cur++;render();window.scrollTo({top:0,behavior:'smooth'});}}
function goPrev(){if(cur>0){cur--;render();window.scrollTo({top:0,behavior:'smooth'});}}
function restart(){cur=0;ex1s={answers:{},checked:{}};ex2s={answers:{},checked:{}};render();}
function render(){
  buildScreens();buildProgress();
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.toggle('active',s.id===`sc-${SCREENS[cur].id}`);
  });
}
render();

function markAndGoHome(){
  try{const p=JSON.parse(localStorage.getItem('serbian_course_progress')||'{}');p['L5c']=true;localStorage.setItem('serbian_course_progress',JSON.stringify(p));}catch(e){}
  window.location.href='serbian-course-home.html';
}
function markAndGoNext(){
  try{const p=JSON.parse(localStorage.getItem('serbian_course_progress')||'{}');p['L5c']=true;localStorage.setItem('serbian_course_progress',JSON.stringify(p));}catch(e){}
  window.location.href='serbian-lesson6a-instrumental-imenice.html';
}
</script>
