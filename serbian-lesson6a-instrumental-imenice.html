  <style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f4f0;

    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;

    --border-mid: rgba(0,0,0,0.18);

    --purple-bg: #EEEDFE;

      --coral-text: #F0997B;

      --coral-dark: #F5C4B3;
      --purple-bg: #26215C;
      --purple-text: #AFA9EC;
      --purple-border: #7F77DD;
      --green-bg: #04342C;
      --green-text: #9FE1CB;
      --green-border: #1D9E75;
      --red-bg: #501313;
      --red-text: #F09595;
    }
  }
  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  .lesson-header {
    width: 100%;
    max-width: 680px;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .lesson-title-row { display: flex; align-items: center; gap: 12px; }
  .lesson-badge {
    background: var(--coral-bg);
    color: var(--coral-text);
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .lesson-name { font-size: 14px; color: var(--text-secondary); }
  .app {
    width: 100%;
    max-width: 680px;
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border-light);
    padding: 2rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .progress-bar { display: flex; gap: 6px; margin-bottom: 1.75rem; }
  .pdot { height: 5px; flex: 1; border-radius: 10px; background: var(--border-light); transition: background .3s; }
  .pdot.done { background: var(--green-border); }
  .pdot.active { background: var(--coral-border); }
  .screen { display: none; }
  .screen.active { display: block; }
  .slabel { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .09em; margin-bottom: .5rem; }
  .stitle { font-size: 21px; font-weight: 500; color: var(--text-primary); margin-bottom: 1.25rem; line-height: 1.3; }
  .card {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border-light);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: .75rem;
  }
  .cs { font-size: 17px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
  .ce { font-size: 14px; color: var(--text-secondary); }
  .cn { font-size: 13px; color: var(--coral-text); margin-top: 6px; }
  .hl  { background: var(--coral-bg);  color: var(--coral-text);  padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .hl2 { background: var(--green-bg);  color: var(--green-text);  padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .hl3 { background: var(--purple-bg); color: var(--purple-text); padding: 1px 5px; border-radius: 4px; font-weight: 500; }
  .spk {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md); padding: 5px 12px;
    font-size: 13px; color: var(--text-secondary);
    cursor: pointer; margin-top: 8px; transition: background .15s;
    font-family: var(--font);
  }
  .spk:hover { background: var(--bg-tertiary); }
  .spk svg { width: 14px; height: 14px; flex-shrink: 0; }
  .ibox {
    background: var(--bg-secondary);
    border-left: 3px solid var(--coral-border);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
    padding: .75rem 1rem;
    margin-bottom: 1rem;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
  }
  .ibox-purple { border-left-color: var(--purple-border); }
  .ibox strong { color: var(--text-primary); font-weight: 500; }
  .navrow { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .btnp {
    background: var(--coral-border); color: var(--coral-bg);
    border: none; border-radius: var(--radius-md);
    padding: 10px 24px; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: opacity .15s; font-family: var(--font);
  }
  .btnp:hover { opacity: .88; }
  .btnp:disabled { opacity: .4; cursor: default; }
  .btng {
    background: none; border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-md); padding: 10px 20px;
    font-size: 15px; color: var(--text-secondary);
    cursor: pointer; font-family: var(--font);
  }
  .btng:hover { background: var(--bg-secondary); }
  .blank { display: inline-block; min-width: 80px; border-bottom: 2px solid var(--coral-border); text-align: center; padding: 0 4px; font-weight: 500; color: var(--coral-text); }
  .optsrow { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 1rem; }
  .opt {
    border: 1.5px solid var(--border-mid); background: var(--bg-primary);
    border-radius: var(--radius-md); padding: 9px 18px;
    font-size: 15px; cursor: pointer; color: var(--text-primary);
    transition: all .15s; font-family: var(--font);
  }
  .opt:hover:not(.locked) { border-color: var(--coral-border); background: var(--coral-bg); color: var(--coral-text); }
  .opt.sel { border-color: var(--coral-border); background: var(--coral-bg); color: var(--coral-text); }
  .opt.ok  { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); }
  .opt.bad { border-color: #E24B4A; background: var(--red-bg); color: var(--red-text); }
  .opt.locked { cursor: default; }
  .fb { font-size: 14px; padding: 8px 12px; border-radius: var(--radius-md); margin-bottom: .75rem; line-height: 1.5; }
  .fb.ok  { background: var(--green-bg); color: var(--green-text); }
  .fb.bad { background: var(--red-bg);   color: var(--red-text); }
  .match-wrap { display: grid; grid-template-columns: 1fr 28px 1fr; gap: 10px; align-items: start; }
  .mcol { display: flex; flex-direction: column; gap: 8px; }
  .mi {
    border: 1.5px solid var(--border-mid); border-radius: var(--radius-md);
    padding: 9px 14px; font-size: 14px; background: var(--bg-primary);
    cursor: pointer; transition: all .15s; color: var(--text-primary);
    line-height: 1.4; min-height: 52px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .mi:hover:not(.locked) { border-color: var(--coral-border); background: var(--coral-bg); color: var(--coral-text); }
  .mi.sel-l  { border-color: var(--coral-border); background: var(--coral-bg); color: var(--coral-text); }
  .mi.ok     { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); cursor: default; }
  .mi.bad    { border-color: #E24B4A; background: var(--red-bg); color: var(--red-text); }
  .mi.locked { cursor: default; }
  .arr { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; }
  .arrline { height: 52px; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary); font-size: 15px; }
  .tbl { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: .75rem; }
  .tbl th { text-align: left; font-weight: 500; font-size: 12px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .06em; padding: 6px 10px; border-bottom: 0.5px solid var(--border-light); }
  .tbl td { padding: 9px 10px; border-bottom: 0.5px solid var(--border-light); color: var(--text-primary); }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl .dim { color: var(--text-secondary); }
  .prep-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
  .prep-card { background: var(--bg-tertiary); border-radius: var(--radius-md); padding: 8px; text-align: center; }
  .prep-word { font-weight: 500; font-size: 15px; color: var(--text-primary); }
  .prep-mean { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .use-label { font-size: 13px; font-weight: 500; color: var(--coral-text); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
  .score-wrap { display: flex; gap: 16px; justify-content: center; margin-bottom: 1.5rem; }
  .score-circle {
    width: 90px; height: 90px; border-radius: 50%;
    border: 3px solid var(--green-border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .score-num { font-size: 28px; font-weight: 500; color: var(--green-text); line-height: 1; }
  .score-lbl { font-size: 11px; color: var(--text-tertiary); }
  footer { margin-top: 2rem; font-size: 12px; color: var(--text-tertiary); text-align: center; }
  @media (max-width: 480px) {
    .prep-grid { grid-template-columns: repeat(2,1fr); }
    .app { padding: 1.25rem; }
  }

  
  .home-link {
    font-size: 13px; color: var(--text-tertiary); text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border-light);
    transition: background .15s; cursor: pointer;

  }
  .home-link:hover { background: var(--bg-secondary); color: var(--text-secondary); }
  .btn-complete {

    padding: 12px 28px; font-size: 15px; font-weight: 500;
    cursor: pointer; font-family: var(--font);
    transition: opacity .15s; display: block;
    width: 100%; text-align: center;
  }
  .btn-complete:hover { opacity: .88; }

  
  .home-link {
    font-size:13px;color:var(--text-tertiary);text-decoration:none;
    display:inline-flex;align-items:center;gap:4px;
    padding:4px 10px;border-radius:var(--radius-md);
    border:0.5px solid var(--border-light);
    transition:background .15s;cursor:pointer;
    background:none;font-family:var(--font);
  }
  .home-link:hover{background:var(--bg-secondary);color:var(--text-secondary);}
  .btn-complete{
    background:var(--green-border);color:#fff;
    border:none;border-radius:var(--radius-md);
    padding:12px 28px;font-size:15px;font-weight:500;
    cursor:pointer;font-family:var(--font);
    transition:opacity .15s;display:block;
    width:100%;text-align:center;
  }
  .btn-complete:hover{opacity:.88;}

<script src="https://code.responsivevoice.org/responsivevoice.js?key=J0RsyXE5"></script>

<body>
<div class="lesson-header">
  <div class="lesson-title-row">
    <span class="lesson-badge">Lekcija 6a</span>
    <span class="lesson-name">Instrumental — Imenice &middot; Instrumental Nouns</span>
  </div>
  <a class="home-link" href="serbian-course-home.html">&#x2190; Kurs</a>
</div>
<div class="app">
  <div class="progress-bar" id="pbar"></div>
  <div id="screens"></div>
</div>
<footer>Serbian Language Course &middot; Lekcija 6a &middot; Instrumental Nouns</footer>
<script>
const SCREENS=[
  {id:'intro', label:'Lekcija 6a · Lesson 6a'},
  {id:'companion', label:'Društvo · Companionship'},
  {id:'means', label:'Sredstvo · Means'},
  {id:'identity', label:'Identitet · Identity'},
  {id:'endings', label:'Nastavci · Endings'},
  {id:'ex1', label:'Vežba 1 · Exercise 1'},
  {id:'ex2', label:'Vežba 2 · Exercise 2'},
  {id:'done', label:'Završeno · Done'},
];
let cur=0;
let ex1s={answers:{},checked:{}};
let ex2s={answers:{},checked:{}};

function speak(t){
  if(window.responsiveVoice){
    responsiveVoice.cancel();
    responsiveVoice.speak(t,"Serbian Male",{rate:0.9});
  } else {
    // fallback to browser TTS if ResponsiveVoice fails to load
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(t);
    u.lang='sr-RS';u.rate=0.85;
    window.speechSynthesis.speak(u);
  }
}
function spkBtn(t,l){
  const lang = l || 'sr-RS';
  const safe = t.replace(/'/g,"\\'");
  return '<button class="spk" onclick="speak(\'' + safe + '\',\'' + lang + '\')">'
    + '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">'
    + '<path d="M10 3v14M6 6v8M14 5v10M2 8v4M18 7v6"/>'
    + '</svg>Slušaj · Listen</button>';
}

const EX1=[
  {s:'Idem u školu sa ___.', e:'I go to school with a friend (m).',
   opts:['prijateljem', 'prijatelja', 'prijatelju'], correct:0, audio:'Idem u školu sa prijateljem.',
   expl:'Masculine noun + <strong>-om/-em</strong>: prijatelj ends in soft š, so → <strong>prijateljem</strong>. Sa + instrumental = companionship.'},
  {s:'Pišem ___ svaki dan.', e:'I write with a pen every day.',
   opts:['olovkom', 'olovke', 'olovki'], correct:0, audio:'Pišem olovkom svaki dan.',
   expl:'Feminine noun ending in <strong>-a</strong> → instrumental <strong>-om</strong>: olovka → <strong>olovkom</strong>. Means/instrument.'},
  {s:'Ona je postala dobrom ___.', e:'She became a good doctor (f).',
   opts:['lekarkom', 'lekarka', 'lekarki'], correct:0, audio:'Ona je postala dobrom lekarkom.',
   expl:'Predicate identity with <strong>biti + instrumental</strong>: lekarka → <strong>lekarkom</strong>. She became what? A doctor.'},
  {s:'Putujemo ___.', e:'We travel by train.',
   opts:['vozom', 'voza', 'vozu'], correct:0, audio:'Putujemo vozom.',
   expl:'Masculine noun → <strong>-om</strong>: voz → <strong>vozom</strong>. Means of transport — no preposition needed.'},
  {s:'Sedi sa ___.', e:'He is sitting with his sister.',
   opts:['sestrom', 'sestre', 'sestri'], correct:0, audio:'Sedi sa sestrom.',
   expl:'Feminine noun: sestra → <strong>sestrom</strong>. Sa + instrumental = with someone.'}
];

const EX2=[
  {s:'Idem u grad sa majkom.', e:'I am going to the city with my mother.',
   opts:['društvo', 'sredstvo', 'identitet'], correct:0,
   expl:'<strong>Sa + instrumental</strong> marks companionship — going with someone. Sa majkom = with mother.'},
  {s:'Pišem nožem hleb.', e:'I am cutting bread with a knife.',
   opts:['društvo', 'sredstvo', 'identitet'], correct:1,
   expl:'<strong>Nožom</strong> without <em>sa</em> marks the instrument/tool used to perform an action.'},
  {s:'On je postao učiteljem.', e:'He became a teacher.',
   opts:['društvo', 'sredstvo', 'identitet'], correct:2,
   expl:'<strong>Biti/postati + instrumental</strong> expresses identity or role: what someone is or becomes.'},
  {s:'Putuju autom.', e:'They travel by car.',
   opts:['društvo', 'sredstvo', 'identitet'], correct:1,
   expl:'<strong>Autom</strong> — no preposition, means of transport. Instrumental marks the vehicle used.'},
  {s:'Radim sa kolegom.', e:'I work with a colleague.',
   opts:['društvo', 'sredstvo', 'identitet'], correct:0,
   expl:'<strong>Sa + instrumental</strong> = companionship. Working alongside someone.'}
];

function buildProgress(){
  document.getElementById('pbar').innerHTML=SCREENS.map((s,i)=>
    '<div class="pdot '+(i<cur?'done':i===cur?'active':'')+'" title="'+(s.label||'')+'"></div>').join('');
}
function buildScreens(){
  const c=document.getElementById('screens');c.innerHTML='';
  const mk=(id,html)=>{
    const d=document.createElement('div');
    d.className='screen '+(id===SCREENS[cur].id?'active':'');
    d.id='sc-'+id;d.innerHTML=html;c.appendChild(d);
  };
  buildAllScreens(mk);
}
function buildEx1HTML(){
  let h='<div class="slabel">'+SCREENS.find(s=>s.id==='ex1').label+'</div>';
  h+='<div class="ibox">Izaberi tačan instrumental. Pick the correct instrumental form.</div>';
  EX1.forEach((q,qi)=>{
    const chk=ex1s.checked[qi]!==undefined;
    const sel=ex1s.answers[qi];
    const filled=sel!==undefined?q.opts[sel]:'___';
    h+='<div class="card" style="margin-bottom:1rem;">'
      +'<div style="font-size:17px;color:var(--text-primary);margin-bottom:4px;line-height:1.6;">'
      +q.s.replace('___','<span class="blank">'+filled+'</span>')+'</div>'
      +'<div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">'+q.e+'</div>'
      +'<div class="optsrow">';
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+='<button class="'+cls+'" onclick="ex1pick('+qi+','+oi+')">'+opt+'</button>';
    });
    h+='</div>';
    if(chk)h+='<div class="fb '+(ex1s.checked[qi]?'ok':'bad')+'">'+(ex1s.checked[qi]?'Tačno! ✓':'Netačno.')+' — '+q.expl+'</div>';
    h+=spkBtn(q.audio||q.s.replace('___',q.opts[q.correct]).replace(/<[^>]+>/g,''))+'</div>';
  });
  const allA=EX1.every((_,i)=>ex1s.answers[i]!==undefined);
  const allC=EX1.every((_,i)=>ex1s.checked[i]!==undefined);
  h+='<div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button>';
  if(!allC)h+='<button class="btnp" '+(allA?'':'disabled')+' onclick="checkEx1()">Proveri</button>';
  else h+='<button class="btnp" onclick="goNext()">Vežba 2 →</button>';
  h+='</div>';return h;
}
function buildEx2HTML(){
  let h='<div class="slabel">'+SCREENS.find(s=>s.id==='ex2').label+'</div>';
  h+='<div class="ibox">Prepoznaj upotrebu instrumentala. Identify the use of the instrumental.</div>';
  EX2.forEach((q,qi)=>{
    const chk=ex2s.checked[qi]!==undefined;
    const sel=ex2s.answers[qi];
    h+='<div class="card" style="margin-bottom:1rem;">'
      +'<div class="cs">'+q.s+'</div>'
      +'<div class="ce">'+q.e+'</div>'
      +'<div class="optsrow" style="margin-top:10px;">';
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+='<button class="'+cls+'" onclick="ex2pick('+qi+','+oi+')">'+opt+'</button>';
    });
    h+='</div>';
    if(chk)h+='<div class="fb '+(ex2s.checked[qi]?'ok':'bad')+'">'+(ex2s.checked[qi]?'Tačno! ✓':'Netačno.')+' — '+q.expl+'</div>';
    h+='</div>';
  });
  const allA=EX2.every((_,i)=>ex2s.answers[i]!==undefined);
  const allC=EX2.every((_,i)=>ex2s.checked[i]!==undefined);
  h+='<div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button>';
  if(!allC)h+='<button class="btnp" '+(allA?'':'disabled')+' onclick="checkEx2()">Proveri</button>';
  else h+='<button class="btnp" onclick="goNext()">Završetak →</button>';
  h+='</div>';return h;
}

function buildAllScreens(mk){
  mk('intro',
    '<div class="slabel">'+SCREENS[0].label+'</div>'
    +'<div class="stitle">Instrumental &#x2014; Imenice &middot; Instrumental Nouns</div>'
    +'<div class="ibox" style="border-left:3px solid var(--coral-border);">'
    +'<strong>Na koja pitanja odgovara instrumental?</strong><br><br>'
    +'Instrumental odgovara na pitanja <strong>čime?</strong> (with what? / by what?) i <strong>kime?</strong> (with whom?). '
    +'Koristi se za tri glavne stvari: <strong>društvo</strong> (sa kim?), <strong>sredstvo</strong> (čim?) i <strong>identitet</strong> (ko si/šta si?).<br><br>'
    +'<strong>What does the instrumental express?</strong><br>'
    +'Instrumental marks <strong>companionship</strong> (with someone), <strong>means or instrument</strong> (by/with something), '
    +'and <strong>predicate identity</strong> (becoming or being something).'
    +'</div>'
    +'<div class="card"><div class="cs">Idem sa <span class="hl">sestrom</span>.</div>'
    +'<div class="ce">I am going with my sister.</div>'
    +'<div class="cn">kime? → sestrom — društvo</div>'
    +spkBtn('Idem sa sestrom.')+'</div>'
    +'<div class="card"><div class="cs">Pišem <span class="hl">olovkom</span>.</div>'
    +'<div class="ce">I write with a pen.</div>'
    +'<div class="cn">čime? → olovkom — sredstvo</div>'
    +spkBtn('Pišem olovkom.')+'</div>'
    +'<div class="card"><div class="cs">On je <span class="hl">lekarom</span>.</div>'
    +'<div class="ce">He is a doctor.</div>'
    +'<div class="cn">ko je? → lekarom — identitet</div>'
    +spkBtn('On je lekarom.')+'</div>'
    +'<div class="navrow"><span></span><button class="btnp" onclick="goNext()">Društvo →</button></div>'
  );

  mk('companion',
    '<div class="slabel">'+SCREENS[1].label+'</div>'
    +'<div class="stitle">Društvo &middot; Companionship</div>'
    +'<div class="ibox"><strong>Sa + instrumental</strong> marks being or doing something <strong>with someone</strong>. '
    +'This is the most frequent use of the instrumental in everyday Serbian. '
    +'Always use <strong>sa</strong> (with) before the noun in its instrumental form. '
    +'Ask: <strong>kime?</strong> (with whom?) or <strong>čime?</strong> (with what?).</div>'
    +'<div class="card"><div class="cs">Idem u školu sa <span class="hl">prijateljem</span>.</div>'
    +'<div class="ce">I go to school with a friend.</div>'
    +'<div class="cn">prijatelj (m) → <strong>prijateljem</strong></div>'
    +spkBtn('Idem u školu sa prijateljem.')+'</div>'
    +'<div class="card"><div class="cs">Razgovaram sa <span class="hl">majkom</span>.</div>'
    +'<div class="ce">I am talking with my mother.</div>'
    +'<div class="cn">majka (f) → <strong>majkom</strong></div>'
    +spkBtn('Razgovaram sa majkom.')+'</div>'
    +'<div class="card"><div class="cs">Radim sa <span class="hl">timom</span>.</div>'
    +'<div class="ce">I work with the team.</div>'
    +'<div class="cn">tim (m) → <strong>timom</strong></div>'
    +spkBtn('Radim sa timom.')+'</div>'
    +'<div class="navrow">'
    +'<button class="btng" onclick="goPrev()">&#x2190; Nazad</button>'
    +'<button class="btnp" onclick="goNext()">Sredstvo →</button></div>'
  );

  mk('means',
    '<div class="slabel">'+SCREENS[2].label+'</div>'
    +'<div class="stitle">Sredstvo &middot; Means &amp; Instrument</div>'
    +'<div class="ibox">When a noun names the <strong>tool, vehicle, or means</strong> used to perform an action, '
    +'it takes the instrumental <strong>without any preposition</strong>. '
    +'Ask: <strong>čime?</strong> — with what? by what?<br><br>'
    +'<strong>Transport</strong> also uses bare instrumental: putovati vozom, leteti avionom.</div>'
    +'<div class="card"><div class="cs">Pišem <span class="hl">olovkom</span>.</div>'
    +'<div class="ce">I write with a pen. — čime? olovkom</div>'
    +'<div class="cn">olovka (f) → <strong>olovkom</strong></div>'
    +spkBtn('Pišem olovkom.')+'</div>'
    +'<div class="card"><div class="cs">Putujemo <span class="hl">vozom</span>.</div>'
    +'<div class="ce">We travel by train. — čime? vozom</div>'
    +'<div class="cn">voz (m) → <strong>vozom</strong></div>'
    +spkBtn('Putujemo vozom.')+'</div>'
    +'<div class="card"><div class="cs">Seku <span class="hl">nožom</span>.</div>'
    +'<div class="ce">They cut with a knife. — čime? nožom</div>'
    +'<div class="cn">nož (m, soft) → <strong>nožom</strong></div>'
    +spkBtn('Seku nožom.')+'</div>'
    +'<div class="card"><div class="cs">Letimo <span class="hl">avionom</span>.</div>'
    +'<div class="ce">We fly by plane. — čime? avionom</div>'
    +'<div class="cn">avion (m) → <strong>avionom</strong></div>'
    +spkBtn('Letimo avionom.')+'</div>'
    +'<div class="navrow">'
    +'<button class="btng" onclick="goPrev()">&#x2190; Nazad</button>'
    +'<button class="btnp" onclick="goNext()">Identitet →</button></div>'
  );

  mk('identity',
    '<div class="slabel">'+SCREENS[3].label+'</div>'
    +'<div class="stitle">Identitet &middot; Predicate Identity</div>'
    +'<div class="ibox">After the verbs <strong>biti</strong> (to be) and <strong>postati</strong> (to become), '
    +'a noun describing what someone <em>is</em> or <em>becomes</em> goes into the instrumental. '
    +'This is called the <strong>predicate instrumental</strong>.<br><br>'
    +'<strong>Note:</strong> This use is more formal/literary. In everyday speech, Nominative is also common after <em>biti</em>.</div>'
    +'<div class="card"><div class="cs">On je <span class="hl">lekarom</span>.</div>'
    +'<div class="ce">He is a doctor.</div>'
    +'<div class="cn">lekar (m) → <strong>lekarom</strong> — biti + instrumental</div>'
    +spkBtn('On je lekarom.')+'</div>'
    +'<div class="card"><div class="cs">Ona je postala <span class="hl">direktorkom</span>.</div>'
    +'<div class="ce">She became a director.</div>'
    +'<div class="cn">direktorka (f) → <strong>direktorkom</strong> — postati + instrumental</div>'
    +spkBtn('Ona je postala direktorkom.')+'</div>'
    +'<div class="card"><div class="cs">Marko je bio dobrim <span class="hl">učiteljem</span>.</div>'
    +'<div class="ce">Marko was a good teacher.</div>'
    +'<div class="cn">učitelj (m, soft) → <strong>učiteljem</strong></div>'
    +spkBtn('Marko je bio dobrim učiteljem.')+'</div>'
    +'<div class="navrow">'
    +'<button class="btng" onclick="goPrev()">&#x2190; Nazad</button>'
    +'<button class="btnp" onclick="goNext()">Nastavci →</button></div>'
  );

  mk('endings',
    '<div class="slabel">'+SCREENS[4].label+'</div>'
    +'<div class="stitle">Nastavci instrumentala &middot; Instrumental Endings</div>'
    +'<div class="ibox">The ending depends on <strong>gender</strong> and the <strong>final consonant</strong> of the noun. '
    +'Hard consonants take <strong>-om</strong>; soft consonants (c, č, ć, dž, dš, j, lj, nj, š, ž) take <strong>-em</strong>.</div>'
    +'<table class="tbl">'
    +'<thead><tr><th>Rod &middot; Gender</th><th>Nominativ</th><th>Instrumental</th><th>Nastavak</th></tr></thead>'
    +'<tbody>'
    +'<tr><td><span class="hl3">Muški &middot; Masc.</span></td><td>brat, grad</td><td>bratom, gradom</td><td><strong>-om</strong></td></tr>'
    +'<tr><td><span class="hl3">Muški soft</span></td><td>muž, nož, učitelj</td><td>mužom, nožom, učiteljem</td><td><strong>-em</strong></td></tr>'
    +'<tr><td><span class="hl">&#381;enski &middot; Fem.</span></td><td>sestra, majka, olovka</td><td>sestrom, majkom, olovkom</td><td><strong>-om</strong></td></tr>'
    +'<tr><td><span class="hl2">Srednji &middot; Neut.</span></td><td>selo, more, pišmo</td><td>selom, morem, pišmom</td><td><strong>-om</strong></td></tr>'
    +'</tbody></table>'
    +'<div class="ibox" style="margin-top:.75rem;background:rgba(255,190,0,.07);border-left:3px solid #f5a623;">'
    +'<strong>&#x26A0; Soft consonants → -em:</strong> muž→mužom (ž is technically semi-soft but takes -om), '
    +'učitelj→učiteljem (j is soft). Rule: stems ending in <strong>j, lj, nj, ć, č, š, ž</strong> before the ending get <strong>-em</strong>.</div>'
    +'<div class="card">'
    +'<div style="font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:10px;">Hear it in context</div>'
    +'<div class="cs">sa <span class="hl3">bratom</span> &nbsp;&middot;&nbsp; sa <span class="hl">sestrom</span> &nbsp;&middot;&nbsp; sa <span class="hl2">selom</span></div>'
    +'<div class="ce">with brother &nbsp;&middot;&nbsp; with sister &nbsp;&middot;&nbsp; with the village</div>'
    +spkBtn('sa bratom, sa sestrom, sa selom')+'</div>'
    +'<div class="navrow">'
    +'<button class="btng" onclick="goPrev()">&#x2190; Nazad</button>'
    +'<button class="btnp" onclick="goNext()">Vežba 1 →</button></div>'
  );

  const s1=EX1.filter((_,i)=>ex1s.checked[i]===true).length;
  const s2=EX2.filter((_,i)=>ex2s.checked[i]===true).length;
  mk('ex1',buildEx1HTML());
  mk('ex2',buildEx2HTML());
  mk('done',
    '<div class="slabel">'+SCREENS[SCREENS.length-1].label+'</div>'
    +'<div class="stitle">Lekcija 6a završena &middot; Lekcija 6a complete!</div>'
    +'<div class="score-wrap">'
    +'<div class="score-circle"><div class="score-num">'+s1+'/'+EX1.length+'</div><div class="score-lbl">Vežba 1</div></div>'
    +'<div class="score-circle"><div class="score-num">'+s2+'/'+EX2.length+'</div><div class="score-lbl">Vežba 2</div></div>'
    +'</div>'
    +'<div class="card"><div class="cs" style="font-size:15px;margin-bottom:8px;">Šta si naučio/la &middot; What you learned</div>'
    +'<ul style="padding-left:1.1rem;font-size:14px;color:var(--text-secondary);line-height:2.2;">'
    +'<li>Instrumental answers <strong>čime?</strong> (with what?) and <strong>kime?</strong> (with whom?)</li><li>Three uses: <strong>companionship</strong> (sa + instr.), <strong>means</strong> (no preposition), <strong>identity</strong> (biti/postati + instr.)</li><li>Masculine/Neuter hard → <strong>-om</strong>, soft stems → <strong>-em</strong></li><li>Feminine (-a nouns) → <strong>-om</strong>: sestra→sestrom, olovka→olovkom</li>'
    +'</ul></div>'
    +'<div style="display:flex;flex-direction:column;gap:.6rem;margin-top:1.25rem;"><button class="btn-complete" onclick="markAndGoNext()">&#x279C; Slede&#263;a lekcija &mdash; Lekcija 6b — Instrumental: Zamenice</button><button class="btng" style="width:100%;text-align:center;" onclick="markAndGoHome()">&#x21A9; Vrati se na po&#269;etnu &middot; Back to home</button><button class="btng" style="width:100%;text-align:center;" onclick="restart()">&#x21BA; Ponovi lekciju &middot; Restart</button></div>'
  );
}

function goNext(){if(cur<SCREENS.length-1){cur++;render();window.scrollTo({top:0,behavior:'smooth'});}}
function goPrev(){if(cur>0){cur--;render();window.scrollTo({top:0,behavior:'smooth'});}}
function restart(){cur=0;ex1s={answers:{},checked:{}};ex2s={answers:{},checked:{}};render();}
function render(){
  buildScreens();buildProgress();
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.toggle('active',s.id==='sc-'+SCREENS[cur].id);
  });
}
function ex1pick(qi,oi){if(ex1s.checked[qi]!==undefined)return;ex1s.answers[qi]=oi;const d=document.getElementById('sc-ex1');if(d)d.innerHTML=buildEx1HTML();}
function ex2pick(qi,oi){if(ex2s.checked[qi]!==undefined)return;ex2s.answers[qi]=oi;const d=document.getElementById('sc-ex2');if(d)d.innerHTML=buildEx2HTML();}
function checkEx1(){EX1.forEach((_,i)=>{if(ex1s.answers[i]!==undefined)ex1s.checked[i]=(ex1s.answers[i]===EX1[i].correct);});const d=document.getElementById('sc-ex1');if(d)d.innerHTML=buildEx1HTML();}
function checkEx2(){EX2.forEach((_,i)=>{if(ex2s.answers[i]!==undefined)ex2s.checked[i]=(ex2s.answers[i]===EX2[i].correct);});const d=document.getElementById('sc-ex2');if(d)d.innerHTML=buildEx2HTML();}
render();

function markAndGoHome(){
  try{const p=JSON.parse(localStorage.getItem('serbian_course_progress')||'{}');p['L6a']=true;localStorage.setItem('serbian_course_progress',JSON.stringify(p));}catch(e){}
  window.location.href='serbian-course-home.html';
}
function markAndGoNext(){
  try{const p=JSON.parse(localStorage.getItem('serbian_course_progress')||'{}');p['L6a']=true;localStorage.setItem('serbian_course_progress',JSON.stringify(p));}catch(e){}
  window.location.href='serbian-lesson6b-instrumental-zamenice.html';
}
</script>
