<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serbian · Lekcija 3a · Dativ — Imenice</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f4f0;
    --bg-tertiary: #eeedea;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #9b9b9b;
    --border-light: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.18);
    --radius-md: 8px;
    --radius-lg: 12px;
    --teal-bg: #E1F5EE;
    --teal-text: #0F6E56;
    --teal-border: #1D9E75;
    --green-bg: #E1F5EE;
    --green-text: #0F6E56;
    --green-border: #1D9E75;
    --red-bg: #FCEBEB;
    --red-text: #A32D2D;
    --purple-bg: #EEEDFE;
    --purple-text: #534AB7;
    --amber-bg: #FAEEDA;
    --amber-text: #633806;
    --amber-border: #BA7517;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1e; --bg-secondary: #2a2a2a; --bg-tertiary: #333;
      --text-primary: #f0f0f0; --text-secondary: #a0a0a0; --text-tertiary: #666;
      --border-light: rgba(255,255,255,0.1); --border-mid: rgba(255,255,255,0.18);
      --teal-bg: #04342C; --teal-text: #9FE1CB; --teal-border: #1D9E75;
      --green-bg: #04342C; --green-text: #9FE1CB; --green-border: #1D9E75;
      --red-bg: #501313; --red-text: #F09595;
      --purple-bg: #26215C; --purple-text: #AFA9EC;
      --amber-bg: #412402; --amber-text: #FAC775; --amber-border: #BA7517;
    }
  }
  body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
  .lesson-header { width: 100%; max-width: 680px; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  .lesson-badge { background: var(--teal-bg); color: var(--teal-text); font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; }
  .lesson-name { font-size: 14px; color: var(--text-secondary); }
  .lesson-series { font-size: 12px; color: var(--text-tertiary); }
  .app { width: 100%; max-width: 680px; background: var(--bg-primary); border-radius: var(--radius-lg); border: 0.5px solid var(--border-light); padding: 2rem; }
  .progress-bar { display: flex; gap: 6px; margin-bottom: 1.75rem; }
  .pdot { height: 5px; flex: 1; border-radius: 10px; background: var(--border-light); transition: background .3s; }
  .pdot.done { background: var(--teal-border); }
  .pdot.active { background: var(--teal-border); opacity: .45; }
  .screen { display: none; }
  .screen.active { display: block; }
  .slabel { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .09em; margin-bottom: .5rem; }
  .stitle { font-size: 21px; font-weight: 500; color: var(--text-primary); margin-bottom: 1.25rem; line-height: 1.3; }
  .card { background: var(--bg-secondary); border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: .75rem; }
  .cs { font-size: 17px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
  .ce { font-size: 14px; color: var(--text-secondary); }
  .cn { font-size: 13px; color: var(--teal-text); margin-top: 6px; }
  .hl  { background: var(--teal-bg);   color: var(--teal-text);   padding: 1px 6px; border-radius: 4px; font-weight: 500; }
  .hl2 { background: var(--purple-bg); color: var(--purple-text); padding: 1px 6px; border-radius: 4px; font-weight: 500; }
  .hl3 { background: var(--amber-bg);  color: var(--amber-text);  padding: 1px 6px; border-radius: 4px; font-weight: 500; }
  .spk { display: inline-flex; align-items: center; gap: 6px; background: none; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 5px 12px; font-size: 13px; color: var(--text-secondary); cursor: pointer; margin-top: 8px; transition: background .15s; font-family: var(--font); }
  .spk:hover { background: var(--bg-tertiary); }
  .spk svg { width: 14px; height: 14px; flex-shrink: 0; }
  .ibox { background: var(--bg-secondary); border-left: 3px solid var(--teal-border); border-radius: 0 var(--radius-md) var(--radius-md) 0; padding: .75rem 1rem; margin-bottom: 1rem; font-size: 14px; line-height: 1.7; color: var(--text-secondary); }
  .ibox strong { color: var(--text-primary); font-weight: 500; }
  .ibox-amber { border-left-color: var(--amber-border); }
  .ibox-purple { border-left-color: #7F77DD; }
  .navrow { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; }
  .btnp { background: var(--teal-border); color: var(--teal-bg); border: none; border-radius: var(--radius-md); padding: 10px 24px; font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity .15s; font-family: var(--font); }
  .btnp:hover { opacity: .88; }
  .btnp:disabled { opacity: .4; cursor: default; }
  .btng { background: none; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 10px 20px; font-size: 15px; color: var(--text-secondary); cursor: pointer; font-family: var(--font); }
  .btng:hover { background: var(--bg-secondary); }
  .blank { display: inline-block; min-width: 72px; border-bottom: 2px solid var(--teal-border); text-align: center; padding: 0 4px; font-weight: 500; color: var(--teal-text); }
  .optsrow { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
  .opt { border: 1.5px solid var(--border-mid); background: var(--bg-primary); border-radius: var(--radius-md); padding: 9px 18px; font-size: 15px; cursor: pointer; color: var(--text-primary); transition: all .15s; font-family: var(--font); }
  .opt:hover:not(.locked) { border-color: var(--teal-border); background: var(--teal-bg); color: var(--teal-text); }
  .opt.sel  { border-color: var(--teal-border); background: var(--teal-bg); color: var(--teal-text); }
  .opt.ok   { border-color: var(--green-border); background: var(--green-bg); color: var(--green-text); }
  .opt.bad  { border-color: #E24B4A; background: var(--red-bg); color: var(--red-text); }
  .opt.locked { cursor: default; }
  .fb { font-size: 14px; padding: 8px 12px; border-radius: var(--radius-md); margin-top: 6px; line-height: 1.5; }
  .fb.ok  { background: var(--green-bg); color: var(--green-text); }
  .fb.bad { background: var(--red-bg);   color: var(--red-text); }
  .tbl { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: .75rem; }
  .tbl th { text-align: left; font-weight: 500; font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .07em; padding: 6px 10px; border-bottom: 0.5px solid var(--border-light); }
  .tbl td { padding: 9px 10px; border-bottom: 0.5px solid var(--border-light); color: var(--text-primary); vertical-align: top; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl .dim { color: var(--text-secondary); }
  .tbl .end { font-weight: 500; color: var(--teal-text); font-size: 15px; }
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: .75rem; }
  .compare-card { background: var(--bg-secondary); border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); padding: .9rem 1rem; }
  .compare-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
  .compare-row { font-size: 15px; color: var(--text-primary); margin-bottom: 4px; }
  .score-wrap { display: flex; gap: 16px; justify-content: center; margin-bottom: 1.5rem; }
  .score-circle { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--teal-border); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .score-num { font-size: 28px; font-weight: 500; color: var(--teal-text); line-height: 1; }
  .score-lbl { font-size: 11px; color: var(--text-tertiary); }
  .recap-row { display: flex; align-items: baseline; gap: 12px; padding: 8px 0; border-bottom: 0.5px solid var(--border-light); font-size: 14px; }
  .recap-row:last-child { border-bottom: none; }
  .recap-case { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-tertiary); min-width: 60px; }
  .recap-q { color: var(--text-secondary); font-size: 13px; }
  footer { margin-top: 2rem; font-size: 12px; color: var(--text-tertiary); text-align: center; }
  @media (max-width: 480px) { .compare-grid { grid-template-columns: 1fr; } .app { padding: 1.25rem; } }

  .home-link {
    font-size: 13px;
    color: var(--text-tertiary);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-light);
    transition: background .15s;
    cursor: pointer;
    background: none;
    font-family: var(--font);
  }
  .home-link:hover { background: var(--bg-secondary); color: var(--text-secondary); }
  .btn-complete {
    background: var(--green-border);
    color: var(--green-bg);
    border: none;
    border-radius: var(--radius-md);
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: var(--font);
    margin-top: .5rem;
    transition: opacity .15s;
    display: block;
    width: 100%;
    text-align: center;
  }
  .btn-complete:hover { opacity: .88; }

  </style>

src="https://code.responsivevoice.org/responsivevoice.js?key=J0RsyXE5"></script>
</head>
<body>
<div class="lesson-header">
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="lesson-badge">Lekcija 3a · Lesson 3a</span>
    <span class="lesson-name">Dativ — imenice</span>
  </div>
  <span class="lesson-series">3 od 3 lekcija o dativu</span>
</div>
<div class="app">
  <div class="progress-bar" id="pbar"></div>
  <div id="screens"></div>
</div>
<footer>Serbian Language Course · Lesson 3a · Dativ – Nouns &amp; Endings</footer>

<script>
const SCREENS=[
  {id:'intro'},
  {id:'contrast'},
  {id:'endings'},
  {id:'ex1'},
  {id:'ex2'},
  {id:'done'},
];
let cur=0;
let ex1s={answers:{},checked:{}};
let ex2s={answers:{},checked:{}};

function speak(t){
  if(window.responsiveVoice){
    responsiveVoice.cancel();
    responsiveVoice.speak(t,"Serbian Male",{rate:0.9});
  } else {
    // fallback to browser TTS if ResponsiveVoice fails to load
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(t);
    u.lang='sr-RS';u.rate=0.85;
    window.speechSynthesis.speak(u);
  }
}
function spkBtn(t,l){
  return `<button class="spk" onclick="speak('${t.replace(/'/g,"\\'")}','${l||'sr-RS'}')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M10 3v14M6 6v8M14 5v10M2 8v4M18 7v6"/></svg>Slušaj</button>`;
}

// EX1: transform nom → dativ, one per gender
const EX1=[
  {
    nom:'mama', eng:'mom',
    stem:'mam', gender:'Feminine (-i)',
    opts:['mami','mamu','mama','mame'],
    correct:0,
    expl:'Feminine nouns ending in -a drop the -a and add -i. mama → mami.'
  },
  {
    nom:'Marko', eng:'Marko (masc. name)',
    stem:'Mark', gender:'Masculine (-u)',
    opts:['Marku','Marka','Markom','Marko'],
    correct:0,
    expl:'Masculine names ending in -o drop the -o and add -u. Marko → Marku.'
  },
  {
    nom:'dete', eng:'child',
    stem:'detet', gender:'Neuter (-u, stem change)',
    opts:['detetu','dete','deteta','deti'],
    correct:0,
    expl:'Neuter noun "dete" has a stem change: dete → detet- + u = detetu. This is a common pattern for neuter nouns ending in -e.'
  },
  {
    nom:'brat', eng:'brother',
    stem:'brat', gender:'Masculine (-u)',
    opts:['bratu','brata','bratom','brat'],
    correct:0,
    expl:'Masculine nouns ending in a consonant add -u. brat → bratu.'
  },
];

// EX2: dative in a full sentence – three genders, choose correct noun form
const EX2=[
  {
    s:'Dajem ___ poklon.',
    e:'I give ___ a present.',
    prompt:'mama (mom)',
    opts:['mami','mamu','mama'],
    correct:0,
    expl:'"Dajem" (I give) is a transfer verb — the receiver takes the dative. mama → mami.',
    full:'Dajem mami poklon.'
  },
  {
    s:'Pomažem ___.',
    e:'I help ___.',
    prompt:'Marko',
    opts:['Marku','Marka','Marko'],
    correct:0,
    expl:'"Pomagati" (to help) takes a dative object — the person helped. Marko → Marku.',
    full:'Pomažem Marku.'
  },
  {
    s:'Pričam ___ priču.',
    e:'I tell ___ a story.',
    prompt:'dete (child)',
    opts:['detetu','dete','deteta'],
    correct:0,
    expl:'"Pričati" (to tell/narrate) directs the story toward a receiver — dative. dete → detetu.',
    full:'Pričam detetu priču.'
  },
  {
    s:'Verujem ___.',
    e:'I trust ___.',
    prompt:'drug (friend, masc.)',
    opts:['drugu','druga','drug'],
    correct:0,
    expl:'"Verovati" (to trust/believe) takes dative — the person trusted. drug → drugu.',
    full:'Verujem drugu.'
  },
];

function buildProgress(){
  document.getElementById('pbar').innerHTML=SCREENS.map((s,i)=>
    `<div class="pdot ${i<cur?'done':i===cur?'active':''}"></div>`).join('');
}

function buildScreens(){
  const c=document.getElementById('screens');c.innerHTML='';
  const mk=(id,html)=>{
    const d=document.createElement('div');
    d.className=`screen ${id===SCREENS[cur].id?'active':''}`;
    d.id=`sc-${id}`;d.innerHTML=html;c.appendChild(d);
  };

  // SCREEN 1: Introduction with case contrast
  mk('intro',`
    <div class="slabel">Lekcija 3a · Lesson 3a</div>
    <div class="stitle">Dativ · The Dative Case</div>
    <div class="ibox">
      <strong>What is the dative?</strong><br>
      The dative marks the <em>indirect object</em> — the receiver of an action. It answers the questions <strong>kome?</strong> (to whom?) and <strong>čemu?</strong> (to what?). Think of it as the "giving direction" of the sentence.<br><br>
      <strong>Šta je dativ?</strong><br>
      Dativ označava <em>indirektni objekat</em> — primaoca radnje. Odgovara na pitanja <strong>kome?</strong> i <strong>čemu?</strong>
    </div>
    <div class="card">
      <div class="cs">Dajem <span class="hl">mami</span> poklon.</div>
      <div class="ce">I give <span style="font-style:italic">mom</span> a present.</div>
      <div class="cn">mami = dative of mama → receiver of the giving</div>
      ${spkBtn('Dajem mami poklon.')}
    </div>
    <div class="card">
      <div class="cs">Pomažem <span class="hl">Marku</span>.</div>
      <div class="ce">I help <span style="font-style:italic">Marko</span>.</div>
      <div class="cn">Marku = dative of Marko → person helped</div>
      ${spkBtn('Pomažem Marku.')}
    </div>
    <div class="card">
      <div class="cs">Pričam <span class="hl">detetu</span> priču.</div>
      <div class="ce">I tell <span style="font-style:italic">the child</span> a story.</div>
      <div class="cn">detetu = dative of dete → person spoken to</div>
      ${spkBtn('Pričam detetu priču.')}
    </div>
    <div class="navrow"><span></span><button class="btnp" onclick="goNext()">Dalje · Next →</button></div>
  `);

  // SCREEN 2: Case contrast — why we need dative vs accusative
  mk('contrast',`
    <div class="slabel">Ključna razlika · Key distinction</div>
    <div class="stitle">Dativ vs. akuzativ — ko prima, šta prima</div>
    <div class="ibox ibox-amber">
      Serbian verbs like <strong>dati</strong> (to give) take <em>two objects</em>: the thing given (accusative) and the person who receives it (dative). Getting these mixed up is the most common learner error.
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:500;color:var(--teal-text);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em;">Same sentence — two objects</div>
      <div class="cs" style="margin-bottom:8px;">Dajem <span class="hl">mami</span> <span class="hl2">poklon</span>.</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
        <span style="font-size:13px;background:var(--teal-bg);color:var(--teal-text);padding:3px 10px;border-radius:20px;">mami = dative (kome?)</span>
        <span style="font-size:13px;background:var(--purple-bg);color:var(--purple-text);padding:3px 10px;border-radius:20px;">poklon = accusative (šta?)</span>
      </div>
      <div class="ce" style="margin-bottom:4px;">I give <em>mom</em> a <em>present</em>.</div>
      ${spkBtn('Dajem mami poklon.')}
    </div>
    <div class="compare-grid">
      <div class="compare-card">
        <div class="compare-label" style="color:var(--teal-text);">Dativ — kome? to whom?</div>
        <div class="compare-row"><span class="hl">mami</span> — mom</div>
        <div class="compare-row"><span class="hl">Marku</span> — Marko</div>
        <div class="compare-row"><span class="hl">detetu</span> — child</div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:6px;">the receiver of the action</div>
      </div>
      <div class="compare-card">
        <div class="compare-label" style="color:var(--purple-text);">Akuzativ — šta? what?</div>
        <div class="compare-row"><span class="hl2">poklon</span> — present</div>
        <div class="compare-row"><span class="hl2">pismo</span> — letter</div>
        <div class="compare-row"><span class="hl2">priču</span> — story</div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:6px;">the thing being acted upon</div>
      </div>
    </div>
    <div class="ibox" style="margin-top:.25rem;">
      <strong>Test yourself:</strong> In "Pišem Ani pismo" — which word is dative? Ask <em>kome pišem?</em> → Ani (dative). Ask <em>šta pišem?</em> → pismo (accusative).
      ${spkBtn('Pišem Ani pismo.')}
    </div>
    <div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button><button class="btnp" onclick="goNext()">Nastavci · Endings →</button></div>
  `);

  // SCREEN 3: Endings table — clean and memorable
  mk('endings',`
    <div class="slabel">Nastavci · Endings</div>
    <div class="stitle">Kako se gradi dativ · How to form the dative</div>
    <div class="ibox">
      Three genders, two endings. The rule is very regular. <strong>Masculine and neuter take -u; feminine takes -i.</strong> The main exception to memorise is the neuter stem change for nouns like "dete".
    </div>
    <table class="tbl">
      <thead><tr><th>Rod · Gender</th><th>Nastavak · Ending</th><th>Nominativ → Dativ</th><th>Više primera</th></tr></thead>
      <tbody>
        <tr>
          <td><span class="hl2">Muški · Masc.</span></td>
          <td class="end">-u</td>
          <td>Marko → <strong>Marku</strong><br>brat → <strong>bratu</strong></td>
          <td class="dim">drug → drugu<br>sin → sinu</td>
        </tr>
        <tr>
          <td><span class="hl">Ženski · Fem.</span></td>
          <td class="end">-i</td>
          <td>mama → <strong>mami</strong><br>Ana → <strong>Ani</strong></td>
          <td class="dim">sestra → sestri<br>žena → ženi</td>
        </tr>
        <tr>
          <td><span class="hl3">Srednji · Neut.</span></td>
          <td class="end">-u</td>
          <td>selo → <strong>selu</strong><br>more → <strong>moru</strong></td>
          <td class="dim">dete → <strong>detetu</strong> ⚠<br>ime → <strong>imenu</strong> ⚠</td>
        </tr>
      </tbody>
    </table>
    <div class="ibox ibox-amber" style="margin-top:.25rem;">
      <strong>⚠ Stem changes</strong> — some neuter nouns add a syllable before -u: dete → detet<strong>u</strong>, ime → imen<strong>u</strong>, vreme → vremen<strong>u</strong>. These are worth memorising individually.
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:10px;">Hear the pattern</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div><span class="hl2">Marku</span> — masc. ${spkBtn('Marku')}</div>
        <div style="border-top:0.5px solid var(--border-light);padding-top:8px;"><span class="hl">mami</span> — fem. ${spkBtn('mami')}</div>
        <div style="border-top:0.5px solid var(--border-light);padding-top:8px;"><span class="hl3">detetu</span> — neut. (stem change) ${spkBtn('detetu')}</div>
      </div>
    </div>
    <div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button><button class="btnp" onclick="goNext()">Vežba 1 →</button></div>
  `);

  // SCREEN 4: Exercise 1 — transform nominative → dative
  mk('ex1', buildEx1HTML());

  // SCREEN 5: Exercise 2 — choose dative in full sentence
  mk('ex2', buildEx2HTML());

  // SCREEN 6: Done
  const s1=EX1.filter((_,i)=>ex1s.checked[i]===true).length;
  const s2=EX2.filter((_,i)=>ex2s.checked[i]===true).length;
  mk('done',`
    <div class="slabel">Završeno · Done</div>
    <div class="stitle">Odlično! Lekcija 3a završena.</div>
    <div class="score-wrap">
      <div class="score-circle"><div class="score-num">${s1}/${EX1.length}</div><div class="score-lbl">Vežba 1</div></div>
      <div class="score-circle"><div class="score-num">${s2}/${EX2.length}</div><div class="score-lbl">Vežba 2</div></div>
    </div>
    <div class="card">
      <div class="cs" style="font-size:15px;margin-bottom:8px;">Šta si naučio/la</div>
      <ul style="padding-left:1.1rem;font-size:14px;color:var(--text-secondary);line-height:2.1;">
        <li>Dative answers <strong>kome?</strong> and <strong>čemu?</strong></li>
        <li>Masculine &amp; neuter → <strong>-u</strong>, feminine → <strong>-i</strong></li>
        <li>Neuter nouns like <strong>dete</strong> have stem changes (detet-u)</li>
        <li>Transfer verbs (dati, pisati, pričati, pomagati) take dative for the receiver</li>
      </ul>
    </div>
    <div style="display:flex;flex-direction:column;gap:.6rem;margin-top:1.25rem;">
      <button class="btn-complete" onclick="markAndGoNext()">&#x279C; Sledeće · Up next:</strong> Lekcija 3b — dative pronouns (mi, ti, mu, joj, nam, vam, im).</button>
      <button class="btng" style="width:100%;text-align:center;" onclick="markAndGoHome()">&#x21A9; Vrati se na početnu &middot; Back to home</button>
      <button class="btng" style="width:100%;text-align:center;" onclick="restart()">&#x21BA; Ponovi lekciju &middot; Restart</button>
    </div>
  `);
}

function buildEx1HTML(){
  let h=`<div class="slabel">Vežba 1 · Exercise 1</div>
    <div class="stitle">Nominativ → Dativ</div>
    <div class="ibox">Each word is shown in its base form (nominative). Choose its dative form. Think about the gender first.</div>`;
  EX1.forEach((q,qi)=>{
    const chk=ex1s.checked[qi]!==undefined;
    const sel=ex1s.answers[qi];
    h+=`<div class="card" style="margin-bottom:1rem;">
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px;">
        <div class="cs">${q.nom}</div>
        <div style="font-size:12px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.06em;">${q.gender}</div>
      </div>
      <div class="ce" style="margin-bottom:8px;">${q.eng}</div>
      <div class="optsrow">`;
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+=`<button class="${cls}" onclick="ex1pick(${qi},${oi})">${opt}</button>`;
    });
    h+=`</div>`;
    if(chk)h+=`<div class="fb ${ex1s.checked[qi]?'ok':'bad'}">${ex1s.checked[qi]?'Tačno!':'Netačno.'} — ${q.expl}</div>`;
    h+=`</div>`;
  });
  const allA=EX1.every((_,i)=>ex1s.answers[i]!==undefined);
  const allC=EX1.every((_,i)=>ex1s.checked[i]!==undefined);
  h+=`<div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button>`;
  if(!allC)h+=`<button class="btnp" ${allA?'':'disabled'} onclick="checkEx1()">Proveri · Check</button>`;
  else h+=`<button class="btnp" onclick="goNext()">Vežba 2 →</button>`;
  h+=`</div>`;return h;
}

function buildEx2HTML(){
  let h=`<div class="slabel">Vežba 2 · Exercise 2</div>
    <div class="stitle">Dativ u rečenici · Dative in context</div>
    <div class="ibox">Choose the correct dative form to complete each sentence. The word to transform is shown in brackets.</div>`;
  EX2.forEach((q,qi)=>{
    const chk=ex2s.checked[qi]!==undefined;
    const sel=ex2s.answers[qi];
    const filled=sel!==undefined?q.opts[sel]:'___';
    h+=`<div class="card" style="margin-bottom:1rem;">
      <div style="font-size:17px;color:var(--text-primary);margin-bottom:4px;line-height:1.6;">
        ${q.s.replace('___',`<span class="blank">${filled}</span>`)}
      </div>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:2px;">${q.e.replace('___','___')}</div>
      <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:8px;">→ put <strong>${q.prompt}</strong> in the dative</div>
      <div class="optsrow">`;
    q.opts.forEach((opt,oi)=>{
      let cls='opt';
      if(chk){cls+=' locked';if(oi===q.correct)cls+=' ok';else if(oi===sel&&oi!==q.correct)cls+=' bad';}
      else if(sel===oi)cls+=' sel';
      h+=`<button class="${cls}" onclick="ex2pick(${qi},${oi})">${opt}</button>`;
    });
    h+=`</div>`;
    if(chk){
      h+=`<div class="fb ${ex2s.checked[qi]?'ok':'bad'}">${ex2s.checked[qi]?'Tačno!':'Netačno.'} — ${q.expl}</div>`;
      if(ex2s.checked[qi])h+=spkBtn(q.full);
    }
    h+=`</div>`;
  });
  const allA=EX2.every((_,i)=>ex2s.answers[i]!==undefined);
  const allC=EX2.every((_,i)=>ex2s.checked[i]!==undefined);
  h+=`<div class="navrow"><button class="btng" onclick="goPrev()">← Nazad</button>`;
  if(!allC)h+=`<button class="btnp" ${allA?'':'disabled'} onclick="checkEx2()">Proveri · Check</button>`;
  else h+=`<button class="btnp" onclick="goNext()">Završetak →</button>`;
  h+=`</div>`;return h;
}

function ex1pick(qi,oi){if(ex1s.checked[qi]!==undefined)return;ex1s.answers[qi]=oi;refreshEx1();}
function refreshEx1(){
  const old=document.getElementById('sc-ex1');if(!old)return;
  const d=document.createElement('div');
  d.className=`screen ${SCREENS[cur].id==='ex1'?'active':''}`;
  d.id='sc-ex1';d.innerHTML=buildEx1HTML();old.replaceWith(d);
}
function checkEx1(){
  EX1.forEach((_,i)=>{if(ex1s.answers[i]!==undefined)ex1s.checked[i]=ex1s.answers[i]===EX1[i].correct;});
  refreshEx1();
}
function ex2pick(qi,oi){if(ex2s.checked[qi]!==undefined)return;ex2s.answers[qi]=oi;refreshEx2();}
function refreshEx2(){
  const old=document.getElementById('sc-ex2');if(!old)return;
  const d=document.createElement('div');
  d.className=`screen ${SCREENS[cur].id==='ex2'?'active':''}`;
  d.id='sc-ex2';d.innerHTML=buildEx2HTML();old.replaceWith(d);
}
function checkEx2(){
  EX2.forEach((_,i)=>{if(ex2s.answers[i]!==undefined)ex2s.checked[i]=ex2s.answers[i]===EX2[i].correct;});
  refreshEx2();
}
function goNext(){if(cur<SCREENS.length-1){cur++;render();window.scrollTo({top:0,behavior:'smooth'});}}
function goPrev(){if(cur>0){cur--;render();window.scrollTo({top:0,behavior:'smooth'});}}
function restart(){cur=0;ex1s={answers:{},checked:{}};ex2s={answers:{},checked:{}};render();}
function render(){
  buildScreens();buildProgress();
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.toggle('active',s.id===`sc-${SCREENS[cur].id}`);
  });
}

function markAndGoHome(){
  try{const p=JSON.parse(localStorage.getItem('serbian_course_progress')||'{}');p['L2c']=true;localStorage.setItem('serbian_course_progress',JSON.stringify(p));}catch(e){}
  window.location.href='serbian-course-home.html';
}

function markAndGoNext(){
  try{const p=JSON.parse(localStorage.getItem('serbian_course_progress')||'{}');p['L2c']=true;localStorage.setItem('serbian_course_progress',JSON.stringify(p));}catch(e){}
  window.location.href='serbian-lesson3b-dativ-zamenice.html';
}

render();
  </script>
